<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MACHINE_CORE_V3_CLEAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; font-family: 'monospace'; color: #fff; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; }
        
        #kernel-log {
            position: absolute; bottom: 10px; left: 10px; z-index: 10;
            font-size: 9px; line-height: 1.2; color: #0f0; pointer-events: none;
            text-shadow: 1px 1px 1px #000;
        }
        .vitals {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            text-align: right; font-size: 10px; color: #fff;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <div id="kernel-log">SYSTEM_READY_V3.0.1_STABLE</div>
    <div class="vitals" id="vitals">
        FPS: -- | LAT: --ms<br>
        GYRO: STABLE<br>
        NET: LOCAL_AXIS
    </div>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('kernel-log');
        const vitals = document.getElementById('vitals');
        
        let model;
        let objectMemory = new Map();

        async function engineInit() {
            log.innerText = ">> MAPPING_DEVICES...";
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", frameRate: { ideal: 60 } }
            });
            video.srcObject = stream;
            
            log.innerText = ">> LOADING_NEURAL_WEIGHTS...";
            model = await cocoSsd.load();
            log.innerText = ">> KERNEL_ACTIVE. MONITORING_FLUX.";
            
            requestAnimationFrame(processingLoop);
        }

        async function processingLoop() {
            const start = performance.now();
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Нейронный проход
            const predictions = await model.detect(video);
            const end = performance.now();
            
            // Обновление метрик
            const lat = (end - start).toFixed(0);
            vitals.innerHTML = `FPS: ${Math.round(1000/lat)} | LAT: ${lat}ms<br>DATA_FLUX: ACTIVE`;

            renderMachineVision(predictions);
            requestAnimationFrame(processingLoop);
        }

        function renderMachineVision(preds) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            preds.forEach(p => {
                const [x, y, w, h] = p.bbox;
                const cx = (x + w/2) * sx;
                const cy = (y + h/2) * sy;

                // 1. Точка фокуса (Centroid)
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI*2);
                ctx.fill();

                // 2. Вектор привязки к горизонту
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx, canvas.height); // Линия до "пола"
                ctx.stroke();

                // 3. Лаконичный дескриптор
                ctx.font = "bold 10px monospace";
                ctx.fillText(`${p.class.toUpperCase()} [${Math.round(p.score*100)}%]`, x*sx, y*sy - 5);
                
                // 4. Ограничивающий периметр (только углы для чистоты)
                const cornerLen = 15;
                ctx.strokeStyle = p.score > 0.8 ? "#0f0" : "#f00";
                ctx.lineWidth = 2;
                
                // Top-Left
                ctx.beginPath();
                ctx.moveTo(x*sx, y*sy + cornerLen); ctx.lineTo(x*sx, y*sy); ctx.lineTo(x*sx + cornerLen, y*sy);
                ctx.stroke();
                // Bottom-Right
                ctx.beginPath();
                ctx.moveTo((x+w)*sx - cornerLen, (y+h)*sy); ctx.lineTo((x+w)*sx, (y+h)*sy); ctx.lineTo((x+w)*sx, (y+h)*sy - cornerLen);
                ctx.stroke();

                // Логирование новых сущностей
                if (!objectMemory.has(p.class)) {
                    log.innerHTML = `>> NEW_ENTITY_LOCKED: ${p.class}<br>` + log.innerHTML.split('<br>').slice(0, 5).join('<br>');
                    objectMemory.set(p.class, true);
                }
            });
        }

        document.body.onclick = () => engineInit();
    </script>
</body>
</html>
