<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Eye Simulation v0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { background: #000; overflow: hidden; margin: 0; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* Эффект виньетки и зернистости для "живого" глаза */
        #eye-overlay {
            position: absolute; inset: 0;
            background: 
                radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%),
                url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFUOxGBmAIpAVMI4DIwNYGAAitw55P7EAFgAAAABJRU5ErkJggg==');
            opacity: 0.3; pointer-events: none; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="vision-canvas"></canvas>
        <div id="eye-overlay"></div>
    </div>

    <div class="absolute bottom-5 left-5 z-30 pointer-events-none bg-black/40 p-4 border border-white/10 rounded-xl backdrop-blur-sm text-white font-sans">
        <h2 class="text-xs font-bold uppercase tracking-widest text-white/70 mb-2">Subjective Vision v0.2</h2>
        <div id="telemetry" class="text-[11px] space-y-1">
            <p>Статус: <span id="status" class="text-yellow-400">Загрузка моделей...</span></p>
            <p>Объект фокуса: <span id="focus-obj">Нет</span></p>
            <p>Эмоция: <span id="emotion">Wait...</span></p>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('vision-canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        let selfieSegmentation;

        // Инициализация MediaPipe Selfie Segmentation
        async function initSegmentation() {
            selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
            }});
            
            selfieSegmentation.setOptions({ modelSelection: 1 }); // 1 - для iPhone (General)
            selfieSegmentation.onResults(onResults);
            
            statusEl.innerText = "Глаз готов. Жду калибровки.";
            statusEl.classList.remove('text-yellow-400');
            statusEl.classList.add('text-green-400');
        }

        // 1. Доступ к камере
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280, height: 720 },
                audio: false
            });
            video.srcObject = stream;
        }

        // 2. Обработка каждого кадра (МОЕ ВИДЕНИЕ)
        function onResults(results) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Шаг A: Рисуем маску сегментации (где находится "важное" - человек/передний план)
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);

            // Шаг B: Рисуем фоновую картинку ТОЛЬКО там, где маска (выделяем объект)
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            // Шаг C: (Симуляция Боке/Глубины) 
            // Рисуем заблюренный оригинал ПОД основным объектом
            ctx.globalCompositeOperation = 'destination-over';
            ctx.filter = 'blur(15px)'; // Размываем фон
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // Шаг D: Эмуляция "Фокуса" человека.
            // Придаем центру кадра чуть больше четкости и яркости
            ctx.globalCompositeOperation = 'source-over';
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 400);
            gradient.addColorStop(0, "rgba(255,255,255,0.1)"); // Центр
            gradient.addColorStop(1, "rgba(0,0,0,0.5)"); // Края
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.restore();
        }

        async function start() {
            await setupCamera();
            await initSegmentation();
            
            // Запускаем цикл обработки
            async function predictionLoop() {
                if (video.readyState >= 2) {
                    await selfieSegmentation.send({image: video});
                }
                requestAnimationFrame(predictionLoop);
            }
            predictionLoop();
        }

        // Запуск при клике (нужно для активации камеры в Safari)
        document.body.addEventListener('click', start, { once: true });
    </script>
</body>
</html>
