<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAULT-TEC | VISION_OS v12.1</title>
    
    <!-- Подключаем скрипты с проверкой загрузки -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --pip-white: #ffffff; --pip-bg: #050a05; --pip-green: #1aff80; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'VT323', monospace; color: var(--pip-white); }
        
        #viewport { position: relative; width: 100vw; height: calc(100vh - 160px); background: #111; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6) contrast(1.2); z-index: 1; }
        canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        #terminal { height: 160px; background: var(--pip-bg); border-top: 2px solid var(--pip-white); padding: 10px; overflow-y: hidden; }
        .term-row { font-size: 18px; color: var(--pip-green); margin-bottom: 2px; }

        #boot-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .boot-btn { background: none; border: 2px solid var(--pip-white); color: var(--pip-white); padding: 15px 40px; font-size: 25px; cursor: pointer; font-family: 'VT323'; }
        .error-msg { color: #ff4444; margin-top: 10px; font-size: 14px; max-width: 80%; }
    </style>
</head>
<body>

<div id="boot-overlay">
    <div id="status-text" style="font-size: 30px; margin-bottom: 20px;">SYSTEM OFFLINE</div>
    <button id="main-btn" class="boot-btn" onclick="initializeSystem()">LOAD NEURAL CORE</button>
    <div id="error-log" class="error-msg"></div>
</div>

<div id="container">
    <div id="viewport">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal"><div id="term-content"></div></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const errorLog = document.getElementById('error-log');
    const statusText = document.getElementById('status-text');

    let model = null;
    let isRunning = false;
    let smoothCoords = new Map(); 

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        const content = document.getElementById('term-content');
        content.prepend(line);
        if (content.childNodes.length > 7) content.lastChild.remove();
    }

    async function initializeSystem() {
        try {
            statusText.innerText = "LOADING AI MODELS...";
            writeTerm("INITIATING WASM BACKEND...");
            
            // 1. Проверка библиотек
            if (typeof tf === 'undefined' || typeof cocoSsd === 'undefined') {
                throw new Error("Библиотеки не загружены. Проверьте интернет-соединение.");
            }

            await tf.setBackend('wasm');
            model = await cocoSsd.load({ base: 'mobilenet_v2' });
            
            statusText.innerText = "REQUESTING CAMERA...";
            writeTerm("ACCESSING OPTICAL SENSORS...");

            // 2. Проверка камеры
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            
            video.srcObject = stream;
            
            // Ждем готовности видео
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('boot-overlay').style.display = 'none';
                isRunning = true;
                writeTerm("SYSTEM ONLINE. TARGETING ACTIVE.");
                render();
            };

        } catch (err) {
            console.error(err);
            errorLog.innerText = "CRITICAL_FAILURE: " + err.message;
            statusText.innerText = "BOOT ERROR";
        }
    }

    function render() {
        if (!isRunning) return;

        model.detect(video).then(predictions => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(p => {
                const [x, y, w, h] = p.bbox;
                
                // Простейшее сглаживание для предотвращения мигания
                if (!smoothCoords.has(p.class)) smoothCoords.set(p.class, p.bbox);
                let prev = smoothCoords.get(p.class);
                
                const lerp = (a, b) => a + (b - a) * 0.3;
                const nx = lerp(prev[0], x, 0.3);
                const ny = lerp(prev[1], y, 0.3);
                const nw = lerp(prev[2], w, 0.3);
                const nh = lerp(prev[3], h, 0.3);
                
                smoothCoords.set(p.class, [nx, ny, nw, nh]);

                drawUI(nx, ny, nw, nh, p.class);
            });

            requestAnimationFrame(render);
        }).catch(e => console.log("Frame error:", e));
    }

    function drawUI(x, y, w, h, label) {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;

        // Пунктир
        ctx.setLineDash([10, 5]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);

        // Уголки
        const s = 20;
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();

        // Тайтл
        ctx.fillStyle = "white";
        ctx.font = "20px VT323";
        const dist = ((800 * 0.5) / w).toFixed(1);
        ctx.fillText(`${label.toUpperCase()} | ${dist}m`, x + 5, y - 10);
    }
</script>
</body>
</html>
