<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINATOR_V9_CINEMATIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Fira Code', monospace; }
        video { display: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
        
        /* Виньетка и сканирование */
        #overlay {
            position: absolute; inset: 0; z-index: 100; pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(50,0,0,0.6) 100%);
            box-shadow: inset 0 0 100px #000;
        }
        #scanlines {
            position: absolute; inset: 0; z-index: 101; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="overlay"></div>
    <div id="scanlines"></div>

    <button id="ignite" class="absolute inset-0 z-[200] bg-black text-red-600 font-black text-2xl flex flex-col items-center justify-center tracking-[0.5em]">
        <span class="animate-ping mb-4">CONNECTING_NEURAL_LINK</span>
        <div class="text-[8px] opacity-50 font-normal">A17_PRO_GPU // KERNEL_V9_CINEMATIC // READY</div>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let model, shake = 0;

        async function init() {
            document.getElementById('ignite').remove();
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280 }
            });
            video.srcObject = stream;
            model = await cocoSsd.load();
            draw();
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // ЭФФЕКТ ТРЯСКИ (SHAKE) ПРИ ЗАХВАТЕ
            let offsetX = (Math.random() - 0.5) * shake;
            let offsetY = (Math.random() - 0.5) * shake;
            if (shake > 0) shake *= 0.9; // Затухание

            // БАЗОВЫЙ ФИЛЬТР: КРАСНЫЙ КИНО-НЕГАТИВ
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.filter = "contrast(2.2) brightness(0.5) grayscale(1) sepia(1) hue-rotate(-90deg)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            renderCinematicHUD();
            requestAnimationFrame(draw);
        }

        async function renderCinematicHUD() {
            const preds = await model.detect(video);
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            preds.forEach(p => {
                if (p.score < 0.6) return;
                
                // Если новая цель - даем "удар" (тряску)
                if (shake < 5) shake = 15;

                const [x, y, w, h] = p.bbox.map(v => v * (sx > sy ? sx : sy));
                const cx = x + w/2;
                const cy = y + h/2;

                // 1. ЗАХВАТ КАРТИНКИ ИЗ РАМКИ (Эффект "чистого зрения")
                // Мы вырезаем объект и рисуем его поверх красного фильтра в оригинальном цвете
                ctx.save();
                ctx.beginPath();
                ctx.rect(x, y, w, h);
                ctx.clip();
                ctx.filter = "contrast(1.5) brightness(1.2) saturate(200%)";
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                // 2. КИНО-РАМКА (Ударные углы)
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 3;
                const s = 30; // Размер углов
                
                // Отрисовка Г-образных углов
                ctx.beginPath();
                ctx.moveTo(x, y+s); ctx.lineTo(x, y); ctx.lineTo(x+s, y); // TL
                ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s); // TR
                ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h); // BL
                ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s); // BR
                ctx.stroke();

                // 3. ЛУЧИ ДАННЫХ (Connectors)
                ctx.lineWidth = 0.5;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(x, y); ctx.lineTo(0, 0); // В верхний левый угол
                ctx.moveTo(x+w, y); ctx.lineTo(canvas.width, 0); // В верхний правый
                ctx.stroke();
                ctx.setLineDash([]);

                // 4. ТЕКСТОВАЯ ТЕЛЕМЕТРИЯ
                ctx.fillStyle = "#ff0000";
                ctx.font = "900 12px 'Fira Code'";
                ctx.fillText(`>> TARGET: ${p.class.toUpperCase()}`, x + 5, y + 20);
                ctx.font = "400 8px 'Fira Code'";
                ctx.fillText(`ANALYSIS_COMPLETE: ${Math.random().toString(16).slice(2,8)}`, x + 5, y + 35);
                
                // Перекрестие в центре
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx-20, cy); ctx.lineTo(cx+20, cy);
                ctx.moveTo(cx, cy-20); ctx.lineTo(cx, cy+20);
                ctx.stroke();
            });
            
            // Имитация загрузки кода по краям
            renderSideData();
        }

        function renderSideData() {
            ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
            ctx.font = "7px 'Fira Code'";
            for(let i=0; i<20; i++) {
                ctx.fillText(Math.random().toString(2).slice(2, 25), 15, 60 + i*10);
                ctx.fillText("0x" + Math.random().toString(16).slice(2, 6), canvas.width - 40, 60 + i*10);
            }
        }

        document.getElementById('ignite').onclick = init;
    </script>
</body>
</html>
