<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEURAL FACE SCAN v6.2 - MS-DOS MODE</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    /* MSDOS 80x25 Style Aesthetics */
    body { 
      margin: 0; 
      background: #0000aa; /* Classic BIOS/DOS Blue */
      overflow: hidden; 
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
      color: #aaaaaa; 
    }
    
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      border: 4px double #fff; box-sizing: border-box;
    }

    .loader-ring {
      display: none; width: 40px; height: 40px; border: 4px solid #555;
      border-top-color: #fff;
      animation: spin 1s steps(8) infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #access-btn {
      background: #aaaaaa; border: 2px solid #fff; color: #000;
      padding: 10px 20px; cursor: pointer; text-transform: uppercase;
      font-weight: bold; font-family: inherit; box-shadow: 4px 4px 0 #555555;
    }
    #access-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #555555; }

    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
    .input_video { display: none; }
    
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
      filter: contrast(1.2) brightness(0.8) sepia(0.2);
    }

    #switch-camera {
      position: absolute; top: 10px; right: 10px; z-index: 110;
      background: #aaaaaa; border: 1px solid #fff; color: #000;
      padding: 4px 8px; cursor: pointer; font-size: 12px; font-weight: bold;
    }

    .interface-overlay {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      font-size: 14px; color: #ffff55; pointer-events: none;
      background: #0000aa; border: 1px solid #fff; padding: 5px;
    }

    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: #000; border-top: 2px solid #aaaaaa;
      padding-bottom: 10px;
    }

    #live-speech-box {
      width: 100%; background: #aaaaaa; color: #000;
      text-align: center; font-size: 16px; font-weight: bold;
      padding: 4px 0; border-bottom: 1px solid #000;
    }

    #audio_visualizer { width: 90%; height: 40px; margin: 5px 0; background: #0000aa; border: 1px solid #fff; }

    #terminal-box {
      width: 98%; height: 120px; background: #000;
      border: 1px solid #aaaaaa; padding: 5px; box-sizing: border-box;
      overflow-y: auto; font-size: 12px; line-height: 1.2;
    }

    .log-entry { 
      margin: 1px 0; 
      color: #aaaaaa; 
    }
    .log-entry:last-child { 
      color: #ffffff; 
    }
    
    /* CRT Scanline Effect */
    body::after {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      z-index: 150; background-size: 100% 3px, 3px 100%; pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="preloader">
    <div style="color:#fff; margin-bottom:10px;">MS-DOS(R) Neural Loader v6.20</div>
    <div class="loader-ring" id="ring"></div>
    <button id="access-btn" onclick="startSequence()">A:\> RUN SCANNER.EXE</button>
    <p id="status-text" style="margin-top: 20px; font-size: 12px; color: #ffff55;">WAITING FOR USER INTERRUPT 21h...</p>
  </div>

  <button id="switch-camera">F10: SWITCH</button>

  <div id="container">
    <video class="input_video" playsinline></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      C:\SCANNER\> SYS_STATE: RUNNING<br>
      C:\SCANNER\> MODE: MESH_80x25<br>
      <span id="target-status" style="color:#fff">C:\SCANNER\> SEEKING...</span>
    </div>

    <div class="bottom-peripherals">
      <div id="live-speech-box">VOICE_BUFFER: EMPTY</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const logContent = document.getElementById('log-content');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, dataArray, frequencyArray;
    let scanLineY = 0; 
    let lastSoundTick = 0;

    // --- АНИМИРОВАННЫЙ ТЕРМИНАЛ ---
    async function addLog(text) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const timestamp = `[${new Date().toLocaleTimeString()}] `;
      entry.innerText = timestamp;
      logContent.appendChild(entry);
      
      const message = text.toUpperCase();
      for (let i = 0; i < message.length; i++) {
        entry.innerText += message[i];
        terminalBox.scrollTop = terminalBox.scrollHeight;
        await new Promise(r => setTimeout(r, 15)); 
      }
    }

    // --- ЕДИНАЯ ИНИЦИАЛИЗАЦИЯ ПРИ ЗАПУСКЕ ---
    window.startSequence = async function() {
      const btn = document.getElementById('access-btn');
      const ring = document.getElementById('ring');
      const status = document.getElementById('status-text');

      try {
        btn.style.display = 'none';
        status.innerText = "LOADING DRIVERS (CAM+MIC)...";

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        
        ring.style.display = 'block';
        status.innerText = "ALLOCATING CONVENTIONAL MEMORY...";

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 512;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        frequencyArray = new Uint8Array(analyser.frequencyBinCount);
        drawWave();

        videoElement.srcObject = stream;
        await startCamera();
        
        document.getElementById('preloader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('preloader').style.display = 'none';
          document.getElementById('container').style.visibility = 'visible';
          if (window.runSpeech) window.runSpeech();
          addLog("HIMEM.SYS loaded successfully");
          addLog("Neural Kernel v6.2 executing...");
        }, 600);

      } catch (err) {
        status.innerText = "RUNTIME ERROR 200: ACCESS DENIED";
        btn.style.display = 'block';
        ring.style.display = 'none';
      }
    };

    function drawWave() {
      requestAnimationFrame(drawWave);
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteTimeDomainData(dataArray);
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      aCtx.lineWidth = 2;
      aCtx.strokeStyle = '#ffff55';
      aCtx.beginPath();
      let sliceWidth = audioCanvas.width / dataArray.length;
      let x = 0;
      for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = v * audioCanvas.height / 2;
        if (i === 0) aCtx.moveTo(x, y); else aCtx.lineTo(x, y);
        x += sliceWidth;
      }
      aCtx.stroke();
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU';
      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) addLog("MSG: " + event.results[i][0].transcript);
          else interim += event.results[i][0].transcript;
        }
        liveSpeechBox.innerText = interim ? ">> " + interim.toUpperCase() : "VOICE_BUFFER: IDLE";
      };
      recognition.onend = () => recognition.start();
      window.runSpeech = () => recognition.start();
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.fillStyle = '#0000aa'; // DOS Blue backdrop
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
      
      canvasCtx.globalAlpha = 0.15;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        targetStatus.innerText = "C:\\SCANNER\\> TARGET: OK";
        for (const landmarks of results.multiFaceLandmarks) {
          // ТЕССЕЛЯЦИЯ (СЕТКА) - Classic monochrome white/yellow
          canvasCtx.strokeStyle = 'rgba(255,255,255,0.2)';
          canvasCtx.lineWidth = 0.5;
          for (const connector of FACEMESH_TESSELATION) {
            const start = landmarks[connector[0]];
            const end = landmarks[connector[1]];
            canvasCtx.beginPath();
            canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
            canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
            canvasCtx.stroke();
          }
          
          // ОТВЕРСТИЕ РТА (Внутренний контур)
          // Используем FACEMESH_LIPS, но рисуем только "внутреннюю" часть
          const innerLipsIndices = [13, 14, 78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 14];
          canvasCtx.strokeStyle = '#ffffff';
          canvasCtx.lineWidth = 2;
          canvasCtx.beginPath();
          innerLipsIndices.forEach((idx, i) => {
            const pt = landmarks[idx];
            if (i === 0) canvasCtx.moveTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
            else canvasCtx.lineTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
          });
          canvasCtx.closePath();
          canvasCtx.stroke();

          // ГЛАЗА (Для полноты DOS-фейс-трекера)
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#ffff55', lineWidth: 1});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#ffff55', lineWidth: 1});
        }
      } else {
        targetStatus.innerText = "C:\\SCANNER\\> SEEKING...";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCamera() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: currentFacingMode, width: 640, height: 480
      });
      await cameraInstance.start();
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    });
  </script>
</body>
</html>
