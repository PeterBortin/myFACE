<style>
:root{
  --g:#00ff41;--g2:#00cc33;--g3:#003a12;
  --y:#ffff00;--o:#ff9900;--r:#ff2244;--b:#00aaff;
  --bg:#020804;--panel:rgba(2,8,4,.94);--border:rgba(0,255,65,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body,html{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:var(--g);
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;z-index:300;display:flex;
flex-direction:column;justify-content:center;align-items:center;}
#boot-logo{font-family:‘Orbitron’,monospace;font-weight:900;
font-size:clamp(30px,8vw,54px);letter-spacing:.18em;color:var(–g);
text-shadow:0 0 30px var(–g),0 0 60px #004400;animation:gpulse 2s ease-in-out infinite;}
#boot-sub{font-size:9px;letter-spacing:.45em;color:var(–g2);margin:6px 0 32px;}
#boot-log{width:min(360px,86vw);font-size:9.5px;color:var(–g2);min-height:115px;line-height:1.9;}
#boot-log .bl{opacity:0;animation:fi .22s forwards;}
#pb-wrap{width:min(360px,86vw);height:2px;background:#0a1a0a;margin-top:18px;}
#pb{height:100%;width:0;background:var(–g);box-shadow:0 0 8px var(–g);transition:width .3s;}
#btn-start{margin-top:28px;display:none;background:none;border:1px solid var(–g);
color:var(–g);font-family:‘Orbitron’,monospace;font-size:11px;
letter-spacing:.3em;padding:13px 42px;cursor:pointer;transition:all .2s;}
#btn-start:hover,#btn-start:active{background:var(–g);color:#000;box-shadow:0 0 20px var(–g);}

/* LAYOUT */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#vp{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;
filter:brightness(.55) contrast(1.38) saturate(.88);}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;}

/* scanlines */
#vp::after{content:’’;position:absolute;inset:0;z-index:5;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,
rgba(0,255,65,.016) 3px,rgba(0,255,65,.016) 4px);
animation:scanroll 10s linear infinite;}

/* HUD corners */
.hc{position:absolute;width:52px;height:52px;z-index:10;pointer-events:none;}
.hc::before,.hc::after{content:’’;position:absolute;background:var(–g);box-shadow:0 0 5px var(–g);}
.hc::before{width:2px;height:20px;}.hc::after{width:20px;height:2px;}
#hc-tl{top:0;left:0;}#hc-tl::before{top:0;left:0;}#hc-tl::after{top:0;left:0;}
#hc-tr{top:0;right:0;}#hc-tr::before{top:0;right:0;}#hc-tr::after{top:0;right:0;}
#hc-bl{bottom:0;left:0;}#hc-bl::before{bottom:0;left:0;}#hc-bl::after{bottom:0;left:0;}
#hc-br{bottom:0;right:0;}#hc-br::before{bottom:0;right:0;}#hc-br::after{bottom:0;right:0;}
/* crosshair */
#xhair{position:absolute;top:50%;left:50%;z-index:8;pointer-events:none;
width:22px;height:22px;margin:-11px;}
#xhair::before{content:’’;position:absolute;top:10px;left:0;width:22px;height:2px;
background:rgba(0,255,65,.3);}
#xhair::after{content:’’;position:absolute;left:10px;top:0;width:2px;height:22px;
background:rgba(0,255,65,.3);}
/* radar */
#radar{position:absolute;top:50%;left:50%;z-index:7;width:6px;height:6px;margin:-3px;
border-radius:50%;background:var(–g);pointer-events:none;
box-shadow:0 0 0 0 rgba(0,255,65,.5);animation:rpulse 4s ease-out infinite;}

/* TOP BAR */
#topbar{position:absolute;top:0;left:0;right:0;z-index:15;pointer-events:none;
display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
#sys-id{font-family:‘Orbitron’,monospace;font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(–g);text-shadow:0 0 12px var(–g);}
#badges{display:flex;gap:5px;}
.badge{font-size:8px;letter-spacing:.12em;padding:3px 8px;
border:1px solid var(–border);background:var(–panel);color:var(–g2);}
.badge.hi{border-color:var(–g);color:var(–g);}
.badge.al{border-color:var(–r);color:var(–r);}
.badge.wn{border-color:var(–o);color:var(–o);}

/* NIGHT BTN */
#night-btn{position:absolute;top:10px;left:14px;z-index:20;background:none;
border:1px solid var(–border);color:var(–g2);font-family:‘Share Tech Mono’,monospace;
font-size:8px;padding:4px 10px;cursor:pointer;letter-spacing:.1em;}
#night-btn:hover,#night-btn:active{border-color:var(–b);color:var(–b);}

/* RIGHT PANEL */
#rpanel{position:absolute;top:50%;right:10px;transform:translateY(-50%);
z-index:15;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.rs{font-size:7px;letter-spacing:.1em;padding:4px 9px;border:1px solid var(–border);
background:var(–panel);color:var(–g2);text-align:right;min-width:84px;}
.rs span{display:block;color:var(–g);font-size:10px;}

/* BOTTOM STAT BAR */
#statbar{position:absolute;bottom:0;left:0;right:0;z-index:15;
display:flex;gap:1px;pointer-events:none;}
.sc{flex:1;padding:5px 5px;background:var(–panel);
border-top:1px solid var(–border);font-size:7px;
letter-spacing:.07em;color:var(–g2);text-align:center;}
.sc span{display:block;color:var(–g);font-size:10px;font-weight:bold;}

/* INFO PANEL */
#info-panel{position:absolute;bottom:0;left:0;right:0;z-index:25;
background:rgba(2,8,4,.97);border-top:2px solid var(–g);
padding:12px 16px 10px;transform:translateY(100%);
transition:transform .28s cubic-bezier(.22,1,.36,1);pointer-events:none;}
#info-panel.open{transform:translateY(0);pointer-events:all;}
#info-close{position:absolute;top:10px;right:14px;background:none;
border:1px solid var(–g2);color:var(–g2);font-family:‘Share Tech Mono’,monospace;
font-size:9px;padding:3px 10px;cursor:pointer;letter-spacing:.1em;}
#info-close:hover,#info-close:active{border-color:var(–r);color:var(–r);}
#info-title{font-family:‘Orbitron’,monospace;font-size:13px;font-weight:700;
letter-spacing:.2em;color:var(–g);margin-bottom:8px;}
#info-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:9px;}
.ik{color:var(–g2);}.iv{color:var(–g);}
#info-desc{margin-top:8px;font-size:9px;color:var(–g2);line-height:1.6;
border-top:1px solid var(–border);padding-top:6px;}

/* TERMINAL */
#terminal{flex:0 0 auto;height:108px;background:var(–bg);
border-top:1px solid var(–border);padding:7px 14px;overflow:hidden;z-index:20;}
#term-hdr{font-family:‘Orbitron’,monospace;font-size:7px;letter-spacing:.28em;
color:var(–g3);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
#term-hdr::before{content:’’;flex:1;height:1px;background:var(–g3);}
#term-lines{font-size:9px;line-height:1.72;}
.tl{opacity:0;animation:si .18s forwards;}
.tok{color:var(–g);}.twarn{color:var(–o);}.talert{color:var(–r);}.tinfo{color:var(–b);}.ttap{color:var(–y);}

/* ANIMATIONS */
@keyframes gpulse{0%,100%{text-shadow:0 0 20px var(–g),0 0 40px #003300;}
50%{text-shadow:0 0 45px var(–g),0 0 90px #00aa44;}}
@keyframes fi{to{opacity:1;}}
@keyframes si{from{opacity:0;transform:translateX(-5px);}to{opacity:.93;transform:none;}}
@keyframes scanroll{from{background-position:0 0;}to{background-position:0 120px;}}
@keyframes rpulse{0%{box-shadow:0 0 0 0 rgba(0,255,65,.5);}
70%{box-shadow:0 0 0 70px rgba(0,255,65,0);}100%{box-shadow:0 0 0 0 rgba(0,255,65,0);}}
</style>

<script>
// ═══════════════════════════════════
//  CONFIG
// ═══════════════════════════════════
const CFG={
  FOCAL:900,        // увеличен для лучшей дальности
  CONF:0.17,        // агрессивный порог
  MAX_DET:50,
  SKIP:2,           // детекция каждые 2 кадра
  SMOOTH:0.5,       // сила сглаживания bbox
  TTL:20,           // кадров удерживать трек
  IOU:0.2           // порог сопоставления
};

// ─── РАСШИРЕННАЯ БАЗА ──────────────
const OBJ_H={
  // люди
  person:1.75,
  // транспорт
  car:1.55,truck:2.9,bus:3.3,motorcycle:1.15,bicycle:1.05,
  'fire hydrant':0.65,'stop sign':0.8,'parking meter':1.3,
  'traffic light':0.45,
  // животные
  bird:0.22,cat:0.32,dog:0.50,horse:1.65,sheep:0.85,
  cow:1.45,elephant:2.8,bear:1.2,zebra:1.5,giraffe:4.5,
  // мебель
  chair:0.9,couch:0.85,bench:0.95,'potted plant':0.7,
  bed:0.55,'dining table':0.78,toilet:0.42,
  // электроника
  tv:0.65,laptop:0.04,mouse:0.04,remote:0.03,
  keyboard:0.04,'cell phone':0.15,microwave:0.35,
  oven:0.65,toaster:0.22,sink:0.25,refrigerator:1.8,
  // кухня / еда
  bottle:0.28,cup:0.12,fork:0.2,knife:0.22,spoon:0.18,
  bowl:0.12,banana:0.2,apple:0.08,sandwich:0.08,orange:0.08,
  broccoli:0.25,carrot:0.2,hotdog:0.15,pizza:0.05,donut:0.06,cake:0.15,
  // разное
  backpack:0.55,umbrella:0.9,handbag:0.35,tie:0.02,suitcase:0.7,
  frisbee:0.03,skis:0.18,snowboard:0.25,'sports ball':0.22,kite:0.5,
  'baseball bat':0.9,'baseball glove':0.25,skateboard:0.15,
  surfboard:0.6,'tennis racket':0.7,book:0.22,clock:0.35,
  vase:0.3,scissors:0.2,'teddy bear':0.35,'hair drier':0.18,toothbrush:0.2,
  default:1.0
};

const CAT={
  HUMAN:['person'],
  VEHICLE:['car','truck','bus','motorcycle','bicycle'],
  ANIMAL:['bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe']
};
const THREAT=new Set(['person','car','truck','bus','motorcycle']);

const COL={
  person:'#ffff00',
  car:'#ff2244',truck:'#ff2244',bus:'#ff4466',motorcycle:'#ff6600',bicycle:'#ffaa00',
  'traffic light':'#ff9900','stop sign':'#ff9900','fire hydrant':'#ff6666',
  bird:'#ff88ff',cat:'#ff88ff',dog:'#ff99ff',horse:'#ffaaff',
  sheep:'#ddaaff',cow:'#ddaaff',elephant:'#cc88ff',bear:'#bb66ff',
  zebra:'#ddddff',giraffe:'#ffddaa',
  chair:'#888888',couch:'#888888',bench:'#aaaaaa','potted plant':'#44ff88',
  bottle:'#88ff88',cup:'#88ff88',backpack:'#00ffff',
  'cell phone':'#88aaff',laptop:'#88aaff',tv:'#88aaff',
  book:'#cccccc',clock:'#cccccc',
  _d:'#00ff41'
};

const DESC={
  person:'Обнаружен человек. Оценка позы и траектории активна.',
  car:'Легковой автомобиль. Классификация по габаритам кузова.',
  truck:'Грузовой транспорт. Повышенная зона риска вблизи.',
  bus:'Пассажирский автобус. Возможно скопление людей.',
  motorcycle:'Двухколёсный моторизованный транспорт.',
  bicycle:'Немоторизованный двухколёсный транспорт.',
  dog:'Собака. Классифицировано по силуэту.',
  cat:'Кошка. Малогабаритное животное.',
  bird:'Птица. Малый объект.',
  'cell phone':'Мобильное устройство.',
  laptop:'Портативный компьютер.',
  bottle:'Ёмкость бутылочного типа.',
  backpack:'Рюкзак / носимый груз.',
  'traffic light':'Светофор. Элемент дорожной инфраструктуры.',
  'stop sign':'Дорожный знак СТОП.',
  chair:'Предмет мебели — стул.',
  couch:'Предмет мебели — диван.',
  tv:'Экранное устройство — телевизор.',
  elephant:'Крупное животное. Опасная дистанция менее 20м.',
  horse:'Лошадь. Крупное животное.',
  _d:'Объект идентифицирован нейросетью COCO-SSD.'
};

function getCol(c){return COL[c]||COL._d;}
function getDesc(c){return DESC[c]||DESC._d;}
function dist(bbox,cls){
  const rh=OBJ_H[cls]||OBJ_H.default;
  const px=Math.max(bbox[2],bbox[3]);
  if(px<3) return 999;
  return Math.min(999,+(CFG.FOCAL*rh/px).toFixed(1));
}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function iou(a,b){
  const ix=Math.max(a[0],b[0]),iy=Math.max(a[1],b[1]);
  const iw=Math.min(a[0]+a[2],b[0]+b[2])-ix,ih=Math.min(a[1]+a[3],b[1]+b[3])-iy;
  if(iw<=0||ih<=0) return 0;
  return (iw*ih)/(a[2]*a[3]+b[2]*b[3]-iw*ih);
}
function lerp(a,b,t){return a+(b-a)*t;}

// ═══════════════════════════════════
//  TRACKER — стабильные рамки
// ═══════════════════════════════════
class Tracker{
  constructor(){this.tracks={};this.nid=1;}
  update(preds){
    // age all
    for(const k of Object.keys(this.tracks)){
      const t=this.tracks[k];
      t.age++;t.seen=false;
      if(t.age>CFG.TTL) delete this.tracks[k];
    }
    for(const p of preds){
      let best=null,bs=CFG.IOU;
      for(const t of Object.values(this.tracks)){
        if(t.cls!==p.class) continue;
        const s=iou(t.sm,p.bbox);
        if(s>bs){bs=s;best=t;}
      }
      if(best){
        // smooth interpolation
        best.sm=best.sm.map((v,i)=>lerp(v,p.bbox[i],CFG.SMOOTH));
        best.score=p.score;best.age=0;best.seen=true;
        p._tid=best.id;
      } else {
        const id=this.nid++;
        this.tracks[id]={id,cls:p.class,sm:[...p.bbox],score:p.score,age:0,seen:true,born:Date.now()};
        p._tid=id;
      }
    }
    return preds;
  }
  sm(tid){return this.tracks[tid]?.sm;}
  alive(tid){return Math.round((Date.now()-(this.tracks[tid]?.born||Date.now()))/1000);}
}

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const termEl=document.getElementById('term-lines');
let model=null,running=false,frameN=0;
let lastPred=[],lastFpsT=0,fpsCnt=0;
let termQ=[],logThr={};
let nightMode=false,selTid=null;
const tracker=new Tracker();

// ═══════════════════════════════════
//  BOOT
// ═══════════════════════════════════
const bootLog=document.getElementById('boot-log');
const pbEl=document.getElementById('pb');
const BOOT=[
  [0,   "INIT VISION_OS v3.0..."],
  [300, "TENSORFLOW_JS: LOADING"],
  [550, "WEBGL_BACKEND: ACTIVE"],
  [800, "COCO-SSD: FETCHING MODEL..."],
  [1050,"OBJECT_DB: 80 CLASSES + META EXTENDED"],
  [1250,"TRACKER: SMOOTH_BOX INTERPOLATION ON"],
  [1450,"RANGE_MODULE: FOCAL=900px READY"],
  [1650,"NIGHT_VISION: STANDBY"],
  [1850,"TAP_INSPECTOR: READY"],
];
async function bootSeq(){
  let prev=0;
  for(let i=0;i<BOOT.length;i++){
    const[d,t]=BOOT[i];
    await sl(d-prev);prev=d;
    bline(t);pbEl.style.width=((i+1)/BOOT.length*65)+'%';
  }
  try{
    await tf.ready();
    tf.env().set('WEBGL_CPU_FORWARD',false);
    model=await cocoSsd.load({base:'lite_mobilenet_v2'});
    bline("NEURAL ENGINE: ONLINE ✓");
    pbEl.style.width='100%';
    await sl(300);
    document.getElementById('btn-start').style.display='block';
  }catch(e){bline("ERR: "+e.message);}
}
function bline(t){
  const d=document.createElement('div');
  d.className='bl';d.textContent='> '+t;
  bootLog.appendChild(d);bootLog.scrollTop=bootLog.scrollHeight;
}
function sl(ms){return new Promise(r=>setTimeout(r,ms));}

// ═══════════════════════════════════
//  CAMERA
// ═══════════════════════════════════
async function initCamera(){
  document.getElementById('btn-start').style.display='none';
  bline("CAMERA: REQUESTING...");
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}}
    });
    video.srcObject=s;
    video.onloadedmetadata=()=>{
      video.play();
      const boot=document.getElementById('boot');
      boot.style.transition='opacity .5s';boot.style.opacity='0';
      setTimeout(()=>{boot.style.display='none';document.getElementById('app').style.display='flex';},500);
      running=true;
      log("VISION_OS v3.0 ONLINE",'ok');
      log("SMOOTH_TRACKER: ACTIVE | 80 CLASSES",'info');
      log("TAP ANY BOX → FULL OBJECT REPORT",'info');
      requestAnimationFrame(renderLoop);
    };
  }catch(e){
    bline("ERR: "+e.message);
    document.getElementById('btn-start').style.display='block';
  }
}

// ═══════════════════════════════════
//  TERMINAL
// ═══════════════════════════════════
function log(txt,type='ok'){
  termQ.push({txt,type});
  if(termQ.length>40) termQ.shift();
  const lines=termQ.slice(-5);
  termEl.innerHTML='';
  lines.forEach(({txt:t,type:tp})=>{
    const d=document.createElement('div');
    d.className='tl t'+tp;d.textContent='> '+t;
    termEl.appendChild(d);
  });
}
function canLog(cls){
  const now=Date.now();
  if(!logThr[cls]||now-logThr[cls]>4000){logThr[cls]=now;return true;}
  return false;
}

// ═══════════════════════════════════
//  NIGHT MODE
// ═══════════════════════════════════
function toggleNight(){
  nightMode=!nightMode;
  video.style.filter=nightMode
    ?'brightness(.4) contrast(1.7) saturate(0) sepia(.9) hue-rotate(80deg)'
    :'brightness(.55) contrast(1.38) saturate(.88)';
  document.getElementById('night-btn').textContent=nightMode?'☀ DAY':'☾ NIGHT';
  log('NIGHT_MODE: '+(nightMode?'ON':'OFF'),nightMode?'warn':'ok');
}

// ═══════════════════════════════════
//  TAP → INFO PANEL
// ═══════════════════════════════════
canvas.addEventListener('click',handleTap);
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  handleTap({clientX:t.clientX,clientY:t.clientY});
},{passive:false});

function handleTap(e){
  if(!lastPred.length){closeInfo();return;}
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  const cx=(e.clientX-rect.left)*sx,cy=(e.clientY-rect.top)*sy;
  let hit=null,ba=Infinity;
  for(const p of lastPred){
    const b=tracker.sm(p._tid)||p.bbox;
    const[x,y,w,h]=b;
    if(cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h){
      const a=w*h;if(a<ba){ba=a;hit=p;}
    }
  }
  if(hit) showInfo(hit);
  else closeInfo();
}

function showInfo(p){
  selTid=p._tid;
  const b=tracker.sm(p._tid)||p.bbox;
  const[x,y,w,h]=b;
  const cls=p.class,conf=Math.round(p.score*100);
  const d=dist(b,cls),dTxt=d<999?d+'m':'>300m';
  const col=getCol(cls);
  const alive=tracker.alive(p._tid);
  const zone=`${Math.round(x+w/2)}×${Math.round(y+h/2)}`;
  const sz=`${Math.round(w)}×${Math.round(h)}px`;
  const isThr=THREAT.has(cls);
  const cat=CAT.HUMAN.includes(cls)?'HUMAN':CAT.VEHICLE.includes(cls)?'VEHICLE':
             CAT.ANIMAL.includes(cls)?'ANIMAL':'OBJECT';
  const rows=[
    ['CLASS',cls.toUpperCase()],['CATEGORY',cat],
    ['DISTANCE',dTxt],['CONFIDENCE',conf+'%'],
    ['THREAT',isThr?'⚠ YES':'NO'],
    ['BBOX',sz],['CENTER',zone],
    ['TRACK ID','#'+p._tid],['ALIVE',alive+'s'],
  ];
  document.getElementById('info-title').textContent=cls.toUpperCase();
  document.getElementById('info-title').style.color=col;
  document.getElementById('info-grid').innerHTML=
    rows.map(([k,v])=>`<div class="ik">${k}</div><div class="iv">${v}</div>`).join('');
  document.getElementById('info-desc').textContent=getDesc(cls);
  document.getElementById('info-panel').classList.add('open');
  log(`[TAP] ${cls.toUpperCase()} #${p._tid} — ${dTxt} CONF:${conf}% ALIVE:${alive}s`,'tap');
}
function closeInfo(){
  selTid=null;
  document.getElementById('info-panel').classList.remove('open');
}

// ═══════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════
async function renderLoop(now){
  if(!running){requestAnimationFrame(renderLoop);return;}
  fpsCnt++;
  if(now-lastFpsT>700){
    document.getElementById('b-fps').textContent=Math.round(fpsCnt*1000/(now-lastFpsT))+' FPS';
    fpsCnt=0;lastFpsT=now;
  }
  frameN++;
  if(frameN%CFG.SKIP===0&&video.readyState===4){
    canvas.width=video.videoWidth||640;
    canvas.height=video.videoHeight||480;
    try{
      const raw=await model.detect(video,CFG.MAX_DET,CFG.CONF);
      lastPred=tracker.update(raw);
    }catch(e){}
    draw();
    updateHUD();
  }
  requestAnimationFrame(renderLoop);
}

// ═══════════════════════════════════
//  DRAW
// ═══════════════════════════════════
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of lastPred){
    const sm=tracker.sm(p._tid)||p.bbox;
    const[x,y,w,h]=sm;
    const cls=p.class,conf=p.score;
    const d=dist(sm,cls);
    const col=getCol(cls);
    const isThr=THREAT.has(cls);
    const isFar=d>80;
    const isSel=p._tid===selTid;

    ctx.save();

    // fill
    ctx.fillStyle=hexA(col,isSel?.15:.05);
    ctx.fillRect(x,y,w,h);

    // box stroke
    ctx.globalAlpha=isFar?.62:1;
    ctx.lineWidth=isThr?2.5:1.8;
    ctx.strokeStyle=col;
    ctx.setLineDash(isFar?[7,4]:[]);
    ctx.strokeRect(x,y,w,h);
    ctx.setLineDash([]);ctx.globalAlpha=1;

    // selection glow
    if(isSel){
      ctx.strokeStyle=col;ctx.lineWidth=4;ctx.globalAlpha=.3;
      ctx.strokeRect(x-3,y-3,w+6,h+6);
      ctx.globalAlpha=1;
    }

    // corner brackets
    corners(x,y,w,h,col,isThr?3:2);

    // label bg
    const lh=32,pad=4,lw2=Math.min(w,195);
    const ly=y>lh+2?y-lh:y+h;
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(x,ly,lw2,lh);
    ctx.fillStyle=col;ctx.fillRect(x,ly,2,lh); // accent bar

    // label: class name
    ctx.fillStyle=col;
    ctx.font=`bold ${isThr?11:10}px 'Share Tech Mono',monospace`;
    ctx.fillText(cls.toUpperCase(),x+pad+2,ly+12);

    // label: dist · conf · id
    ctx.fillStyle='rgba(200,255,200,.78)';
    ctx.font='8.5px monospace';
    const dTxt=d<999?d+'m':'>300m';
    ctx.fillText(`${dTxt} · ${Math.round(conf*100)}% · #${p._tid}`,x+pad+2,ly+24);

    // threat spike
    if(isThr){
      ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(x+w/2,y);ctx.lineTo(x+w/2,Math.max(0,y-16));
      ctx.stroke();ctx.setLineDash([]);
    }

    // tap dot (bottom-right)
    ctx.fillStyle=hexA(col,.5);
    ctx.beginPath();ctx.arc(x+w-5,y+h-5,3,0,Math.PI*2);ctx.fill();

    ctx.restore();
  }
}

function corners(x,y,w,h,col,lw){
  const s=Math.min(18,w*.28,h*.28);
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x,y+s);ctx.lineTo(x,y);ctx.lineTo(x+s,y);
  ctx.moveTo(x+w-s,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y+s);
  ctx.moveTo(x,y+h-s);ctx.lineTo(x,y+h);ctx.lineTo(x+s,y+h);
  ctx.moveTo(x+w-s,y+h);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w,y+h-s);
  ctx.stroke();
}

// ═══════════════════════════════════
//  HUD
// ═══════════════════════════════════
function updateHUD(){
  const total=lastPred.length;
  document.getElementById('b-obj').textContent=total+' OBJ';
  let P=0,V=0,A=0,O=0,thr=0,maxD=0,cSum=0;
  lastPred.forEach(p=>{
    const cls=p.class;
    const d=parseFloat(dist(tracker.sm(p._tid)||p.bbox,cls));
    cSum+=p.score;if(d>maxD) maxD=d;
    if(CAT.HUMAN.includes(cls)) P++;
    else if(CAT.VEHICLE.includes(cls)) V++;
    else if(CAT.ANIMAL.includes(cls)) A++;
    else O++;
    if(THREAT.has(cls)) thr++;
    if(canLog(cls)){
      const dTxt=d<999?d+'m':'>300m';
      log(`${cls.toUpperCase()} — ${dTxt} CONF:${Math.round(p.score*100)}%`,THREAT.has(cls)?'warn':'info');
    }
  });
  document.getElementById('cp').textContent=P;
  document.getElementById('cv').textContent=V;
  document.getElementById('ca').textContent=A;
  document.getElementById('co').textContent=O;
  document.getElementById('s-dist').textContent=maxD>0?maxD.toFixed(0)+'m':'---';
  document.getElementById('s-thr').textContent=thr;
  document.getElementById('s-conf').textContent=total>0?Math.round(cSum/total*100)+'%':'---%';
  document.getElementById('s-trk').textContent=Object.keys(tracker.tracks).length;
  // range badge
  const rb=document.getElementById('b-rng');
  rb.textContent=maxD>150?'LONG':(maxD>60?'MED':'STD');
  rb.className=maxD>150?'badge wn':(maxD>60?'badge hi':'badge');
  // mode badge
  const mb=document.getElementById('b-mode');
  if(thr>0){mb.textContent='THREAT';mb.className='badge al';}
  else if(total>0){mb.textContent='ACTIVE';mb.className='badge hi';}
  else{mb.textContent='SCAN';mb.className='badge';}
}

bootSeq();
</script>
