<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE AI SURVEILLANCE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- Используем проверенную сборку face-api -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root { --green: #00ff41; --blue: #0084ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: var(--green);
        }
        button {
            background: rgba(0, 255, 65, 0.1); border: 1px solid var(--green);
            color: var(--green); padding: 20px 40px; font-size: 1rem; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); text-transform: uppercase;
        }
        #log { font-size: 10px; margin-top: 20px; color: #666; width: 80%; text-align: left; max-height: 150px; overflow-y: auto; }
        .hud { position: absolute; z-index: 10; color: var(--green); font-size: 11px; pointer-events: none; padding: 20px; width: 100%; box-sizing: border-box; text-shadow: 1px 1px #000; }
        .bottom-ui { bottom: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 20px; letter-spacing: 3px; margin-bottom: 10px;">NEURAL ANALYZER v5.0</div>
    <button id="start-btn">INITIALIZE SYSTEM</button>
    <div id="log">SYSTEM READY...</div>
</div>

<div id="container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div class="hud" style="top:0">
        <div>OS: AI_SURVEILLANCE_PRO</div>
        <div id="fps-info">SCANNING...</div>
    </div>
    <div class="hud bottom-ui">
        <span>BIO_DETECTOR: ON</span>
        <span>OBJECT_LOG: ACTIVE</span>
        <span style="color:#ff004c; animation: blink 1s infinite;">● LIVE FEED</span>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const log = document.getElementById('log');

    let objModel = null;
    const FOCAL_LENGTH = 900; 

    function writeLog(msg) { 
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    async function initAI() {
        startBtn.style.display = 'none';
        try {
            writeLog("ACCESSING CAMERA...");
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } },
                audio: false
            });
            video.srcObject = stream;
            await new Promise(r => video.onloadedmetadata = () => video.play().then(r));

            writeLog("LOADING COCO-SSD...");
            objModel = await cocoSsd.load();

            writeLog("LOADING FACE-API MODELS...");
            // Исправленные названия сетей для этой библиотеки
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL); // Исправлено имя

            writeLog("SYNCHRONIZING...");
            setTimeout(() => { overlay.style.display = 'none'; render(); }, 1000);
        } catch (e) {
            writeLog("CRITICAL ERROR: " + e.message);
            console.error(e);
        }
    }

    async function render() {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        try {
            // Запускаем параллельно детекцию объектов и лиц
            const [objects, faces] = await Promise.all([
                objModel.detect(video),
                faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withAgeAndGender()
            ]);

            objects.forEach(obj => {
                const [x, y, w, h] = obj.bbox;
                const label = obj.class;
                
                // Дистанция и цвета
                let realWidth = 0.6;
                if (label === 'car' || label === 'truck') realWidth = 1.8;
                const distance = (realWidth * FOCAL_LENGTH) / w;
                const color = label === 'person' ? '#00ff41' : '#0084ff';

                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // Заголовок
                ctx.fillStyle = color;
                ctx.font = 'bold 12px monospace';
                let typeText = label === 'person' ? "HUMAN" : "OBJECT";
                ctx.fillText(`${typeText}: ${label.toUpperCase()}`, x, y - 10);
                ctx.fillText(`DIST: ${distance.toFixed(1)}m`, x, y - 25);

                // Объем для предметов
                if (label !== 'person') {
                    const volume = (w * h * ((w + h) / 2) * 0.00005).toFixed(2);
                    ctx.fillStyle = "#fff";
                    ctx.fillText(`VOL_EST: ${volume} m³`, x, y + h + 15);
                }

                drawBrackets(x, y, w, h);
            });

            // Данные лиц
            faces.forEach(f => {
                const { x, y, width, height } = f.detection.box;
                ctx.strokeStyle = '#fff';
                ctx.setLineDash([4, 4]);
                ctx.strokeRect(x, y, width, height);
                ctx.setLineDash([]);

                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                const gender = f.gender === 'male' ? 'MALE' : 'FEMALE';
                ctx.fillText(`BIO: ${gender} / ${Math.round(f.age)}yrs`, x, y + height + 15);
                // Примерный рост на основе пропорций лица
                const estHeight = Math.round((7.5 * height) * (FOCAL_LENGTH / 1000));
                ctx.fillText(`H_EST: ~${estHeight}cm`, x, y + height + 28);
            });

        } catch (err) {
            console.warn("Frame skip", err);
        }

        requestAnimationFrame(render);
    }

    function drawBrackets(x, y, w, h) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        const s = 15;
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }

    startBtn.addEventListener('click', initAI);
</script>

<style>
    @keyframes blink { 50% { opacity: 0.3; } }
</style>
</body>
</html>
