<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myFACE + HANDS</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    :root {
      --c-bg: #000;
      --c-border: #1a1a1a;
      --c-dim: #2a2a2a;
      --c-mid: #555;
      --c-bright: #fff;
      --c-accent: #e8ff00;
      --c-green: #00ff88;
      --c-red: #ff3030;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--c-bg);
      color: var(--c-mid);
      font-family: var(--font-mono);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── PRELOADER ── */
    #preloader {
      position: fixed; inset: 0;
      background: #000;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.6s ease;
    }

    #preloader.fade-out { opacity: 0; pointer-events: none; }

    .pre-label {
      font-family: var(--font-display);
      font-size: clamp(40px, 8vw, 80px);
      letter-spacing: 0.15em;
      color: var(--c-bright);
      line-height: 1;
      margin-bottom: 8px;
    }

    .pre-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--c-mid);
      margin-bottom: 60px;
    }

    #status-text {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--c-mid);
      margin-bottom: 40px;
      min-height: 14px;
      transition: color 0.3s;
    }

    #status-text.error { color: var(--c-red); }

    #access-btn {
      background: none;
      border: 1px solid var(--c-bright);
      color: var(--c-bright);
      padding: 14px 40px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
      position: relative;
      overflow: hidden;
    }

    #access-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--c-accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: -1;
    }

    #access-btn:hover { color: #000; border-color: var(--c-accent); }
    #access-btn:hover::before { transform: scaleX(1); }
    #access-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    .loader-bar {
      width: 200px;
      height: 1px;
      background: var(--c-dim);
      margin-top: 40px;
      overflow: hidden;
      display: none;
    }

    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: var(--c-bright);
      animation: slide 1s ease-in-out infinite alternate;
    }

    @keyframes slide { from { transform: translateX(-100%); } to { transform: translateX(350%); } }

    .pre-credit {
      position: absolute;
      bottom: 24px;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--c-dim);
    }

    /* ── MAIN CONTAINER ── */
    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: none;
    }

    .input_video { display: none; }

    .output_canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    /* ── SCAN OVERLAY ── */
    .scan-grid {
      position: absolute; inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .scan-line {
      position: absolute; inset: 0;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(transparent 50%, rgba(0, 255, 136, 0.025) 50%);
      background-size: 100% 4px;
      animation: scanlines 0.1s steps(1) infinite;
    }

    @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 4px; } }

    /* ── CORNER BRACKETS ── */
    .corner {
      position: absolute;
      z-index: 4;
      width: 30px;
      height: 30px;
      pointer-events: none;
    }

    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--c-bright);
      opacity: 0.4;
    }

    .corner-tl { top: 16px; left: 16px; }
    .corner-tl::before { top: 0; left: 0; width: 1px; height: 100%; }
    .corner-tl::after  { top: 0; left: 0; width: 100%; height: 1px; }

    .corner-tr { top: 16px; right: 16px; }
    .corner-tr::before { top: 0; right: 0; width: 1px; height: 100%; }
    .corner-tr::after  { top: 0; right: 0; width: 100%; height: 1px; }

    .corner-bl { bottom: 16px; left: 16px; }
    .corner-bl::before { bottom: 0; left: 0; width: 1px; height: 100%; }
    .corner-bl::after  { bottom: 0; left: 0; width: 100%; height: 1px; }

    .corner-br { bottom: 16px; right: 16px; }
    .corner-br::before { bottom: 0; right: 0; width: 1px; height: 100%; }
    .corner-br::after  { bottom: 0; right: 0; width: 100%; height: 1px; }

    /* ── TOP BAR ── */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      pointer-events: none;
    }

    .top-bar-left { display: flex; flex-direction: column; gap: 4px; }
    .top-bar-right { display: flex; gap: 8px; pointer-events: all; }

    .status-line {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--c-mid);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .dot.active { background: var(--c-green); box-shadow: 0 0 6px var(--c-green); animation: pulse 2s infinite; }
    .dot.warning { background: var(--c-accent); }
    .dot.alert { background: var(--c-red); animation: pulse 0.5s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .ui-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--c-dim);
      color: var(--c-mid);
      padding: 7px 14px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }

    .ui-btn:hover { border-color: var(--c-bright); color: var(--c-bright); }

    /* ── BOTTOM PANEL ── */
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
      padding: 0 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #live-speech-box {
      font-family: var(--font-display);
      font-size: clamp(18px, 3vw, 30px);
      letter-spacing: 0.1em;
      color: var(--c-bright);
      min-height: 36px;
      text-align: center;
      text-shadow: 0 0 20px rgba(232,255,0,0.3);
      transition: color 0.3s;
    }

    #live-speech-box.speaking { color: var(--c-accent); }

    #audio_visualizer {
      width: 100%;
      height: 50px;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--c-dim);
      margin-bottom: 4px;
    }

    .terminal-title {
      font-size: 8px;
      letter-spacing: 0.35em;
      color: var(--c-dim);
    }

    .log-count {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--c-dim);
    }

    #terminal-box {
      height: 80px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--c-dim) transparent;
    }

    .log-entry {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--c-mid);
      padding: 2px 0 2px 10px;
      border-left: 1px solid var(--c-dim);
      white-space: pre-wrap;
      line-height: 1.6;
      transition: color 0.3s;
    }

    .log-entry.new { color: var(--c-bright); border-left-color: var(--c-accent); }

    /* ── SYSTEM TIME ── */
    #sys-time {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--c-dim);
      font-family: var(--font-mono);
    }

    /* ── FACE LOCK INDICATOR ── */
    #face-lock-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #face-lock-ring.visible { opacity: 0.15; }

    #face-lock-ring svg {
      width: 200px; height: 200px;
      animation: rotateSlow 8s linear infinite;
    }

    @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

</head>

  </div>

  <script>
    // ── GLOBALS ──
    const videoElement   = document.querySelector('.input_video');
    const canvasElement  = document.querySelector('.output_canvas');
    const canvasCtx      = canvasElement.getContext('2d');
    const liveSpeechBox  = document.getElementById('live-speech-box');
    const terminalBox    = document.getElementById('terminal-box');
    const logContent     = document.getElementById('log-content');
    const audioCanvas    = document.getElementById('audio_visualizer');
    const aCtx           = audioCanvas.getContext('2d');
    const targetStatus   = document.getElementById('target-status');
    const targetDot      = document.getElementById('target-dot');
    const handStatus     = document.getElementById('hand-status');
    const handDot        = document.getElementById('hand-dot');
    const faceLockRing   = document.getElementById('face-lock-ring');
    const logCountEl     = document.getElementById('log-count');

    let currentFacingMode = 'user';
    let cameraInstance    = null;
    let globalStream      = null;
    let audioCtx, analyser, freqData;
    let isSpeaking        = false;
    let logCount          = 0;
    let animFrameId       = null;
    let lastFaceState     = null;
    let lastHandCount     = -1;

    // ── SYSTEM CLOCK ──
    (function clockTick() {
      document.getElementById('sys-time').textContent =
        new Date().toLocaleTimeString('ru-RU', { hour12: false });
      setTimeout(clockTick, 1000);
    })();

    // ── LOG SYSTEM (no typewriter — too slow for real use) ──
    function addLog(text) {
      logCount++;
      logCountEl.textContent = `${logCount} ENTRIES`;
      const ts = new Date().toLocaleTimeString('ru-RU', { hour12: false });
      const entry = document.createElement('div');
      entry.className = 'log-entry new';
      entry.textContent = `[${ts}] ${text.toUpperCase()}`;
      logContent.appendChild(entry);
      terminalBox.scrollTop = terminalBox.scrollHeight;
      // Dim old entries
      setTimeout(() => entry.classList.remove('new'), 2000);
      // Limit DOM nodes
      while (logContent.children.length > 60) {
        logContent.removeChild(logContent.firstChild);
      }
    }

    // ── EXPORT ──
    document.getElementById('export-btn').addEventListener('click', () => {
      const entries = [...logContent.querySelectorAll('.log-entry')].map(e => e.textContent);
      if (!entries.length) { alert('LOG IS EMPTY'); return; }
      const blob = new Blob(['NEURAL SCANNER LOG\n──────────────────\n' + entries.join('\n')], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `neural_log_${Date.now()}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // ── INIT SEQUENCE ──
    window.startSequence = async function() {
      const btn    = document.getElementById('access-btn');
      const bar    = document.getElementById('loader-bar');
      const status = document.getElementById('status-text');

      btn.disabled = true;
      status.classList.remove('error');
      bar.style.display = 'block';

      // Check basic API support
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        status.textContent = 'ERROR: CAMERA API NOT AVAILABLE (NEED HTTPS OR LOCALHOST)';
        status.classList.add('error');
        bar.style.display = 'none';
        btn.disabled = false;
        return;
      }

      try {
        status.textContent = 'REQUESTING CAMERA ACCESS...';
        // Request video first (most likely to fail — gives clearer error)
        const videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });

        status.textContent = 'REQUESTING MICROPHONE ACCESS...';
        let audioStream = null;
        try {
          audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        } catch(audioErr) {
          // Audio is optional — continue without it
          console.warn('Audio access denied:', audioErr);
          addLog && addLog('AUDIO: ACCESS DENIED — VISUALIZER DISABLED');
        }

        // Combine into globalStream
        globalStream = new MediaStream([
          ...videoStream.getTracks(),
          ...(audioStream ? audioStream.getTracks() : [])
        ]);

        if (audioStream) {
          status.textContent = 'CALIBRATING AUDIO CORE...';
          initAudio(audioStream);
        }

        status.textContent = 'LOADING NEURAL MODELS...';
        await initModels();

        status.textContent = 'STARTING CAMERA FEED...';
        await startCamera(videoStream);

        status.textContent = 'ONLINE';

        // Transition
        const preloader = document.getElementById('preloader');
        preloader.classList.add('fade-out');
        setTimeout(() => {
          preloader.style.display = 'none';
          document.getElementById('container').style.display = 'block';
          if (audioStream) initSpeech();
          addLog('SYSTEM ONLINE — BIOMETRIC SCAN ACTIVE');
        }, 600);

      } catch (err) {
        console.error(err);
        let msg = 'FATAL: ';
        if (err.name === 'NotAllowedError')     msg += 'PERMISSION DENIED BY USER';
        else if (err.name === 'NotFoundError')  msg += 'NO CAMERA FOUND ON DEVICE';
        else if (err.name === 'NotReadableError') msg += 'CAMERA IN USE BY ANOTHER APP';
        else if (err.name === 'OverconstrainedError') msg += 'CAMERA CONSTRAINTS FAILED';
        else if (err.name === 'SecurityError')  msg += 'HTTPS REQUIRED (NOT FILE://)';
        else msg += err.message || 'UNKNOWN ERROR';
        status.textContent = msg;
        status.classList.add('error');
        bar.style.display = 'none';
        btn.disabled = false;
      }
    };

    // ── AUDIO SETUP ──
    function initAudio(audioStream) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        analyser.smoothingTimeConstant = 0.75;
        freqData  = new Uint8Array(analyser.frequencyBinCount);
        const source = audioCtx.createMediaStreamSource(audioStream);
        source.connect(analyser);
        drawBars();
      } catch(e) {
        console.warn('Audio init failed:', e);
      }
    }

    function drawBars() {
      animFrameId = requestAnimationFrame(drawBars);
      if (!analyser) return;

      const W = audioCanvas.clientWidth;
      const H = audioCanvas.clientHeight;
      if (audioCanvas.width !== W)  audioCanvas.width  = W;
      if (audioCanvas.height !== H) audioCanvas.height = H;

      analyser.getByteFrequencyData(freqData);
      aCtx.clearRect(0, 0, W, H);

      let sum = 0;
      const barW  = Math.max(1, (W / freqData.length) - 1);
      const half  = Math.floor(freqData.length / 2);

      for (let i = 0; i < freqData.length; i++) {
        const v   = freqData[i];
        sum += v;
        const bH  = (v / 255) * H;
        const x   = (i < half)
          ? (half - 1 - i) * (barW + 1)
          : (i - half) * (barW + 1) + W / 2;

        const alpha = 0.3 + (v / 255) * 0.7;
        aCtx.fillStyle = isSpeaking
          ? `rgba(232,255,0,${alpha})`
          : `rgba(255,255,255,${alpha * 0.5})`;
        aCtx.fillRect(x, H - bH, barW, bH);
      }
      isSpeaking = (sum / freqData.length) > 28;
      liveSpeechBox.classList.toggle('speaking', isSpeaking);
    }

    // ── SPEECH ──
    function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { addLog('SPEECH ENGINE: NOT SUPPORTED IN THIS BROWSER'); return; }

      const rec = new SR();
      rec.continuous      = true;
      rec.interimResults  = true;
      rec.lang            = 'ru-RU';

      rec.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript.trim();
          if (e.results[i].isFinal && t) { addLog(t); }
          else interim = t;
        }
        liveSpeechBox.textContent = interim ? interim.toUpperCase() : '—';
      };

      rec.onend   = () => { try { rec.start(); } catch(_) {} };
      rec.onerror = (e) => { if (e.error !== 'no-speech') addLog(`SPEECH ERROR: ${e.error}`); };
      try { rec.start(); } catch(_) {}
    }

    // ── MEDIAPIPE MODELS ──
    let faceMesh, hands;
    let faceResults = null, handResults = null;

    async function initModels() {
      return new Promise((resolve, reject) => {
        let faceReady = false, handsReady = false;
        const check = () => { if (faceReady && handsReady) resolve(); };

        faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5, maxNumFaces: 1 });
        faceMesh.onResults(res => { faceResults = res; renderFrame(); });
        faceMesh.initialize().then(() => { faceReady = true; check(); }).catch(reject);

        hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(res => { handResults = res; });
        hands.initialize().then(() => { handsReady = true; check(); }).catch(reject);
      });
    }

    // ── CAMERA ──
    let currentVideoStream = null;

    async function startCamera(videoStream) {
      if (cameraInstance) { await cameraInstance.stop(); cameraInstance = null; }

      // Stop previous video tracks if switching
      if (currentVideoStream && currentVideoStream !== videoStream) {
        currentVideoStream.getTracks().forEach(t => t.stop());
      }
      currentVideoStream = videoStream;

      videoElement.srcObject = videoStream;
      await new Promise((res, rej) => {
        videoElement.onloadedmetadata = res;
        videoElement.onerror = rej;
        setTimeout(res, 3000); // safety timeout
      });

      try { await videoElement.play(); } catch(e) { /* autoplay policy — Camera util will handle it */ }

      cameraInstance = new Camera(videoElement, {
        onFrame: async () => {
          if (videoElement.readyState < 2) return;
          try {
            await faceMesh.send({ image: videoElement });
            await hands.send({ image: videoElement });
          } catch(e) { /* frame skip on overload */ }
        },
        width: 1280, height: 720
      });
      await cameraInstance.start();

      canvasElement.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', async () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      try {
        const newVideoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        await startCamera(newVideoStream);
        addLog(`CAMERA SWITCHED: ${currentFacingMode.toUpperCase()}`);
      } catch(err) {
        addLog(`SWITCH FAILED: ${err.name}`);
        // Revert
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      }
    });

    // ── RENDER ──
    function renderFrame() {
      if (!faceResults) return;

      canvasElement.width  = videoElement.videoWidth  || 1280;
      canvasElement.height = videoElement.videoHeight || 720;
      const W = canvasElement.width, H = canvasElement.height;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, W, H);

      // Dim video feed
      canvasCtx.globalAlpha = 0.12;
      canvasCtx.drawImage(faceResults.image, 0, 0, W, H);
      canvasCtx.globalAlpha = 1.0;

      // ── FACE ──
      const faceLandmarks = faceResults.multiFaceLandmarks;
      const faceDetected  = faceLandmarks && faceLandmarks.length > 0;

      if (faceDetected) {
        if (lastFaceState !== 'acquired') { addLog('TARGET ACQUIRED'); lastFaceState = 'acquired'; }
        targetStatus.textContent = 'TARGET: ACQUIRED';
        targetDot.className = 'dot active';
        faceLockRing.classList.add('visible');

        for (const lm of faceLandmarks) {
          const leftD  = Math.hypot(lm[159].x - lm[145].x, lm[159].y - lm[145].y);
          const rightD = Math.hypot(lm[386].x - lm[374].x, lm[386].y - lm[374].y);
          const eyesClosed = leftD < 0.015 && rightD < 0.015;

          const color = isSpeaking ? '#e8ff00' : (eyesClosed ? '#ff3030' : '#ffffff');

          drawConnectors(canvasCtx, lm, FACEMESH_TESSELATION,  { color: color + '1a', lineWidth: 0.4 });
          drawConnectors(canvasCtx, lm, FACEMESH_RIGHT_EYE,    { color: color + 'cc', lineWidth: 0.8 });
          drawConnectors(canvasCtx, lm, FACEMESH_LEFT_EYE,     { color: color + 'cc', lineWidth: 0.8 });
          drawConnectors(canvasCtx, lm, FACEMESH_LIPS,         { color: color + 'aa', lineWidth: 0.8 });
        }
      } else {
        if (lastFaceState !== 'seeking') { addLog('TARGET LOST'); lastFaceState = 'seeking'; }
        targetStatus.textContent = 'TARGET: SEEKING';
        targetDot.className = 'dot';
        faceLockRing.classList.remove('visible');
      }

      // ── HANDS ──
      const handLandmarks = handResults?.multiHandLandmarks;
      const handCount = (handLandmarks && handLandmarks.length) || 0;

      if (handCount !== lastHandCount) {
        if (handCount > 0) addLog(`LIMBS DETECTED: ${handCount}`);
        else if (lastHandCount > 0) addLog('LIMBS LOST');
        lastHandCount = handCount;
      }

      if (handCount > 0) {
        handStatus.textContent = `LIMBS: ${handCount} DETECTED`;
        handDot.className = 'dot active';
        for (const lm of handLandmarks) {
          drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.7)', lineWidth: 1.5 });
          drawLandmarks(canvasCtx, lm, { color: '#ffffff', lineWidth: 1, radius: 2 });
        }
      } else {
        handStatus.textContent = 'LIMBS: NOT DETECTED';
        handDot.className = 'dot';
      }

      canvasCtx.restore();
    }
  </script>
