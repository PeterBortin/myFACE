<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAULT-TEC | VISION_OS v12.0 PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --pip-white: #ffffff;
            --pip-green: #1aff80;
            --pip-bg: #050a05;
            --glow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'VT323', monospace; }

        body, html { 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            color: var(--pip-white); 
        }

        /* CRT Scanline Effect */
        #container::before {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none;
        }

        #viewport { 
            position: relative; width: 100vw; height: calc(100vh - 160px); 
            background: #000; overflow: hidden;
        }

        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(0.5) brightness(0.6) contrast(1.2);
        }

        canvas { 
            position: absolute; inset: 0; z-index: 5; 
            pointer-events: none; 
        }

        #terminal { 
            height: 160px; background: var(--pip-bg); 
            border-top: 2px solid var(--pip-white); padding: 12px; 
            overflow: hidden; box-shadow: inset 0 0 20px #000;
        }

        .term-row { font-size: 19px; margin-bottom: 2px; color: var(--pip-green); }

        #boot-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }

        .boot-btn { 
            background: none; border: 2px solid var(--pip-white); 
            color: var(--pip-white); padding: 15px 40px; 
            font-size: 28px; cursor: pointer; transition: 0.3s;
        }

        .boot-btn:hover { background: var(--pip-white); color: #000; }
    </style>
</head>
<body>

<div id="boot-overlay">
    <div style="font-size: 40px; margin-bottom: 20px; letter-spacing: 5px;">SYSTEM_V12.0_READY</div>
    <button class="boot-btn" onclick="initialize()">INITIALIZE LINK</button>
</div>

<div id="container">
    <div id="viewport">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termContent = document.getElementById('term-content');

    let model = null;
    let predictions = [];
    let smoothPredictions = new Map(); // Для сглаживания движения рамок
    const LERP_FACTOR = 0.25; // Коэффициент плавности (0.1 - медленно, 0.9 - мгновенно)

    async function initialize() {
        writeTerm("CONNECTING TO NEURAL_NETWORK...");
        try {
            await tf.setBackend('wasm');
            model = await cocoSsd.load({ base: 'mobilenet_v2' });
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('boot-overlay').style.display = 'none';
                writeTerm("OPTICAL LINK ESTABLISHED.");
                writeTerm("MODE: MULTI-TARGET RECOGNITION ACTIVE.");
                requestAnimationFrame(render);
            };
        } catch (e) {
            alert("INIT_ERROR: " + e.message);
        }
    }

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 6) termContent.lastChild.remove();
    }

    // Линейная интерполяция для сглаживания
    function lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
    }

    function render() {
        model.detect(video, 20, 0.4).then(preds => {
            predictions = preds;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(p => {
                const id = p.class;
                let [x, y, w, h] = p.bbox;

                // Сглаживание координат (убирает мигание и тряску)
                if (!smoothPredictions.has(id)) {
                    smoothPredictions.set(id, { x, y, w, h });
                }
                
                let s = smoothPredictions.get(id);
                s.x = lerp(s.x, x, LERP_FACTOR);
                s.y = lerp(s.y, y, LERP_FACTOR);
                s.w = lerp(s.w, w, LERP_FACTOR);
                s.h = lerp(s.h, h, LERP_FACTOR);

                drawObjectFrame(s.x, s.y, s.w, s.h, p.class, p.score);
            });

            requestAnimationFrame(render);
        });
    }

    function drawObjectFrame(x, y, w, h, label, score) {
        const dist = ((850 * 0.5) / w).toFixed(1); // Эмпирический расчет расстояния
        
        ctx.save();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.shadowColor = "rgba(255,255,255,0.5)";
        ctx.shadowBlur = 5;

        // 1. Пунктирная рамка
        ctx.setLineDash([8, 4]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]); // Сброс для уголков

        // 2. Уголки (сплошные)
        const cornerSize = Math.min(w, h) * 0.15;
        ctx.beginPath();
        // Сверху-слева
        ctx.moveTo(x, y + cornerSize); ctx.lineTo(x, y); ctx.lineTo(x + cornerSize, y);
        // Сверху-справа
        ctx.moveTo(x + w - cornerSize, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + cornerSize);
        // Снизу-слева
        ctx.moveTo(x, y + h - cornerSize); ctx.lineTo(x, y + h); ctx.lineTo(x + cornerSize, y + h);
        // Снизу-справа
        ctx.moveTo(x + w - cornerSize, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - cornerSize);
        ctx.stroke();

        // 3. Тайтл и Дистанция
        ctx.fillStyle = "white";
        ctx.font = "bold 20px VT323";
        
        // Подложка текста для читаемости
        const tagText = `${label.toUpperCase()} | DIST: ${dist}M`;
        const textWidth = ctx.measureText(tagText).width;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(x, y - 25, textWidth + 10, 25);
        ctx.globalAlpha = 1.0;
        
        ctx.fillStyle = "black";
        ctx.fillText(tagText, x + 5, y - 7);

        ctx.restore();
    }

    // Слушатель тапа для дешифровки в терминале
    window.addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

        const target = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });

        if (target) {
            writeTerm(`DECRYPTING: ${target.class.toUpperCase()}...`);
            writeTerm(`CONFIDENCE: ${(target.score * 100).toFixed(1)}%`);
        }
    });
</script>
</body>
</html>
