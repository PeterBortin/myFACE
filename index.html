<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v11.8 | HOTFIX</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

    <style>
        :root { --neon: #00ff41; --bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; color: var(--neon); }
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* Исправлено: видео теперь отображается, но за канвасом, для стабильности потока */
        video { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }

        #terminal { 
            position: absolute; bottom: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.7); border-top: 1px solid #222; 
            padding: 10px; font-size: 10px; z-index: 10; box-sizing: border-box;
        }
        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        button { 
            background: #00ff41; color: #000; border: none; padding: 15px 40px; 
            font-weight: bold; cursor: pointer; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div id="status" style="margin-bottom: 20px;">LOADING...</div>
    <button id="btn" style="display:none;" onclick="start()">START SYSTEM</button>
</div>

<div id="container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div id="terminal" id="term"></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    let model;

    // Инициализация
    (async () => {
        try {
            await tf.ready();
            model = await cocoSsd.load();
            status.innerText = "SYSTEM READY";
            btn.style.display = "block";
        } catch (e) {
            status.innerText = "ERROR: " + e.message;
        }
    })();

    async function start() {
        document.getElementById('overlay').style.display = 'none';
        
        const constraints = {
            video: { 
                facingMode: 'environment',
                width: { ideal: 640 },
                height: { ideal: 480 }
            }
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        // Принудительный запуск видео
        video.onloadeddata = () => {
            video.play();
            detect();
        };
    }

    async function detect() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Цикл детекции
        setInterval(async () => {
            if (video.readyState === 4) {
                const predictions = await model.detect(video, 10, 0.3);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                predictions.forEach(p => {
                    const [x, y, w, h] = p.bbox;
                    // Рассчитываем дистанцию (50-100м)
                    const dist = Math.round((4000 / w)); 
                    
                    ctx.strokeStyle = "#00ff41";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, w, h);
                    
                    ctx.fillStyle = "#00ff41";
                    ctx.font = "14px monospace";
                    ctx.fillText(`${p.class.toUpperCase()} ${dist}m`, x, y > 20 ? y - 5 : 20);
                });
            }
        }, 100); // 10 раз в секунду — оптимально для скорости
    }
</script>
</body>
</html>
