<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v9.0 | LOW-SPEC AI</title>
    
    <!-- Подключаем ядро и WASM для старых CPU -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { 
            --target: #ffff00; --hostile: #ff0000; --bio: #ff00ff; --obj: #ffffff; --plant: #00ff41;
            --bg: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff41; }
        
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Затемненный видеопоток для контраста */
        #viewport { position: relative; flex: 1; overflow: hidden; cursor: crosshair; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.35) contrast(1.3) grayscale(0.2); 
            z-index: 1; 
        }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }

        /* Терминал дешифровки */
        #terminal { 
            height: 160px; background: var(--bg); border-top: 2px solid #1a1a1a; 
            padding: 15px; box-sizing: border-box; overflow: hidden; font-size: 12px;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }
        .term-row { margin-bottom: 4px; opacity: 0.9; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        button {
            background: none; border: 1px solid #00ff41; color: #00ff41;
            padding: 15px 40px; cursor: pointer; letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="margin-bottom:20px; font-size:10px;">CORE_V9: COMPATIBILITY_MODE_ACTIVE</div>
    <button onclick="initVision()">BOOT SYSTEM</button>
</div>

<div id="container">
    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal" id="term-box">
        <div id="term-content"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termContent = document.getElementById('term-content');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];

    const COLORS = {
        'person': '#ffff00',
        'car': '#ff0000', 'truck': '#ff0000', 'bus': '#ff0000', 'motorcycle': '#ff0000',
        'dog': '#ff00ff', 'cat': '#ff00ff', 'bird': '#ff00ff',
        'potted plant': '#00ff41',
        'default': '#ffffff'
    };

    async function initVision() {
        try {
            // Переключаем на WASM для слабых процессоров
            await tf.setBackend('wasm');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            await video.play();
            
            writeTerm("ENGINE: LOADING COCO-SSD LIGHTWEIGHT...");
            model = await cocoSsd.load();
            
            document.getElementById('overlay').style.display = 'none';
            writeTerm("SYSTEM ONLINE. WASM_BACKEND: ENABLED.");
            render();
        } catch (e) {
            alert("INIT_ERROR: " + e.message);
        }
    }

    // Слушатель клика по рамке
    viewport.addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });

        if (lockedObj) {
            e.stopPropagation();
            startDecrypt(lockedObj);
        }
    });

    function resetLock() {
        lockedObj = null;
        termContent.innerHTML = "";
        writeTerm("SCANNING ENVIRONMENTS... NO_LOCK");
    }

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 7) termContent.lastChild.remove();
    }

    function startDecrypt(obj) {
        termContent.innerHTML = "";
        const lines = [
            `LOCK_ACQUIRED: ${obj.class.toUpperCase()}`,
            `COORDINATES: X:${Math.round(obj.bbox[0])} Y:${Math.round(obj.bbox[1])}`,
            `DISTANCE: ${((800 * 0.5) / obj.bbox[2]).toFixed(2)}m`,
            `DECRYPTING_SIGNATURE...`,
            `STATUS: [${(obj.score * 100).toFixed(0)}% PROBABILITY]`,
            `DATA: LOCAL_OBJECT_ID_${Math.floor(Math.random()*9999)}`
        ];
        lines.forEach((l, i) => setTimeout(() => writeTerm(l), i * 150));
    }

    async function render() {
        predictions = await model.detect(video);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ограничиваем захват до 10 объектов для производительности
        const activeTargets = predictions.slice(0, 10);

        activeTargets.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            const color = COLORS[label] || COLORS['default'];

            ctx.save();
            
            // Если объект выбран - рисуем жирную рамку
            const isLocked = lockedObj && Math.abs(lockedObj.bbox[0] - x) < 5;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = isLocked ? 4 : 2;
            ctx.setLineDash(isLocked ? [] : [8, 4]);
            
            // Тень рамок
            ctx.shadowColor = "black";
            ctx.shadowBlur = 8;
            
            ctx.strokeRect(x, y, w, h);
            
            // Отрисовка данных
            ctx.fillStyle = color;
            ctx.font = "bold 12px Courier New";
            ctx.fillText(`${label.toUpperCase()}`, x, y - 10);
            
            // Доп. инфо в тайтле
            const dist = ((850 * 0.5) / w).toFixed(1);
            ctx.font = "9px Courier New";
            ctx.fillText(`D:${dist}m | W:${(w*0.1).toFixed(1)}u`, x, y - 22);

            // Специфические элементы (Голова/Колеса/Центр)
            ctx.setLineDash([2, 2]);
            ctx.strokeStyle = "#ff6600";
            if (label === 'person') ctx.strokeRect(x + w*0.3, y + h*0.05, w*0.4, h*0.15);
            if (['car','bus'].includes(label)) {
                ctx.strokeRect(x + w*0.1, y + h*0.7, w*0.2, w*0.2);
                ctx.strokeRect(x + w*0.7, y + h*0.7, w*0.2, w*0.2);
            }

            // Угловые скобки (всегда сплошные)
            ctx.setLineDash([]);
            drawCorners(x, y, w, h, color, isLocked ? 30 : 15);
            
            ctx.restore();
        });

        requestAnimationFrame(render);
    }

    function drawCorners(x, y, w, h, color, s) {
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }
</script>
</body>
</html>
