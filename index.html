<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL ANALYZER v5.1</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root { --green: #00ff41; --blue: #0084ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--green); }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        button {
            background: rgba(0, 255, 65, 0.1); border: 1px solid var(--green);
            color: var(--green); padding: 20px 40px; font-size: 1rem; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); text-transform: uppercase;
        }
        #log { font-size: 10px; margin-top: 20px; color: #555; width: 85%; text-align: left; line-height: 1.4; }
        .hud-line { position: absolute; width: 100%; height: 1px; background: rgba(0,255,65,0.2); z-index: 10; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 22px; letter-spacing: 5px; margin-bottom: 20px;">NEURAL_ANALYZER_v5.1</div>
    <button onclick="initSystem()">GRANT ACCESS</button>
    <div id="log">SYSTEM STATUS: STANDBY<br>> REQUIRED: HTTPS & USER_PERMISSION</div>
</div>

<div id="container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div style="position:absolute; top:20px; left:20px; z-index:10; font-size:10px;">
        OS: NEURAL_CORE_v5<br>SCAN_MODE: MULTIMODAL<br>LATENCY: <span id="ms">0</span>ms
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('log');
    let objModel, faceModel;

    async function initSystem() {
        log.innerHTML = "> ACCESSING CAMERA...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            
            // Ждем готовности видео
            await new Promise(r => video.onloadedmetadata = r);
            await video.play();

            log.innerHTML += "<br>> LOADING NEURAL NETWORKS (COCO & FACE)...";
            [objModel] = await Promise.all([
                cocoSsd.load(),
                faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
                faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
                faceapi.nets.ageGenderNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/')
            ]);

            document.getElementById('overlay').style.display = 'none';
            render();
        } catch (e) {
            log.style.color = "#ff004c";
            log.innerHTML += `<br>> ERROR: ${e.message}<br>> USE SAFARI & CHECK PERMISSIONS`;
        }
    }

    async function render() {
        const t0 = performance.now();
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Параллельная детекция
        const [objects, faces] = await Promise.all([
            objModel.detect(video),
            faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withAgeAndGender()
        ]);

        objects.forEach(obj => {
            const [x, y, w, h] = obj.bbox;
            const label = obj.class;
            
            // 1. Определение типа
            let type = "OBJECT";
            let color = "#0084ff";
            if (label === 'person') { type = "HUMAN"; color = "#00ff41"; }
            else if (['car','bus','truck','motorcycle'].includes(label)) { type = "VEHICLE"; color = "#ffaa00"; }
            else if (['dog','cat','bird','horse'].includes(label)) { type = "ANIMAL"; color = "#ff00ff"; }

            // Рисуем рамку
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);

            // Тэг и габариты
            ctx.fillStyle = color;
            ctx.font = "bold 14px monospace";
            ctx.fillText(`[${type}] ${label.toUpperCase()}`, x, y - 10);
            
            // Расчет объема (условный: ширина * высота * средняя глубина)
            const volume = (w * h * ((w+h)/2) * 0.00001).toFixed(3);
            ctx.fillStyle = "#fff";
            ctx.font = "10px monospace";
            ctx.fillText(`VOL_EST: ${volume} m3`, x, y + h + 15);
            ctx.fillText(`DIST_EST: ${((800 * 0.5) / w).toFixed(1)}m`, x, y + h + 28);
        });

        // Данные лиц (Пол, Возраст, Рост)
        faces.forEach(f => {
            const { x, y, width, height } = f.detection.box;
            ctx.strokeStyle = "#fff";
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(x, y, width, height);
            ctx.setLineDash([]);
            
            ctx.fillStyle = "#fff";
            const gender = f.gender === 'male' ? 'M' : 'F';
            ctx.fillText(`BIO: ${gender} / ~${Math.round(f.age)}yr`, x, y + height + 45);
        });

        document.getElementById('ms').innerText = Math.round(performance.now() - t0);
        requestAnimationFrame(render);
    }
</script>
</body>
</html>
