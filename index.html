<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BERSERK_VISION_V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        video { display: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; mix-blend-mode: screen; }
        #ui-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; border: 20px solid rgba(255,0,0,0.1); }
        .cr-text { position: absolute; color: #ff0000; font-size: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="ui-layer"></div>

    <button id="ignite" class="absolute inset-0 z-[200] bg-red-900/20 backdrop-blur-md text-red-500 font-black text-4xl italic tracking-tighter flex items-center justify-center">
        FEED_THE_NEURONS
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let model;

        async function init() {
            document.getElementById('ignite').remove();
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280 }
            });
            video.srcObject = stream;
            model = await cocoSsd.load();
            process();
        }

        function process() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // GPU EFFECT: DIFFERENCE FEEDBACK
            ctx.filter = "contrast(300%) brightness(150%) grayscale(100%)";
            ctx.globalCompositeOperation = "difference";
            ctx.drawImage(video, 2, 2, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            renderNeuralMess();
            requestAnimationFrame(process);
        }

        async function renderNeuralMess() {
            const preds = await model.detect(video);
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            // ФОНОВЫЙ ШУМ (ASCII-STREAMS)
            ctx.globalCompositeOperation = "source-over";
            ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            ctx.font = "10px monospace";
            for(let i=0; i<10; i++) {
                ctx.fillText(Math.random().toString(2).substr(2, 20), Math.random()*canvas.width, Math.random()*canvas.height);
            }

            preds.forEach(p => {
                const [x, y, w, h] = p.bbox.map(v => v * (sx > sy ? sx : sy));
                
                // КРОВАВЫЙ ТАРГЕТИНГ
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 0.5;
                
                // Хаотичные линии наведения
                ctx.beginPath();
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y+h);
                ctx.moveTo(x, 0); ctx.lineTo(x+w, canvas.height);
                ctx.stroke();

                // ОБЪЕКТНЫЙ ГЛИТЧ
                ctx.fillStyle = "rgba(255, 0, 0, 0.1)";
                ctx.fillRect(x, y, w, h);
                
                // ТЕКСТОВАЯ ПЕРЕГРУЗКА
                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 14px monospace";
                ctx.fillText(`! ALERT: ${p.class.toUpperCase()} !`, x, y - 10);
                ctx.font = "8px monospace";
                ctx.fillText(`HEX_ADDR: 0x${Math.floor(Math.random()*16777215).toString(16)}`, x, y + h + 10);
                ctx.fillText(`PROB_VAL: ${p.score.toFixed(10)}`, x, y + h + 20);
            });

            // ВЕКТОРНЫЙ ХАОС
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 0, 0, ${Math.random() * 0.5})`;
                ctx.moveTo(Math.random()*canvas.width, Math.random()*canvas.height);
                ctx.lineTo(Math.random()*canvas.width, Math.random()*canvas.height);
                ctx.stroke();
            }
        }

        document.getElementById('ignite').onclick = init;
    </script>
</body>
</html>
