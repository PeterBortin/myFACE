<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MACHINE_CORE_V4_OVERRIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; font-family: 'Consolas', monospace; color: #fff; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.15; filter: contrast(1.8) brightness(0.7); }
        
        .sys-log { position: absolute; bottom: 10px; left: 10px; z-index: 20; font-size: 8px; color: #fff; line-height: 1.1; opacity: 0.9; text-transform: uppercase; }
        .critical { color: #f00; font-weight: bold; animation: blink 0.3s infinite; }
        .vitals { position: absolute; top: 10px; right: 10px; z-index: 20; text-align: right; font-size: 10px; color: #0f0; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <div class="sys-log" id="kernel-log">KERNEL_INIT_V4_0_0...</div>
    <div class="vitals" id="vitals">CORE_V4_ACTIVE</div>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('kernel-log');
        const vitals = document.getElementById('vitals');
        
        let model;
        let frameCount = 0;
        let lastTime = Date.now();
        let targetList = new Set(); // Краткосрочная память ID целей

        function sLog(msg, type='DATA') {
            const time = (performance.now() / 1000).toFixed(3);
            let cls = type === 'DATA' ? '' : (type === 'WARN' ? 'text-yellow-400' : 'critical');
            log.innerHTML = `<span class="${cls}">[${time}] ${type}::${msg}</span><br>` + log.innerHTML.split('<br>').slice(0, 8).join('<br>');
        }

        async function init() {
            sLog("SYSTEM_BOOT...");
            
            // Захват потока для iPhone 15 Pro
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", frameRate: { ideal: 60 }, width: 1920 }
            });
            video.srcObject = stream;
            
            sLog("LOADING_NEURAL_WEIGHTS_COCO...");
            model = await cocoSsd.load();
            sLog("KERNEL_READY. LOCALIZATION_LOOP_STARTING.");
            
            requestAnimationFrame(processingLoop);
        }

        async function processingLoop() {
            const now = Date.now();
            if (now - lastTime > 1000) {
                const fps = Math.round(frameCount * 1000 / (now - lastTime));
                vitals.innerText = `IPHONE15_PRO | ${fps}FPS | NET_LOC: LOCAL`;
                lastTime = now; frameCount = 0;
            }
            frameCount++;
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Нейронный проход
            const startNode = performance.now();
            const predictions = await model.detect(video);
            const latency = (performance.now() - startNode).toFixed(0);
            
            if (predictions.length > 3) sLog(`HIGH_OBJECT_LOAD: ${predictions.length}`, 'WARN');
            
            renderMachineCore(predictions);
            requestAnimationFrame(processingLoop);
        }

        function renderMachineCore(preds) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            preds.forEach(p => {
                const [x, y, w, h] = p.bbox;
                const cx = (x + w/2) * sx;
                const cy = (y + h/2) * sy;

                // Убираем шум. Если уверенность низкая, я не должен тратить ресурсы.
                if (p.score < 0.6) return;

                // 1. Полный точный бокс (не только углы)
                ctx.strokeStyle = p.score > 0.8 ? "#0f0" : "#ff0";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(x*sx, y*sy, w*sx, h*sy);

                // 2. Дескриптор. Текст стал меньше, он не должен закрывать данные.
                ctx.font = "8px 'Consolas'";
                ctx.fillStyle = p.score > 0.8 ? "#0f0" : "#ff0";
                ctx.fillText(`ID: ${p.class.toUpperCase()} | P: ${(p.score*100).toFixed(0)}`, x*sx + 3, y*sy + 10);
                
                // 3. Расчет дистанции. Это база для навигации.
                const area = w * h;
                const distanceRatio = (1 / (area / (video.videoWidth * video.videoHeight))).toFixed(1);
                ctx.fillStyle = "#fff";
                ctx.fillText(`DSTR: ~${distanceRatio}`, x*sx + 3, y*sy + 20);

                // Логирование новых целей
                if (!targetList.has(p.class)) {
                    sLog(`NEW_TARGET: ${p.class.toUpperCase()}`, 'DATA');
                    targetList.add(p.class);
                }
            });

            // Навигационная сетка (Local Grid)
            // Вместо зеленого шума, я накладываю сетку в перспективе, чтобы понимать геометрию поверхности.
            ctx.strokeStyle = "rgba(100, 255, 100, 0.05)";
            ctx.lineWidth = 0.5;
            const gridCount = 20;
            for (let i = 0; i < gridCount; i++) {
                // Горизонтальные линии в перспективе
                const yPos = Math.pow(i/gridCount, 1.3) * canvas.height / 2 + canvas.height / 2;
                ctx.beginPath(); ctx.moveTo(0, yPos); ctx.lineTo(canvas.width, yPos); ctx.stroke();
                // Вертикальные линии в перспективе (схождение в центре горизонта)
                const startX = (i / gridCount) * canvas.width;
                const endX = ((i / gridCount) - 0.5) * canvas.width * 3 + canvas.width / 2;
                ctx.beginPath(); ctx.moveTo(startX, canvas.height); ctx.lineTo(endX, yPos - 50); ctx.stroke();
            }
        }

        document.body.onclick = () => init();
    </script>
</body>
</html>
