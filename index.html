<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyber Mesh Terminal v4.0</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    
    #overlay-start {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 100; display: flex;
      flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
    }
    #overlay-start h1 { border: 1px solid #fff; padding: 20px; text-transform: uppercase; letter-spacing: 5px; }

    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .input_video { display: none; }
    
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }

    #switch-camera {
      position: absolute; top: 20px; right: 20px; z-index: 110;
      background: rgba(0,0,0,0.5); border: 1px solid #fff; color: #fff;
      padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 12px;
    }

    .interface-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      font-size: 12px; text-shadow: 0 0 5px #fff; pointer-events: none;
    }

    /* Нижний интерфейс */
    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, #000 80%, transparent);
      padding-bottom: 20px;
    }

    /* Блок распознавания (Текущая речь) */
    #live-speech-box {
      width: 90%; min-height: 40px; margin-bottom: 10px;
      text-align: center; font-size: 20px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px;
      color: #fff; text-shadow: 0 0 10px #fff;
    }

    /* Эквалайзер */
    #audio_visualizer { width: 90%; height: 40px; margin-bottom: 10px; }

    /* Лог событий */
    #terminal-box {
      width: 90%; height: 120px; background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.3); padding: 10px; box-sizing: border-box;
      overflow-y: auto; scrollbar-width: none;
    }
    #terminal-box::-webkit-scrollbar { display: none; }

    .log-entry {
      margin: 3px 0; font-size: 12px; color: rgba(255,255,255,0.6);
      border-left: 2px solid #fff; padding-left: 10px; text-transform: uppercase;
    }

    .cursor { animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>

<body>

  <div id="overlay-start" onclick="initSystem()">
    <h1>INITIALIZE SYSTEM</h1>
  </div>

  <button id="switch-camera">Camera</button>

  <div id="container">
    <video class="input_video" playsinline></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div>> CORE: ACTIVE</div>
      <div id="vox-status">> VOX: STANDBY</div>
    </div>

    <div class="bottom-peripherals">
      <!-- Блок текущей речи -->
      <div id="live-speech-box">...</div>

      <!-- Эквалайзер (dB bars) -->
      <canvas id="audio_visualizer"></canvas>

      <!-- Лог терминала -->
      <div id="terminal-box">
        <div id="log-content"></div>
      </div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const logContent = document.getElementById('log-content');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, dataArray;

    // --- ЭКВАЛАЙЗЕР (BARS) ---
    async function initAudio() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 64; // Меньше размер — шире столбики
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawBars();
      } catch(e) { console.log("Mic access denied"); }
    }

    function drawBars() {
      requestAnimationFrame(drawBars);
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteFrequencyData(dataArray);

      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      const barWidth = (audioCanvas.width / dataArray.length) * 2;
      let x = 0;

      for (let i = 0; i < dataArray.length; i++) {
        const barHeight = (dataArray[i] / 255) * audioCanvas.height;
        aCtx.fillStyle = `rgba(255, 255, 255, ${dataArray[i]/255 + 0.1})`;
        aCtx.fillRect(x, audioCanvas.height - barHeight, barWidth - 2, barHeight);
        x += barWidth;
      }
    }

    // --- ЛОГИРОВАНИЕ ---
    function addLog(text) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      entry.innerText = `[LOG_${time}] ${text}`;
      logContent.appendChild(entry);
      terminalBox.scrollTop = terminalBox.scrollHeight;
    }

    // --- РАСПОЗНАВАНИЕ ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU';

      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            addLog(transcript);
          } else {
            interim += transcript;
          }
        }
        liveSpeechBox.innerText = interim || "...";
      };
      recognition.onstart = () => document.getElementById('vox-status').innerText = "> VOX: LISTENING";
      recognition.onend = () => recognition.start();
      window.runSpeech = () => recognition.start();
    }

    // --- FACE MESH ---
    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.fillStyle = '#000';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 0.06;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: 'rgba(255,255,255,0.15)', lineWidth: 0.5});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#fff', lineWidth: 2});
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#fff', lineWidth: 2});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#fff', lineWidth: 2});
        }
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCamera() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: currentFacingMode,
        width: 1280, height: 720
      });
      cameraInstance.start();
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    });

    window.initSystem = function() {
      document.getElementById('overlay-start').style.display = 'none';
      initAudio();
      if (window.runSpeech) window.runSpeech();
      startCamera();
      addLog("SYSTEM STARTUP SUCCESS");
    }
  </script>
</body>
</html>
