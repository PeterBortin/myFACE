<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINATOR_V10_DIRECTIVE_IMAGE_2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'VT323', monospace; color: #ff0000; text-transform: uppercase; }
        
        video { display: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* Визуальный шум оригинала */
        #glitch-overlay {
            position: absolute; inset: 0; z-index: 5; opacity: 0.1;
            background: url('https://media.giphy.com/media/oEI9uWUPr9WUM/giphy.gif');
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Сканирование и виньетка */
        #dine-fx {
            position: absolute; inset: 0; z-index: 100; pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(50,0,0,0.8) 100%);
            box-shadow: inset 0 0 150px #000;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="glitch-overlay"></div>
    <div id="dine-fx"></div>

    <div class="absolute top-10 left-10 text-[10px] tracking-widest sys-telemetry">
        SCAN <span id="scan-val">0</span><br>
        LEVEL 7<br>
        HEAD 12<br>
        TRACK 9
    </div>

    <div class="absolute inset-0 z-50 pointer-events-none flex items-center justify-center">
        <div class="w-[50px] h-[50px] border border-red-800 opacity-50 relative">
            <div class="absolute top-[-25px] left-[-25px] w-[20px] h-[20px] border-t border-l border-red-800"></div>
        </div>
    </div>

    <button id="ignite" class="absolute inset-0 z-[300] bg-black text-red-600 font-bold text-lg flex flex-col items-center justify-center tracking-[0.5em]">
        <span class="animate-ping mb-4">CONNECTING_NEURAL_LINK_V10</span>
        <div class="text-[8px] opacity-40">GPU_ACCEL: YES // KERNEL_V10 // READ_IMAGE_2.png</div>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const scanVal = document.getElementById('scan-val');
        
        let model;
        let shake = 0, glitchIntensity = 0;
        let lastLogged = performance.now();

        async function init() {
            document.getElementById('ignite').remove();
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280, height: 720 }
            });
            video.srcObject = stream;
            model = await cocoSsd.load();
            draw();
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // GPU EFFECT: Monochrome Deep Red (Зрение Терминатора)
            // Мы убираем все цвета и красим всё в красный.
            ctx.save();
            ctx.filter = "contrast(2.5) brightness(0.4) grayscale(1) sepia(1) hue-rotate(-90deg)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            renderUltimateHUD();
            requestAnimationFrame(draw);
        }

        async function renderUltimateHUD() {
            const preds = await model.detect(video);
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            scanVal.innerText = (performance.now() / 1000).toFixed(0);

            // ОБЩАЯ СЕТКА КООРДИНАТ (Калибровка)
            renderCalibrationGrid();

            preds.forEach(p => {
                if (p.score < 0.6) return;
                
                // Если новая цель - "удар" (тряска)
                if (shake < 5) shake = 15;

                const [x, y, w, h] = p.bbox.map(v => v * (sx > sy ? sx : sy));
                const cx = x + w/2;
                const cy = y + h/2;

                // 1. ЗАХВАТ КАРТИНКИ ИЗ РАМКИ (Оригинал внутри рамки)
                ctx.save();
                ctx.beginPath();
                ctx.rect(x, y, w, h);
                ctx.clip();
                ctx.filter = "contrast(1.2) brightness(1.2) saturate(200%)";
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                // 2. РАМКА ЗАХВАТА (Геометрия оригинала)
                // Тонкая красная линия, никаких уголков. Чистый бокс.
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, w, h);

                // 3. ПЕРЕКРЕСТИЕ НА ОБЪЕКТЕ (Target Lock)
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(cx-20, cy); ctx.lineTo(cx+20, cy);
                ctx.moveTo(cx, cy-20); ctx.lineTo(cx, cy+20);
                ctx.stroke();

                // 4. ТЕКСТОВАЯ ТЕЛЕМЕТРИЯ (Точно как на скриншоте)
                renderTargetData(p, x, y, w, h);
            });
        }

        function renderTargetData(p, x, y, w, h) {
            ctx.fillStyle = "#ff0000";
            ctx.font = "14px 'VT323'";
            
            // Если человек
            if (p.class === "person") {
                ctx.fillText(`MODEL: T-800`, x + w + 10, y + 20);
                ctx.fillText(`CYBERDYNE SYSTEMS`, x + w + 10, y + 35);
                ctx.fillText(`CLASS: 01`, x + w + 10, y + 50);
                
                // Имитация 3D скелета (как на скриншоте)
                const skeletonScale = 0.5;
                const sx = canvas.width / video.videoWidth;
                const sy = canvas.height / video.videoHeight;
                // Мы рисуем тусклый эскиз скелета (нужно реальное Skeletal Tracking)
                ctx.globalAlpha = 0.2;
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1;
                //ctx.strokeRect(x + w + 10, y + 60, w * skeletonScale, h * skeletonScale);
                ctx.globalAlpha = 1.0;
            }

            // Имитация длинного предмета (оружие)
            if (p.class === "object" && (w/h > 3 || h/w > 3)) {
                 ctx.fillText(`MATCH: REMINGTON`, x + 10, y + h + 20);
                 ctx.fillText(`GAUGE 12`, x + 10, y + h + 35);
                 ctx.fillText(`M-1A RIFLE`, x + 10, y + h + 50);
            }

            // ИМИТАЦИЯ ЦИФРОВЫХ МАТРИЦ (По краям рамки)
            ctx.font = "8px 'VT323'";
            for(let i=0; i<8; i++) {
                // Слева от бокса
                ctx.fillText(Math.random().toString(10).slice(2, 6), x - 20, y + i*8 + 8);
                // Справа от бокса
                ctx.fillText("0x" + Math.random().toString(16).slice(2, 6).toUpperCase(), x + w + 5, y + i*8 + 8);
            }
        }

        // Рендеринг сетки калибровки по краям экрана
        function renderCalibrationGrid() {
            ctx.strokeStyle = "rgba(255, 0, 0, 0.1)";
            ctx.lineWidth = 0.5;
            ctx.font = "8px 'VT323'";
            ctx.fillStyle = "rgba(255, 0, 0, 0.3)";

            const gridCount = 20;
            const xStep = canvas.width / gridCount;
            const yStep = canvas.height / gridCount;

            // Сетка координат
            ctx.beginPath();
            for(let i=0; i<gridCount; i++) {
                ctx.moveTo(0, i * yStep); ctx.lineTo(canvas.width, i * yStep); // Горизонтальные
                ctx.moveTo(i * xStep, 0); ctx.lineTo(i * xStep, canvas.height); // Вертикальные
            }
            ctx.stroke();

            // Числовые данные по краям
            for(let i=0; i<gridCount; i++) {
                ctx.fillText(i.toString().padStart(2, '0'), 5, i * yStep + 8);
                ctx.fillText((Math.random()*100).toFixed(0), canvas.width - 25, i * yStep + 8);
            }
        }

        document.getElementById('ignite').onclick = init;
    </script>
</body>
</html>
