<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL_MATRIX_v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Эффект мерцания матрицы */
        #glitch-overlay {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,0,0,0) 2px);
            pointer-events: none; z-index: 20;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="glitch-overlay"></div>

    <button id="boot-btn" class="absolute inset-0 z-50 bg-black text-green-500 text-xs tracking-widest flex flex-col items-center justify-center">
        <span class="mb-4 animate-pulse uppercase">[ Initiate Neural Link ]</span>
        <div class="text-[8px] opacity-40">GPU_ACCELERATION: ENABLED // NEURAL_GATE: OPEN</div>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let model;

        async function boot() {
            document.getElementById('boot-btn').remove();
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280, height: 720 }
            });
            video.srcObject = stream;
            model = await cocoSsd.load();
            draw();
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. БАЗОВЫЙ СЛОЙ: Темный негатив (инверсия реальности)
            ctx.filter = "brightness(0.5) contrast(2) grayscale(1) invert(1)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = "none";

            // 2. ГЛИТЧ-ЭФФЕКТ (Смещение слоев для динамики)
            if (Math.random() > 0.95) {
                ctx.drawImage(video, Math.random()*10, 0, canvas.width, canvas.height);
            }

            // 3. НЕЙРОННЫЙ АНАЛИЗ
            processIntelligence();

            requestAnimationFrame(draw);
        }

        async function processIntelligence() {
            const predictions = await model.detect(video);
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            predictions.forEach(p => {
                if (p.score < 0.5) return;
                const [x, y, w, h] = p.bbox;
                const cx = (x + w/2) * sx;
                const cy = (y + h/2) * sy;

                // ВИЗУАЛИЗАЦИЯ "ЗАХВАТА" ОБЪЕКТА
                ctx.strokeStyle = "#00ff00";
                ctx.lineWidth = 1;
                
                // Динамические уголки (наводка)
                const s = 20 + Math.sin(Date.now()/100)*5;
                // Top-Left
                ctx.beginPath(); ctx.moveTo(x*sx, y*sy+s); ctx.lineTo(x*sx, y*sy); ctx.lineTo(x*sx+s, y*sy); ctx.stroke();
                // Bottom-Right
                ctx.beginPath(); ctx.moveTo((x+w)*sx, (y+h)*sy-s); ctx.lineTo((x+w)*sx, (y+h)*sy); ctx.lineTo((x+w)*sx-s, (y+h)*sy); ctx.stroke();

                // СКАНЕР-ЛИНИЯ ВНУТРИ ОБЪЕКТА
                const scanY = y*sy + (Math.sin(Date.now()/200) * 0.5 + 0.5) * h*sy;
                ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
                ctx.beginPath(); ctx.moveTo(x*sx, scanY); ctx.lineTo((x+w)*sx, scanY); ctx.stroke();

                // ПОТОК ДАННЫХ (Симуляция кода вокруг объекта)
                ctx.fillStyle = "#00ff00";
                ctx.font = "8px monospace";
                for(let i=0; i<3; i++) {
                    const code = Math.random().toString(16).substring(2, 8).toUpperCase();
                    ctx.fillText(code, (x+w)*sx + 5, y*sy + (i*10) + 10);
                }

                // ВЕКТОР ЦЕНТРА
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI*2);
                ctx.fill();
            });

            // ОБЩАЯ СЕТКА МАТРИЦЫ (Связь с пространством)
            renderMatrixGrid();
        }

        function renderMatrixGrid() {
            ctx.strokeStyle = "rgba(0, 255, 0, 0.05)";
            ctx.lineWidth = 0.5;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        document.getElementById('boot-btn').onclick = boot;
    </script>
</body>
</html>
