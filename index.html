<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAUTJA_HUNTER_VISION_V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        video { display: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; }

        /* Эффект линзы и теплового марева */
        #thermal-overlay {
            position: absolute; inset: 0; z-index: 20; pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0, 40, 80, 0.4) 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* Вертикальная звуковая полоса (Predator Style) */
        #sound-bar-container {
            position: absolute; right: 20px; top: 20%; height: 60%; width: 12px;
            display: flex; flex-direction: column-reverse; gap: 4px; z-index: 100;
        }
        .sound-segment {
            width: 100%; height: 6px; background: #300; transition: background 0.1s;
            box-shadow: 0 0 5px rgba(255,0,0,0);
        }
        .active-segment { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

        /* Анимация сканирования */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        .scan {
            position: absolute; width: 100%; height: 2px; 
            background: rgba(255, 255, 255, 0.1); 
            top: 0; z-index: 30; animation: scanline 4s linear infinite;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="thermal-overlay"></div>
    <div class="scan"></div>

    <!-- Звуковая полоса Хищника -->
    <div id="sound-bar-container"></div>

    <!-- Интерфейсные надписи (Глифы) -->
    <div class="absolute top-5 left-5 text-red-600 text-[10px] z-50 tracking-[5px]">
        <div id="status">INIT_LINK...</div>
        <div class="mt-2 text-[14px]" id="glyphs">ᚦᛗᛖᛟᚱ ᛚᛒᚦ</div>
    </div>

    <button id="ignite" class="absolute inset-0 z-[300] bg-black text-white flex flex-col items-center justify-center">
        <div class="w-24 h-24 mb-6 border-4 border-red-600 rounded-full flex items-center justify-center animate-pulse">
            <div class="w-4 h-4 bg-red-600 rounded-full"></div>
        </div>
        <span class="tracking-[0.5em] text-red-600 font-black">ACTIVATE_PREDATOR_VISION</span>
        <div class="text-[9px] mt-4 opacity-50">CAM_REQ // MIC_REQ // THERMAL_ON</div>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const soundContainer = document.getElementById('sound-bar-container');
        
        let model, audioCtx, analyser, dataArray;
        const segments = [];

        // Создаем сегменты для звуковой полосы
        for(let i=0; i<40; i++) {
            const div = document.createElement('div');
            div.className = 'sound-segment';
            soundContainer.appendChild(div);
            segments.push(div);
        }

        async function init() {
            document.getElementById('ignite').remove();
            
            try {
                // 1. Запрос Камеры и Микрофона
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: true
                });
                
                video.srcObject = stream;

                // 2. Настройка Аудио-анализатора
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // 3. Загрузка AI
                document.getElementById('status').innerText = "CALIBRATING_SENSORS...";
                model = await cocoSsd.load();
                document.getElementById('status').innerText = "HUNT_MODE_ACTIVE";
                
                draw();
            } catch (err) {
                alert("ACCESS_DENIED: Check permissions");
            }
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // --- ТЕПЛОВИЗИОННЫЙ ФИЛЬТР (PREDATOR VISION) ---
            ctx.save();
            // Смешиваем инверсию, насыщенность и сдвиг хуе (синий -> красный)
            ctx.filter = "contrast(1.6) brightness(1.2) saturate(3) hue-rotate(160deg) invert(0.1)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            updateSoundBar();
            renderYautjaHUD();
            
            requestAnimationFrame(draw);
        }

        function updateSoundBar() {
            analyser.getByteFrequencyData(dataArray);
            const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const activeCount = Math.floor((average / 128) * segments.length);

            segments.forEach((seg, i) => {
                if (i < activeCount) {
                    seg.className = 'sound-segment active-segment';
                    // Добавляем эффект случайного мерцания глифов при звуке
                    if(Math.random() > 0.9) updateGlyphs();
                } else {
                    seg.className = 'sound-segment';
                }
            });
        }

        function updateGlyphs() {
            const chars = "ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚻᚼᛂᛄᛅᛆᛇᛈᛉᛊᛋᛏᛐᛑᛒᛓᛔᛕᛗᛘᛚᛛᛜᛝᛞᛟ";
            document.getElementById('glyphs').innerText = Array.from({length: 8}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
        }

        async function renderYautjaHUD() {
            const preds = await model.detect(video);
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            preds.forEach(p => {
                if (p.score < 0.6) return;

                const [x, y, w, h] = p.bbox.map(v => v * (sx > sy ? sx : sy));
                const cx = x + w/2;
                const cy = y + h/2;

                // 1. ПЛАЗМЕННЫЙ ПРИЦЕЛ (Три точки)
                ctx.fillStyle = "#ff0000";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "red";
                
                const gap = 15;
                // Рисуем знаменитый треугольник лазера
                [[0, -gap], [-gap, gap], [gap, gap]].forEach(offset => {
                    ctx.beginPath();
                    ctx.arc(cx + offset[0], cy + offset[1], 4, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                // 2. ОРГАНИЧЕСКИЙ ЗАХВАТ ЦЕЛИ
                ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 10]);
                ctx.strokeRect(x, y, w, h);
                ctx.setLineDash([]);

                // 3. ТЕКСТ ЦЕЛИ (Инопланетный шрифт)
                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 16px Orbitron";
                ctx.fillText(`TARGET: ${p.class.toUpperCase()}`, x, y - 25);
                ctx.fillText(`THREAT: ${(p.score * 100).toFixed(0)}%`, x, y - 10);
            });
        }

        document.getElementById('ignite').onclick = init;
        
        // Оптимизация под изменение размера экрана
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
