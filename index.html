<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v5.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            color: #fff;
        }

        #viewport { position: relative; width: 100vw; height: 100vh; }
        
        video { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }
        
        canvas { 
            position: absolute; inset: 0; 
            z-index: 2; pointer-events: none; 
        }

        /* HUD Элементы */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 15px;
        }

        .stats {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-left: 3px solid #fff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            align-self: flex-start;
        }

        #log {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            height: 120px;
            overflow: hidden;
            font-family: monospace;
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: auto;
        }

        .log-msg { color: #00ff00; margin-bottom: 2px; }

        /* Экран загрузки */
        #loader {
            position: fixed; inset: 0; background: #000;
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        
        .start-btn {
            background: #fff; color: #000; border: none;
            padding: 15px 40px; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="margin-bottom: 20px; letter-spacing: 4px;">VISION_OS_v5</div>
    <button class="start-btn" onclick="boot()">Запуск системы</button>
</div>

<div id="viewport">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div id="hud">
        <div class="stats">
            System: Active<br>
            Objects in DB: <span id="db-count">0</span>
        </div>
        
        <div id="log"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const logBox = document.getElementById('log');
    
    let model = null;
    let memory = JSON.parse(localStorage.getItem('v5_memory')) || {};

    function addLog(text) {
        const div = document.createElement('div');
        div.className = 'log-msg';
        div.innerText = `> ${text}`;
        logBox.prepend(div);
        if (logBox.childNodes.length > 6) logBox.lastChild.remove();
    }

    async function boot() {
        addLog("Загрузка ядра ИИ...");
        try {
            model = await cocoSsd.load();
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('loader').style.display = 'none';
                addLog("Сенсоры онлайн. Режим v5.0");
                updateStats();
                detect();
            };
        } catch (err) {
            alert("Ошибка доступа: " + err.message);
        }
    }

    function updateStats() {
        document.getElementById('db-count').innerText = Object.keys(memory).length;
    }

    async function detect() {
        const predictions = await model.detect(video);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;

            // Логика памяти
            if (!memory[p.class]) {
                memory[p.class] = { seen: 1, date: new Date().toLocaleDateString() };
                addLog(`Обнаружен новый тип: ${p.class}`);
                localStorage.setItem('v5_memory', JSON.stringify(memory));
                updateStats();
            } else if (p.score > 0.8) {
                memory[p.class].seen++;
            }

            // Отрисовка
            drawFrame(x, y, w, h, p.class, p.score);
        });

        requestAnimationFrame(detect);
    }

    function drawFrame(x, y, w, h, label, score) {
        // Белая рамка
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);

        // Уголки
        const s = 15;
        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.moveTo(x, y + s); ctx.lineTo(x, y); ctx.lineTo(x + s, y);
        ctx.moveTo(x + w - s, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + s);
        ctx.moveTo(x, y + h - s); ctx.lineTo(x, y + h); ctx.lineTo(x + s, y + h);
        ctx.moveTo(x + w - s, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - s);
        ctx.stroke();

        // Текст
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        const seenStr = memory[label] ? ` | Seen: ${memory[label].seen}` : "";
        ctx.fillText(`${label.toUpperCase()} ${Math.round(score*100)}%${seenStr}`, x, y - 10);
    }
</script>
</body>
</html>
