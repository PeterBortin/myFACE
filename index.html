<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myFACE // NEURAL SCANNER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    :root {
      --cyan:  #00f5ff;
      --red:   #ff2244;
      --green: #00ff88;
      --dim:   #0a0a0f;
      --glow:  0 0 18px rgba(0,245,255,0.35);
      --fm:    'Share Tech Mono', monospace;
      --ft:    'Orbitron', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dim); overflow:hidden; font-family:var(--fm); color:var(--cyan); cursor:crosshair; }

    /* CRT lines */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    }

    /* Corner brackets */
    .corner { position:fixed; width:30px; height:30px; z-index:1000; pointer-events:none; }
    .corner::before,.corner::after { content:''; position:absolute; background:var(--cyan); }
    .corner::before { width:100%; height:2px; top:0; }
    .corner::after  { width:2px; height:100%; top:0; }
    .corner.tl { top:15px; left:15px; }
    .corner.tr { top:15px; right:15px; transform:scaleX(-1); }
    .corner.bl { bottom:15px; left:15px; transform:scaleY(-1); }
    .corner.br { bottom:15px; right:15px; transform:scale(-1); }

    /* ── PRELOADER ── */
    #preloader {
      position:fixed; inset:0; background:var(--dim); z-index:500;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #preloader.hidden { opacity:0; visibility:hidden; }
    .boot-logo {
      font-family:var(--ft); font-size:clamp(28px,5vw,52px); font-weight:900;
      letter-spacing:8px; color:var(--cyan);
      text-shadow:0 0 40px var(--cyan),0 0 80px rgba(0,245,255,0.3);
      animation:flicker 3s infinite; margin-bottom:8px;
    }
    .boot-sub { font-size:10px; letter-spacing:6px; color:rgba(0,245,255,0.4); margin-bottom:50px; }
    @keyframes flicker {
      0%,95%,100%{opacity:1} 96%{opacity:0.4} 97%{opacity:1} 98%{opacity:0.2} 99%{opacity:1}
    }
    .boot-lines { width:min(400px,85vw); margin-bottom:36px; display:flex; flex-direction:column; gap:5px; }
    .boot-line { font-size:9px; color:rgba(0,245,255,0.5); letter-spacing:1px; opacity:0; animation:fadeIn .3s forwards; }
    .boot-line.ok::after  { content:' [OK]';   color:var(--green); }
    .boot-line.err::after { content:' [WARN]'; color:var(--red); }
    @keyframes fadeIn { to{opacity:1} }

    #preload-viz {
      width:min(340px,80vw); height:44px; margin-bottom:30px;
      border:1px solid rgba(0,245,255,0.12); background:rgba(0,245,255,0.02);
    }

    #access-btn {
      font-family:var(--ft); background:transparent; border:1px solid var(--cyan);
      color:var(--cyan); padding:14px 40px; font-size:11px; letter-spacing:4px;
      cursor:pointer; text-transform:uppercase; position:relative; overflow:hidden;
      transition:color .3s; display:none;
    }
    #access-btn::before {
      content:''; position:absolute; inset:0; background:var(--cyan);
      transform:translateX(-100%); transition:transform .3s ease;
    }
    #access-btn:hover::before { transform:translateX(0); }
    #access-btn:hover { color:var(--dim); }
    #access-btn span { position:relative; z-index:1; }

    .ring-wrap { position:relative; width:70px; height:70px; margin-bottom:28px; display:none; }
    .ring-wrap svg { position:absolute; inset:0; animation:spin 1.2s linear infinite; }
    .ring-wrap svg.rev { animation-direction:reverse; animation-duration:1.8s; }
    @keyframes spin { to{transform:rotate(360deg)} }

    #status-text { font-size:9px; letter-spacing:3px; color:rgba(0,245,255,0.35); margin-top:18px; min-height:14px; }

    /* ── MAIN ── */
    #container { position:relative; width:100vw; height:100vh; visibility:hidden; }
    .input_video { display:none; }
    .output_canvas {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; transform:scaleX(-1); z-index:1;
    }

    .hud-tl {
      position:absolute; top:25px; left:25px; z-index:10; pointer-events:none;
      font-size:9px; letter-spacing:2px; color:rgba(0,245,255,0.6);
      display:flex; flex-direction:column; gap:5px;
    }
    .hud-row { display:flex; align-items:center; gap:8px; }
    .hud-dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:pdot 2s ease-in-out infinite; }
    @keyframes pdot { 0%,100%{opacity:1;box-shadow:0 0 6px var(--green)} 50%{opacity:.3;box-shadow:none} }

    .hud-tr {
      position:absolute; top:20px; right:20px;
      display:flex; gap:8px; z-index:20;
    }
    .ui-btn {
      font-family:var(--fm); font-size:9px; letter-spacing:2px;
      cursor:pointer; text-transform:uppercase;
      background:rgba(0,0,0,0.65); backdrop-filter:blur(10px);
      border:1px solid rgba(0,245,255,0.3); color:rgba(0,245,255,0.7);
      padding:7px 14px; transition:all .2s; position:relative; overflow:hidden;
    }
    .ui-btn .st-a, .ui-btn .st-b { display:block; transition:transform .25s, opacity .25s; }
    .ui-btn .st-b { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) translateY(14px); opacity:0; white-space:nowrap; }
    .ui-btn:hover .st-a { transform:translateY(-14px); opacity:0; }
    .ui-btn:hover .st-b { transform:translate(-50%,-50%) translateY(0); opacity:1; }
    .ui-btn:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:var(--glow); background:rgba(0,245,255,0.06); }
    .ui-btn:active { transform:scale(0.97); }

    #acquired-flash { position:absolute; inset:0; pointer-events:none; z-index:30; opacity:0; }
    #acquired-flash.flash { animation:aFlash .6s ease forwards; }
    @keyframes aFlash { 0%{opacity:0;background:rgba(0,255,136,0.12)} 30%{opacity:1} 100%{opacity:0} }

    #reticle {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:120px; height:120px; pointer-events:none; opacity:0; transition:opacity .4s;
    }
    #reticle.visible { opacity:1; }

    #face-frame-canvas {
      position:absolute; inset:0; width:100%; height:100%;
      pointer-events:none; z-index:8;
    }

    #face-info {
      position:absolute; z-index:12; pointer-events:none;
      font-size:9px; letter-spacing:1.5px; line-height:1.7;
      color:var(--cyan); opacity:0; transition:opacity .3s;
    }
    #face-info.visible { opacity:1; }
    #face-info span { display:block; overflow:hidden; white-space:nowrap; }
    @keyframes glitchText {
      0%  { clip-path:inset(0 0 90% 0); transform:translate(-2px,0); }
      15% { clip-path:inset(30% 0 50% 0); transform:translate(2px,0); }
      30% { clip-path:inset(70% 0 10% 0); transform:translate(-1px,0); }
      50%,100% { clip-path:none; transform:none; }
    }
    #face-info.glitch { animation:glitchText .35s steps(1); }

    #target-label {
      position:absolute; top:calc(50% + 74px); left:50%; transform:translateX(-50%);
      font-family:var(--ft); font-size:9px; letter-spacing:4px; color:var(--cyan);
      opacity:0; transition:opacity .3s; white-space:nowrap;
      text-shadow:0 0 10px var(--cyan); pointer-events:none;
    }
    #target-label.visible { opacity:1; }

    #metrics {
      position:absolute; right:25px; top:50%; transform:translateY(-50%);
      z-index:15; pointer-events:none; display:flex; flex-direction:column; gap:16px;
      opacity:0; transition:opacity .5s;
    }
    #metrics.visible { opacity:1; }
    .metric-block { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .metric-label { font-size:7px; letter-spacing:3px; color:rgba(0,245,255,0.4); }
    .metric-bar { width:80px; height:2px; background:rgba(0,245,255,0.1); position:relative; overflow:hidden; }
    .metric-fill { position:absolute; top:0; left:0; height:100%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); transition:width .4s ease; }
    .metric-value { font-size:9px; letter-spacing:2px; color:var(--cyan); }

    .bottom-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:20;
      background:linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
      padding:0 25px 20px;
    }
    #live-speech-box {
      text-align:center; font-family:var(--ft);
      font-size:clamp(14px,2.5vw,20px); font-weight:700; letter-spacing:3px;
      color:#fff; min-height:32px; padding:8px 0 6px;
      transition:color .3s; text-shadow:0 0 20px rgba(255,255,255,0.4);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    #live-speech-box.speaking { color:var(--green); text-shadow:0 0 20px var(--green); }

    #audio_visualizer {
      width:100%; height:60px; margin-bottom:10px; display:block;
      position:relative;
    }
    #viz-label {
      position:absolute; right:0; top:-14px;
      font-size:7px; letter-spacing:3px; color:rgba(0,245,255,0.3); pointer-events:none;
    }
    .viz-wrap { position:relative; margin-bottom:10px; }

    #terminal-box {
      width:100%; height:120px;
      border:1px solid rgba(0,245,255,0.12); background:rgba(0,0,0,0.4);
      backdrop-filter:blur(5px); padding:16px 12px 10px;
      overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(0,245,255,0.2) transparent;
      position:relative;
    }
    #terminal-box::before {
      content:'NEURAL LOG // SESSION'; position:sticky; top:0; display:block;
      font-size:8px; letter-spacing:3px; color:rgba(0,245,255,0.25); margin-bottom:4px;
    }
    .log-entry {
      font-size:9px; color:rgba(0,245,255,0.7); border-left:1px solid rgba(0,245,255,0.3);
      padding-left:8px; margin:3px 0; white-space:pre-wrap; letter-spacing:0.5px;
      opacity:0; animation:logIn .3s forwards;
    }
    .log-entry .ts { color:rgba(0,245,255,0.35); margin-right:6px; }
    .log-entry.speech { border-color:var(--green); color:rgba(0,255,136,0.8); }
    @keyframes logIn { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }

    #creator {
      position:absolute; bottom:185px; left:25px;
      font-size:8px; letter-spacing:2px; color:rgba(0,245,255,0.2); z-index:20; pointer-events:none;
    }
    #lang-indicator {
      position:absolute; bottom:185px; right:25px;
      font-size:8px; letter-spacing:3px; color:rgba(0,245,255,0.3); z-index:20; pointer-events:none;
    }

    @media(max-width:600px) {
      #metrics{display:none} .hud-tl{font-size:8px} #terminal-box{height:90px}
    }
  </style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="preloader">
  <div class="boot-logo">myFACE</div>
  <div class="boot-sub">NEURAL BIOMETRIC SCANNER v2.0</div>
  <div class="boot-lines" id="boot-lines"></div>
  <canvas id="preload-viz" width="340" height="44"></canvas>
  <div class="ring-wrap" id="ring-wrap">
    <svg viewBox="0 0 70 70">
      <circle cx="35" cy="35" r="30" fill="none" stroke="rgba(0,245,255,0.15)" stroke-width="1"/>
      <circle cx="35" cy="35" r="30" fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="40 150" stroke-linecap="round"/>
    </svg>
    <svg viewBox="0 0 70 70" class="rev" style="width:50px;height:50px;top:10px;left:10px">
      <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(0,245,255,0.08)" stroke-width="1"/>
      <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(0,245,255,0.4)" stroke-width="1" stroke-dasharray="15 110" stroke-linecap="round"/>
    </svg>
  </div>
  <button id="access-btn" onclick="startSequence()"><span>// INITIALIZE SYSTEM //</span></button>
  <div id="status-text">AWAITING BIOMETRIC AUTHORIZATION</div>
</div>

<div id="container">
  <video class="input_video" playsinline muted></video>
  <canvas class="output_canvas"></canvas>
  <canvas id="face-frame-canvas"></canvas>
  <div id="acquired-flash"></div>

  <div class="hud-tl">
    <div class="hud-row"><div class="hud-dot"></div><span>LINK_STATUS: ACTIVE</span></div>
    <div class="hud-row" id="target-status"><span>&gt; TARGET: SEEKING...</span></div>
    <div class="hud-row" id="fps-row"><span>FPS: --</span></div>
  </div>

  <div class="hud-tr">
    <button id="export-btn" class="ui-btn">
      <span class="st-a">Export Log</span>
      <span class="st-b">Save .TXT</span>
    </button>
    <button id="lang-btn" class="ui-btn" onclick="toggleLang()">
      <span class="st-a" id="lang-st-a">RU</span>
      <span class="st-b" id="lang-st-b">Switch: UK</span>
    </button>
    <button id="switch-cam" class="ui-btn">
      <span class="st-a" id="cam-st-a">Front Cam</span>
      <span class="st-b" id="cam-st-b">Back Cam</span>
    </button>
  </div>

  <div id="reticle">
    <svg viewBox="0 0 120 120" fill="none">
      <g stroke="#00f5ff" stroke-width="1" opacity="0.8">
        <path d="M20 10L10 10L10 20"/><path d="M100 10L110 10L110 20"/>
        <path d="M10 100L10 110L20 110"/><path d="M110 100L110 110L100 110"/>
        <line x1="60" y1="50" x2="60" y2="56" stroke-width=".8" opacity=".5"/>
        <line x1="60" y1="64" x2="60" y2="70" stroke-width=".8" opacity=".5"/>
        <line x1="50" y1="60" x2="56" y2="60" stroke-width=".8" opacity=".5"/>
        <line x1="64" y1="60" x2="70" y2="60" stroke-width=".8" opacity=".5"/>
        <circle cx="60" cy="60" r="18" stroke-dasharray="8 6" opacity=".4">
          <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
    </svg>
  </div>

  <div id="target-label">TARGET ACQUIRED</div>
  <div id="face-info"><span id="fi-0"></span><span id="fi-1"></span><span id="fi-2"></span></div>

  <div id="metrics">
    <div class="metric-block">
      <div class="metric-label">SYMMETRY</div>
      <div class="metric-bar"><div class="metric-fill" id="m-symmetry" style="width:0%"></div></div>
      <div class="metric-value" id="mv-symmetry">--</div>
    </div>
    <div class="metric-block">
      <div class="metric-label">CONFIDENCE</div>
      <div class="metric-bar"><div class="metric-fill" id="m-conf" style="width:0%"></div></div>
      <div class="metric-value" id="mv-conf">--</div>
    </div>
    <div class="metric-block">
      <div class="metric-label">MESH PTS</div>
      <div class="metric-bar"><div class="metric-fill" style="width:78%"></div></div>
      <div class="metric-value">478</div>
    </div>
  </div>

  <div id="creator">CREATED BY BORTIN</div>
  <div id="lang-indicator">LANG: --</div>

  <div class="bottom-panel">
    <div id="live-speech-box">...</div>
    <div class="viz-wrap">
      <div id="viz-label">AUDIO // dB</div>
      <canvas id="audio_visualizer" width="800" height="60"></canvas>
    </div>
    <div id="terminal-box"><div id="log-content"></div></div>
  </div>
</div>

<script type="module">

  // ── DOM ──
  const videoEl     = document.querySelector('.input_video');
  const canvasEl    = document.querySelector('.output_canvas');
  const ctx         = canvasEl.getContext('2d');
  const frameCanvas = document.getElementById('face-frame-canvas');
  const fctx        = frameCanvas.getContext('2d');
  const liveSpeech  = document.getElementById('live-speech-box');
  const termBox     = document.getElementById('terminal-box');
  const logContent  = document.getElementById('log-content');
  const vizCanvas   = document.getElementById('audio_visualizer');
  const pvCanvas    = document.getElementById('preload-viz');
  const vCtx        = vizCanvas.getContext('2d');
  const pvCtx       = pvCanvas.getContext('2d');
  const tgtStatus   = document.getElementById('target-status');
  const reticleEl   = document.getElementById('reticle');
  const tgtLabel    = document.getElementById('target-label');
  const acqFlash    = document.getElementById('acquired-flash');
  const metricsEl   = document.getElementById('metrics');
  const fpsRow      = document.getElementById('fps-row');
  const langInd     = document.getElementById('lang-indicator');
  const faceInfo    = document.getElementById('face-info');
  const fi0         = document.getElementById('fi-0');
  const fi1         = document.getElementById('fi-1');
  const fi2         = document.getElementById('fi-2');

  // ── State ──
  let facingMode    = 'user';
  let camInstance   = null;
  let audioCtxNode, analyser, freqData;
  let activeStream  = null;
  let isSpeaking    = false;
  let logHistory    = [];
  let prevTarget    = false;
  let frameCount    = 0;
  let lastFpsTime   = performance.now();
  let recognition   = null;
  let recRestarting = false;
  let acquiredLogged= false;
  let currentLang   = 'ru-RU';
  let _SR           = null;

  // ── Boot messages ──
  const bootMsgs = [
    { txt:'INITIALIZING NEURAL CORE...',    cls:'ok',  d:300  },
    { txt:'LOADING MEDIAPIPE FACE_MESH...',  cls:'ok',  d:600  },
    { txt:'CALIBRATING DEPTH SENSORS...',   cls:'ok',  d:900  },
    { txt:'BIOMETRIC DATABASE: READY',      cls:'ok',  d:1200 },
    { txt:'AUDIO SUBSYSTEM: STANDBY',       cls:'err', d:1500 },
    { txt:'AWAITING OPERATOR CLEARANCE...', cls:'',    d:1800 },
  ];

  window.addEventListener('DOMContentLoaded', function() {
    var cont = document.getElementById('boot-lines');
    bootMsgs.forEach(function(m) {
      setTimeout(function() {
        var d = document.createElement('div');
        d.className = m.cls ? 'boot-line ' + m.cls : 'boot-line';
        d.textContent = '> ' + m.txt;
        cont.appendChild(d);
      }, m.d);
    });
    setTimeout(function() {
      document.getElementById('access-btn').style.display = 'block';
    }, 2200);
  });

  // ── Cleanup: Полное завершение всех медиа-потоков ──
  function releaseMediaResources() {
    if (activeStream) {
      activeStream.getTracks().forEach(track => track.stop());
      activeStream = null;
    }
    if (audioCtxNode && audioCtxNode.state !== 'closed') {
      audioCtxNode.close().catch(() => {});
    }
    if (recognition) {
      recRestarting = true; 
      try { recognition.abort(); } catch(_) {}
      recognition = null;
    }
    if (camInstance) {
      try { camInstance.stop(); } catch(_) {}
      camInstance = null;
    }
  }

  window.addEventListener('beforeunload', releaseMediaResources);

  // ── EQUALIZER ──
  function drawEQ(canvas, ctx2d, W, H) {
    if (!analyser || !freqData) {
      ctx2d.clearRect(0, 0, W, H);
      ctx2d.strokeStyle = 'rgba(0,245,255,0.15)';
      ctx2d.lineWidth   = 1;
      ctx2d.beginPath();
      ctx2d.moveTo(0, H / 2);
      ctx2d.lineTo(W, H / 2);
      ctx2d.stroke();
      return;
    }
    analyser.getByteFrequencyData(freqData);
    ctx2d.clearRect(0, 0, W, H);
    var N    = freqData.length;
    var barW = W / N;
    var gap  = Math.max(barW * 0.12, 0.8);
    for (var i = 0; i < N; i++) {
      var v     = freqData[i] / 255;
      var barH  = Math.max(v * H, 1.5);
      var green = Math.floor(200 + v * 55);
      var blue  = Math.floor(255 * (1 - v * 0.3));
      var alpha = 0.3 + v * 0.7;
      ctx2d.fillStyle = 'rgba(0,' + green + ',' + blue + ',' + alpha + ')';
      ctx2d.fillRect(i * barW, H - barH, barW - gap, barH);
      ctx2d.fillStyle = 'rgba(0,' + green + ',' + blue + ',' + (alpha * 0.25) + ')';
      ctx2d.fillRect(i * barW, 0, barW - gap, barH * 0.4);
    }
  }

  var eqRunning = false;
  function startEQ() {
    if (eqRunning) return;
    eqRunning = true;
    function loop() {
      if (pvCanvas && pvCanvas.offsetParent !== null) {
        drawEQ(pvCanvas, pvCtx, pvCanvas.width, pvCanvas.height);
      }
      var mw = vizCanvas.offsetWidth  || 600;
      var mh = vizCanvas.offsetHeight || 60;
      if (vizCanvas.width  !== mw) vizCanvas.width  = mw;
      if (vizCanvas.height !== mh) vizCanvas.height = mh;
      drawEQ(vizCanvas, vCtx, vizCanvas.width, vizCanvas.height);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  // ── startSequence ──
  window.startSequence = async function() {
    var btn    = document.getElementById('access-btn');
    var ring   = document.getElementById('ring-wrap');
    var status = document.getElementById('status-text');
    btn.style.display = 'none';
    try {
      status.textContent = 'ACCESSING CORE SENSORS...';
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
      activeStream = stream;

      ring.style.display = 'block';
      status.textContent = 'CALIBRATING NEURAL MESH...';

      audioCtxNode = new (window.AudioContext || window.webkitAudioContext)();
      analyser     = audioCtxNode.createAnalyser();
      analyser.fftSize = 512;
      audioCtxNode.createMediaStreamSource(stream).connect(analyser);
      freqData = new Uint8Array(analyser.frequencyBinCount);

      startEQ();

      videoEl.srcObject = stream;
      await startCamera();

      var loader = document.getElementById('preloader');
      loader.classList.add('hidden');
      setTimeout(() => {
        loader.style.display = 'none';
        document.getElementById('container').style.visibility = 'visible';
        initSpeech();
        addLog('SYSTEM ONLINE - BIOMETRIC SCANNING ACTIVE', 'system');
      }, 800);

    } catch(err) {
      status.textContent = 'FATAL ERROR: ACCESS DENIED';
      btn.style.display  = 'block';
      console.error(err);
    }
  };

  // ── Language ──
  function updateLangBtn(lang) {
    var isRU = lang === 'ru-RU';
    document.getElementById('lang-st-a').textContent = isRU ? 'RU' : 'UK';
    document.getElementById('lang-st-b').textContent = isRU ? 'Switch: UK' : 'Switch: RU';
    langInd.textContent = 'LANG: ' + lang.toUpperCase();
  }

  // ── Speech ──
  function initSpeech() {
    _SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!_SR) return;
    currentLang = 'ru-RU';
    updateLangBtn(currentLang);
    startRecognition(currentLang);
  }

  function startRecognition(lang) {
    if (recognition) { try { recognition.abort(); } catch(_) {} }
    recRestarting = false;
    currentLang   = lang;
    recognition   = new _SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = lang;

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        let t = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal && t) addLog(t, 'speech');
        else interim = t;
      }
      if (interim) {
        isSpeaking = true;
        liveSpeech.textContent = interim.toUpperCase();
        liveSpeech.classList.add('speaking');
      }
    };
    recognition.onend = () => {
      isSpeaking = false;
      liveSpeech.classList.remove('speaking');
      if (!recRestarting) setTimeout(() => startRecognition(currentLang), 400);
    };
    try { recognition.start(); } catch(_) {}
  }

  window.toggleLang = () => {
    recRestarting = true;
    startRecognition(currentLang === 'ru-RU' ? 'uk-UA' : 'ru-RU');
  };

  // ── Camera ──
  async function startCamera() {
    if (camInstance) await camInstance.stop();
    camInstance = new Camera(videoEl, {
      onFrame: async () => { if (videoEl.readyState >= 2) await faceMesh.send({ image: videoEl }); },
      facingMode: facingMode, width: 1280, height: 720
    });
    await camInstance.start();
    canvasEl.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  }

  document.getElementById('switch-cam').addEventListener('click', () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });

  // ── Log ──
  function addLog(text, type) {
    var ts = new Date().toLocaleTimeString('ru-RU');
    var entry = document.createElement('div');
    entry.className = type === 'speech' ? 'log-entry speech' : 'log-entry';
    entry.innerHTML = `<span class="ts">[${ts}]</span>${text.toUpperCase()}`;
    logContent.appendChild(entry);
    termBox.scrollTop = termBox.scrollHeight;
    logHistory.push(`[${ts}] ${text.toUpperCase()}`);
  }

  // ── Drawing Utils ──
  function getFaceBounds(lm, W, H) {
    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    for (let i = 0; i < lm.length; i++) {
      if (lm[i].x < minX) minX = lm[i].x;
      if (lm[i].x > maxX) maxX = lm[i].x;
      if (lm[i].y < minY) minY = lm[i].y;
      if (lm[i].y > maxY) maxY = lm[i].y;
    }
    const pad = 0.05;
    return {
      x: (minX - pad) * W, y: (minY - pad) * H,
      w: (maxX - minX + pad * 2) * W, h: (maxY - minY + pad * 2) * H
    };
  }

  function drawPerspectiveFrame(lm, W, H, color, now) {
    if (frameCanvas.width !== W) frameCanvas.width = W;
    if (frameCanvas.height !== H) frameCanvas.height = H;
    fctx.clearRect(0, 0, W, H);

    const b = getFaceBounds(lm, W, H);
    const depth = 0.12, shrink = 1 - depth;
    const cx = b.x + b.w / 2, cy = b.y + b.h / 2;

    const TL = { x: b.x, y: b.y }, TR = { x: b.x + b.w, y: b.y };
    const BL = { x: b.x, y: b.y + b.h }, BR = { x: b.x + b.w, y: b.y + b.h };

    const shift = b.h * depth * 0.4;
    const bTL = { x: cx + (TL.x - cx) * shrink, y: cy + (TL.y - cy) * shrink - shift };
    const bTR = { x: cx + (TR.x - cx) * shrink, y: cy + (TR.y - cy) * shrink - shift };
    const bBL = { x: cx + (BL.x - cx) * shrink, y: cy + (BL.y - cy) * shrink - shift };
    const bBR = { x: cx + (BR.x - cx) * shrink, y: cy + (BR.y - cy) * shrink - shift };

    fctx.save();
    fctx.strokeStyle = color + 'cc';
    fctx.lineWidth = 1;
    fctx.shadowBlur = 8; fctx.shadowColor = color;

    // Outer & Inner rects
    fctx.beginPath();
    [TL, TR, BR, BL].forEach((p, i) => i === 0 ? fctx.moveTo(p.x, p.y) : fctx.lineTo(p.x, p.y));
    fctx.closePath(); fctx.stroke();

    fctx.globalAlpha = 0.3;
    fctx.beginPath();
    [bTL, bTR, bBR, bBL].forEach((p, i) => i === 0 ? fctx.moveTo(p.x, p.y) : fctx.lineTo(p.x, p.y));
    fctx.closePath(); fctx.stroke();

    // Connectors
    [[TL, bTL], [TR, bTR], [BL, bBL], [BR, bBR]].forEach(p => {
      fctx.beginPath(); fctx.moveTo(p[0].x, p[0].y); fctx.lineTo(p[1].x, p[1].y); fctx.stroke();
    });

    fctx.restore();

    faceInfo.style.left = (TL.x + 10) + 'px';
    faceInfo.style.top  = (TL.y - 45) + 'px';
    faceInfo.classList.add('visible');

    // UI labels
    fi0.textContent = "ID: " + (Math.random() > 0.5 ? "4A-99" : "2F-12");
    fi1.textContent = "SCAN: OK";
    fi2.textContent = isSpeaking ? "AUDIO IN" : "SILENT";
  }

  // ── Кастомная отрисовка рта без горизонтальной линии ──
  function drawMouth(lm, W, H, color) {
    const outerTop = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
    const outerBottom = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291];
    const innerTop = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308];
    const innerBottom = [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308];

    const drawContour = (indices, alpha) => {
      ctx.beginPath();
      ctx.globalAlpha = alpha;
      indices.forEach((idx, i) => {
        const p = lm[idx];
        if (i === 0) ctx.moveTo(p.x * W, p.y * H);
        else ctx.lineTo(p.x * W, p.y * H);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    };

    drawContour(outerTop, 0.8);
    drawContour(outerBottom, 0.8);
    drawContour(innerTop, 0.4);
    drawContour(innerBottom, 0.4);
    ctx.globalAlpha = 1;
  }

  function onResults(results) {
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
      fpsRow.querySelector('span').textContent = 'FPS: ' + frameCount;
      frameCount = 0; lastFpsTime = now;
    }

    const W = videoEl.videoWidth || canvasEl.clientWidth;
    const H = videoEl.videoHeight || canvasEl.clientHeight;
    if (canvasEl.width !== W) canvasEl.width = W;
    if (canvasEl.height !== H) canvasEl.height = H;

    ctx.save();
    ctx.clearRect(0, 0, W, H);
    ctx.globalAlpha = 0.2;
    ctx.drawImage(results.image, 0, 0, W, H);
    ctx.globalAlpha = 1;

    const faces = results.multiFaceLandmarks;
    if (faces && faces.length > 0) {
      if (!prevTarget) {
        reticleEl.classList.add('visible');
        tgtLabel.classList.add('visible');
        metricsEl.classList.add('visible');
        tgtStatus.querySelector('span').textContent = '> TARGET: ACQUIRED';
      }
      
      const lm = faces[0];
      const eyesClosed = Math.hypot(lm[159].x-lm[145].x, lm[159].y-lm[145].y) < 0.015;
      const color = isSpeaking ? '#00ff88' : (eyesClosed ? '#ff2244' : '#00f5ff');

      // Tesselation & Shapes
      drawConnectors(ctx, lm, FACEMESH_TESSELATION, { color: color+'15', lineWidth: 0.5 });
      drawConnectors(ctx, lm, FACEMESH_RIGHT_EYE, { color: color, lineWidth: 1 });
      drawConnectors(ctx, lm, FACEMESH_LEFT_EYE, { color: color, lineWidth: 1 });
      
      drawMouth(lm, W, H, color);
      drawPerspectiveFrame(lm, W, H, color, now);

      document.getElementById('m-conf').style.width = '94%';
      document.getElementById('mv-conf').textContent = '94%';
    } else {
      if (prevTarget) {
        reticleEl.classList.remove('visible');
        tgtLabel.classList.remove('visible');
        faceInfo.classList.remove('visible');
        tgtStatus.querySelector('span').textContent = '> TARGET: SEEKING...';
        fctx.clearRect(0, 0, frameCanvas.width, frameCanvas.height);
      }
    }
    prevTarget = !!(faces && faces.length > 0);
    ctx.restore();
  }

  const faceMesh = new FaceMesh({
    locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
  faceMesh.onResults(onResults);

</script>
</body>
</html>
