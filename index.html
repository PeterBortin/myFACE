<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>myFACE | Neural Interface</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

  <style>
    :root { --glow: #00f2ff; --bg: #050505; --accent: #ffffff; }
    body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    
    /* Улучшенный Прелоадер */
    #preloader {
      position: fixed; inset: 0; background: var(--bg); z-index: 1000;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .loader-ui { width: 150px; height: 2px; background: #222; position: relative; overflow: hidden; margin: 20px 0; }
    .loader-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
    
    #access-btn {
      background: none; border: 1px solid var(--accent); color: var(--accent);
      padding: 12px 40px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 5px; font-weight: bold; transition: 0.3s;
    }
    #access-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

    /* Интерфейс */
    #container { position: relative; width: 100vw; height: 100vh; opacity: 0; transition: opacity 1s; }
    .output_canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    
    .controls {
      position: absolute; top: 20px; right: 20px; z-index: 100;
      display: flex; flex-direction: column; gap: 10px;
    }
    .ui-btn {
      background: rgba(0,0,0,0.6); border: 1px solid #444; color: #ccc;
      padding: 10px; cursor: pointer; font-size: 9px; letter-spacing: 1px;
      backdrop-filter: blur(5px); transition: 0.2s;
    }
    .ui-btn:hover { border-color: #fff; color: #fff; }

    .overlay-text { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 10px; line-height: 1.5; color: rgba(255,255,255,0.5); }
    
    /* Нижняя панель */
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 20px; box-sizing: border-box; z-index: 20;
    }
    #live-speech { 
      font-size: 24px; color: #fff; text-align: center; height: 30px; 
      margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    #visualizer { width: 100%; height: 60px; margin-bottom: 15px; opacity: 0.7; }
    #terminal {
      height: 120px; background: rgba(255,255,255,0.03); border: 1px solid #222;
      padding: 10px; font-size: 11px; overflow-y: auto; scrollbar-width: none;
    }
    .log-line { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; animation: blink 0.1s; }
    @keyframes blink { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body>
  <div id="preloader">
    <div style="letter-spacing: 10px; font-size: 12px; color: #555;">MYFACE SYSTEM v2.0</div>
    <div class="loader-ui"><div class="loader-bar" id="load-progress"></div></div>
    <button id="access-btn">INITIALIZE</button>
  </div>

  <div id="container">
    <video id="input_video" style="display:none" playsinline muted></video>
    <canvas id="output_canvas" class="output_canvas"></canvas>
    
    <div class="controls">
      <button class="ui-btn" id="btn-cam">SWITCH CAMERA</button>
      <button class="ui-btn" id="btn-export">SAVE SYSTEM LOG</button>
    </div>

    <div class="overlay-text" id="sys-info">
      > STATUS: STABLE<br>
      > SENSORS: ACTIVE<br>
      > TARGET: SCANNING
    </div>

    <div class="bottom-panel">
      <div id="live-speech">READY</div>
      <canvas id="visualizer"></canvas>
      <div id="terminal"></div>
    </div>
  </div>

  <script type="module">
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const terminal = document.getElementById('terminal');
    const visCanvas = document.getElementById('visualizer');
    const visCtx = visCanvas.getContext('2d');

    let state = {
      isSpeaking: false,
      facingMode: 'user',
      stream: null,
      audioCtx: null,
      analyser: null,
      fullLog: []
    };

    // --- ЛОГИРОВАНИЕ ---
    function log(msg) {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = 'log-line';
      line.textContent = `[${time}] ${msg.toUpperCase()}`;
      terminal.prepend(line);
      state.fullLog.push(`[${time}] ${msg}`);
      if (terminal.childNodes.length > 20) terminal.lastChild.remove();
    }

    // --- АУДИО АНАЛИЗАТОР ---
    function initAudio(stream) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      state.analyser = state.audioCtx.createAnalyser();
      const source = state.audioCtx.createMediaStreamSource(stream);
      source.connect(state.analyser);
      state.analyser.fftSize = 64;
      drawVisualizer();
    }

    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);
      const buffer = new Uint8Array(state.analyser.frequencyBinCount);
      state.analyser.getByteFrequencyData(buffer);
      
      visCanvas.width = visCanvas.clientWidth;
      visCanvas.height = visCanvas.clientHeight;
      const barWidth = visCanvas.width / buffer.length;
      
      visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);
      buffer.forEach((v, i) => {
        const h = (v / 255) * visCanvas.height;
        visCtx.fillStyle = `rgba(255, 255, 255, ${v/255})`;
        visCtx.fillRect(i * barWidth, visCanvas.height - h, barWidth - 2, h);
      });
    }

    // --- FACE MESH КОНФИГУРАЦИЯ ---
    const faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    faceMesh.onResults((results) => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Рисуем видео-подложку
      ctx.globalAlpha = 0.2;
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        document.getElementById('sys-info').innerHTML = "> STATUS: STABLE<br>> TARGET: LOCKED";
        const landmarks = results.multiFaceLandmarks[0];
        drawFaceOverlay(landmarks);
      } else {
        document.getElementById('sys-info').innerHTML = "> STATUS: STABLE<br>> TARGET: LOST";
      }
    });

    function drawFaceOverlay(points) {
      const color = state.isSpeaking ? "#00f2ff" : "#ffffff";
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.8;

      // Сетка (упрощенная для быстродействия)
      ctx.beginPath();
      ctx.globalAlpha = 0.3;
      for (let i = 0; i < points.length; i += 5) {
        const p = points[i];
        ctx.rect(p.x * canvas.width, p.y * canvas.height, 1, 1);
      }
      ctx.stroke();

      // Губы (акцент на речь)
      ctx.beginPath();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 2;
      [13, 14, 78, 308].forEach(idx => {
        const p = points[idx];
        ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
      });
      ctx.stroke();
    }

    // --- СИСТЕМА КАМЕРЫ ---
    async function startSystem() {
      try {
        log("Requesting sensor access...");
        // Запрос один раз на всё
        state.stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: state.facingMode, width: 1280, height: 720 },
          audio: true
        });

        video.srcObject = state.stream;
        video.play();

        initAudio(state.stream);
        initSpeech();

        const camera = new Camera(video, {
          onFrame: async () => { await faceMesh.send({image: video}); }
        });
        camera.start();

        document.getElementById('preloader').style.opacity = '0';
        document.getElementById('container').style.opacity = '1';
        setTimeout(() => document.getElementById('preloader').style.display = 'none', 800);
        
        log("Neural link established");
      } catch (err) {
        alert("Camera/Mic access required");
        location.reload();
      }
    }

    // --- РАСПОЗНАВАНИЕ РЕЧИ ---
    function initSpeech() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return;
      
      const rec = new Speech();
      rec.lang = 'ru-RU';
      rec.continuous = true;
      rec.interimResults = true;

      rec.onresult = (e) => {
        const text = Array.from(e.results).map(r => r[0].transcript).pop();
        document.getElementById('live-speech').textContent = text.toUpperCase();
        state.isSpeaking = true;
        if (e.results[e.results.length - 1].isFinal) {
          log(text);
          state.isSpeaking = false;
        }
      };

      rec.onend = () => rec.start(); // Поддержание жизни
      rec.start();
    }

    // --- КНОПКИ ---
    document.getElementById('access-btn').onclick = startSystem;

    document.getElementById('btn-cam').onclick = async () => {
      state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
      log(`Switching to ${state.facingMode} sensor`);
      const newVideoTrack = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: state.facingMode }
      });
      const videoTrack = newVideoTrack.getVideoTracks()[0];
      const sender = state.stream.getTracks().find(t => t.kind === 'video');
      state.stream.removeTrack(sender);
      state.stream.addTrack(videoTrack);
      video.srcObject = state.stream;
    };

    document.getElementById('btn-export').onclick = () => {
      const blob = new Blob([state.fullLog.join('\n')], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `sys_log_${Date.now()}.txt`;
      a.click();
    };

  </script>
</body>
</html>
