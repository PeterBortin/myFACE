<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI TERMINAL v7.0 PROTOCOL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { 
            --white: #ffffff;
            --yellow: #ffff00;
            --orange: #ff6600;
            --red: #ff0000;
            --terminal-bg: rgba(0, 5, 0, 0.9);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #video-wrapper { position: relative; flex: 1; width: 100%; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }
        
        #terminal { 
            height: 80px; 
            width: 100%; 
            background: var(--terminal-bg); 
            border-top: 2px solid #333; 
            z-index: 20; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex;
            align-items: center;
        }

        #term-line {
            color: #00ff41;
            font-size: 14px;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #00ff41;
            animation: blink .6s step-end infinite;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: #00ff41;
        }
        button {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #00ff41;
            color: #00ff41; padding: 20px 40px; font-size: 1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }
        
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #00ff41; } }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 18px; margin-bottom: 25px;">SYSTEM ACCESS REQUIRED</div>
    <button onclick="startApp()">EXECUTE PROTOCOL</button>
</div>

<div id="container">
    <div id="video-wrapper">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-line">SYSTEM_IDLE: ОЖИДАНИЕ СИГНАЛА...</div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termLine = document.getElementById('term-line');
    
    let model = null;
    let lastLog = "";

    function updateTerminal(text) {
        if (lastLog === text) return;
        lastLog = text;
        termLine.style.animation = 'none';
        termLine.innerText = "";
        let i = 0;
        function type() {
            if (i < text.length) {
                termLine.innerText += text.charAt(i);
                i++;
                setTimeout(type, 20);
            } else {
                termLine.style.animation = 'blink .6s step-end infinite';
            }
        }
        type();
    }

    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            await video.play();
            updateTerminal("LOADING_COCO_SSD_MODEL...");
            model = await cocoSsd.load();
            document.getElementById('overlay').style.display = 'none';
            updateTerminal("SYSTEM_ONLINE: СКАНЕР АКТИВИРОВАН");
            detectFrame();
        } catch (e) {
            alert("CRITICAL_ERROR: CAMERA_ACCESS_DENIED");
        }
    }

    async function detectFrame() {
        const predictions = await model.detect(video);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (predictions.length > 0) {
            const topObj = predictions[0];
            updateTerminal(`DETECTED: ${topObj.class.toUpperCase()} | CONF: ${Math.round(topObj.score*100)}% | POS: ${Math.round(topObj.bbox[0])}:${Math.round(topObj.bbox[1])}`);
        }

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            
            let mainColor = "var(--white)";
            let isPerson = label === 'person';
            let isAuto = ['car', 'truck', 'bus'].includes(label);

            if (isPerson) mainColor = "var(--yellow)";
            if (isAuto) mainColor = "var(--red)";

            // Отрисовка основной рамки (пунктир)
            ctx.shadowColor = "black";
            ctx.shadowBlur = 5;
            ctx.strokeStyle = mainColor;
            ctx.setLineDash([8, 4]);
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.setLineDash([]);

            // Углы
            drawCorners(x, y, w, h, mainColor);

            // Тайтл
            ctx.fillStyle = mainColor;
            ctx.font = "bold 16px Courier New";
            ctx.fillText(label.toUpperCase(), x + 5, y - 10);
            ctx.shadowBlur = 0;

            // Специфические детекторы
            if (isPerson) {
                // Голова (верхние 20% рамки)
                const headW = w * 0.4;
                const headH = h * 0.2;
                const headX = x + (w/2) - (headW/2);
                const headY = y + (h * 0.05);
                
                ctx.strokeStyle = "var(--orange)";
                ctx.setLineDash([4, 2]);
                ctx.strokeRect(headX, headY, headW, headH);
                ctx.fillStyle = "var(--orange)";
                ctx.font = "10px Courier New";
                ctx.fillText("HEAD_CONFIRMED", headX, headY - 5);
            }

            if (isAuto) {
                // Колеса (нижние углы)
                const wheelSize = w * 0.2;
                ctx.strokeStyle = "var(--orange)";
                ctx.setLineDash([3, 3]);
                // Левое колесо
                ctx.strokeRect(x + (w*0.1), y + (h*0.75), wheelSize, wheelSize);
                // Правое колесо
                ctx.strokeRect(x + (w*0.7), y + (h*0.75), wheelSize, wheelSize);
                ctx.fillStyle = "var(--orange)";
                ctx.font = "10px Courier New";
                ctx.fillText("WHEEL_LOCK", x + (w*0.1), y + h + 12);
            }
        });

        requestAnimationFrame(detectFrame);
    }

    function drawCorners(x, y, w, h, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        const s = 20;
        ctx.beginPath();
        // LT
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        // RT
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        // LB
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        // RB
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }
</script>
</body>
</html>
