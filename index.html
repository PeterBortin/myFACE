<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Face Scanner v6.2.3 - MONOCHROME</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #888; }
    
    /* --- ОБНОВЛЕННЫЙ ПРЕЛОАДЕР --- */
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.5s ease; border: 1px solid #333; box-sizing: border-box;
    }
    #logo-container {
      font-size: 42px; font-weight: bold; color: #fff; letter-spacing: 10px;
      margin-bottom: 20px; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; text-shadow: 0 0 5px #fff; }
      50% { opacity: 0.3; text-shadow: 0 0 20px #fff; }
      100% { opacity: 1; text-shadow: 0 0 5px #fff; }
    }
    #boot-log {
      width: 300px; height: 100px; font-size: 10px; color: #444;
      overflow: hidden; margin-bottom: 20px; text-align: left;
    }
    .loader-ring {
      display: none; width: 40px; height: 40px; border: 2px solid #222;
      border-radius: 50%; border-top-color: #fff;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #access-btn {
      background: #fff; border: none; color: #000;
      padding: 15px 40px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 2px; font-family: inherit; font-weight: bold; transition: 0.3s;
    }
    #access-btn:hover { background: #888; color: #fff; }

    /* --- ИНТЕРФЕЙС --- */
    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
    .input_video { display: none; }
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }
    .ui-layer { position: absolute; top: 20px; right: 20px; z-index: 110; display: flex; gap: 10px; }
    .ui-btn {
      background: rgba(0,0,0,0.7); border: 1px solid #fff; color: #fff;
      padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 10px;
    }
    .interface-overlay { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 11px; pointer-events: none; color: #666; }
    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, #000 90%, transparent); padding-bottom: 20px;
    }
    #live-speech-box { width: 90%; min-height: 35px; margin-bottom: 5px; text-align: center; font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
    #audio_visualizer { width: 90%; height: 80px; margin-bottom: 10px; background: rgba(255,255,255,0.02); border: 1px solid #222; }
    #terminal-box {
      width: 90%; height: 150px; background: rgba(255, 255, 255, 0.01);
      border: 1px solid #222; padding: 10px; box-sizing: border-box;
      overflow-y: auto; font-size: 10px; scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .log-entry { margin: 2px 0; color: #555; border-left: 1px solid #222; padding-left: 8px; white-space: pre-wrap; }
    .log-entry:last-child { color: #fff; border-left: 1px solid #fff; }
  </style>
</head>

<body>
  <div id="preloader">
    <div id="logo-container">myFACE</div>
    <div id="boot-log"></div>
    <div class="loader-ring" id="ring"></div>
    <button id="access-btn" onclick="startSequence()">Дать доступы</button>
    <p id="status-text" style="margin-top: 20px; font-size: 10px; color: #444;">AWAITING BIOMETRIC AUTHORIZATION...</p>
  </div>

  <div class="ui-layer">
    <button id="switch-camera" class="ui-btn">Switch Cam</button>
    <button id="export-pdf" class="ui-btn" style="border-color: #555;">Save Log (PDF)</button>
  </div>

  <div id="container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>
    <div class="interface-overlay">
      <div>> LINK_STATUS: ACTIVE</div>
      <div id="target-status">> TARGET: SEEKING...</div>
    </div>
    <div class="bottom-peripherals">
      <div id="live-speech-box">IDLE</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const logContent = document.getElementById('log-content');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');
    const bootLog = document.getElementById('boot-log');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, freqData, globalStream;
    let isSpeaking = false;
    let logQueue = [];
    let fullLogHistory = []; 
    let isTyping = false;

    // --- ИМИТАЦИЯ ЗАГРУЗКИ ---
    const bootSteps = [
      "Initializing core modules...",
      "Loading Mediapipe FaceMesh v6.2.3...",
      "Connecting to Neural Network...",
      "Audio context: STANDBY",
      "Optical sensors: READY",
      "Ready for biometric link."
    ];
    let step = 0;
    function typeBoot() {
      if(step < bootSteps.length) {
        bootLog.innerHTML += `> ${bootSteps[step]}<br>`;
        step++;
        setTimeout(typeBoot, 400);
      }
    }
    typeBoot();

    // --- ЛОГИКА ТЕРМИНАЛА ---
    async function processLogQueue() {
      if (isTyping || logQueue.length === 0) return;
      isTyping = true;
      const { text, timestamp } = logQueue.shift();
      const entryText = `[${timestamp}] ${text.toUpperCase()}`;
      fullLogHistory.push(entryText);
      
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerText = `[${timestamp}] `;
      logContent.appendChild(entry);
      
      const message = text.toUpperCase();
      for (let i = 0; i < message.length; i++) {
        entry.innerText += message[i];
        terminalBox.scrollTop = terminalBox.scrollHeight;
        await new Promise(r => setTimeout(r, 5));
      }
      isTyping = false;
      processLogQueue();
    }

    function addLog(text) {
      logQueue.push({ text, timestamp: new Date().toLocaleTimeString() });
      if (!isTyping) processLogQueue();
    }

    // --- ИСПРАВЛЕННЫЙ ЭКСПОРТ В PDF ---
    window.exportToPDF = function() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFont("courier", "bold");
      doc.setFontSize(16);
      doc.text("MYFACE NEURAL TERMINAL LOG", 10, 20);
      
      doc.setFont("courier", "normal");
      doc.setFontSize(10);
      
      let y = 30;
      fullLogHistory.forEach(line => {
        if (y > 280) { doc.addPage(); y = 20; }
        doc.text(line, 10, y);
        y += 6;
      });
      
      doc.save(`myface_log_${Date.now()}.pdf`);
    };

    document.getElementById('export-pdf').addEventListener('click', exportToPDF);

    // --- ИНИЦИАЛИЗАЦИЯ ---
    window.startSequence = async function() {
      const btn = document.getElementById('access-btn');
      const ring = document.getElementById('ring');
      const status = document.getElementById('status-text');

      try {
        btn.style.display = 'none';
        ring.style.display = 'block';
        status.innerText = "LINKING SENSORS...";

        globalStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true }, 
            video: true 
        });
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(globalStream);
        source.connect(analyser);
        analyser.fftSize = 128;
        freqData = new Uint8Array(analyser.frequencyBinCount);
        
        drawBars();

        videoElement.srcObject = globalStream;
        await startCamera();
        
        document.getElementById('preloader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('preloader').style.display = 'none';
          document.getElementById('container').style.visibility = 'visible';
          initSpeechRecognition();
          addLog("System Online");
          addLog("Neural link established");
        }, 500);

      } catch (err) {
        console.error(err);
        status.innerText = "FATAL ERROR: ACCESS DENIED";
        btn.style.display = 'block';
        ring.style.display = 'none';
      }
    };

    function drawBars() {
      requestAnimationFrame(drawBars);
      if(!analyser) return;
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteFrequencyData(freqData);
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      
      let sum = 0;
      const barWidth = (audioCanvas.width / freqData.length) * 2;
      let x = 0;
      for (let i = 0; i < freqData.length; i++) {
        const barHeight = (freqData[i] / 255) * audioCanvas.height;
        sum += freqData[i];
        aCtx.fillStyle = `rgb(${freqData[i]+100},${freqData[i]+100},${freqData[i]+100})`;
        aCtx.fillRect(x, audioCanvas.height - barHeight, barWidth - 1, barHeight);
        x += barWidth;
      }
      isSpeaking = (sum / freqData.length) > 35; 
    }

    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ru-RU';
        recognition.onresult = (e) => {
          let interim = "";
          for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) addLog("VOICE_IN: " + e.results[i][0].transcript);
            else interim += e.results[i][0].transcript;
          }
          liveSpeechBox.innerText = interim || "LISTENING...";
        };
        recognition.onend = () => recognition.start();
        recognition.start();
      }
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Черный фильтр стал прозрачнее (было 0.15, стало 0.25)
      canvasCtx.globalAlpha = 0.25; 
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        targetStatus.innerText = "> TARGET: ACQUIRED";
        for (const landmarks of results.multiFaceLandmarks) {
          const leftD = Math.hypot(landmarks[159].x - landmarks[145].x, landmarks[159].y - landmarks[145].y);
          const rightD = Math.hypot(landmarks[386].x - landmarks[374].x, landmarks[386].y - landmarks[374].y);
          const eyesClosed = leftD < 0.012 && rightD < 0.012;

          let mainColor = "#ffffff";
          if (isSpeaking) mainColor = "#00ff00"; 
          else if (eyesClosed) mainColor = "#ff0000"; 

          canvasCtx.strokeStyle = mainColor;
          canvasCtx.lineWidth = 0.5;
          
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: mainColor + "33", lineWidth: 0.5});
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: mainColor});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: mainColor});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: mainColor});
          
          if(eyesClosed && !isSpeaking) {
             canvasCtx.fillStyle = "rgba(255,0,0,0.1)";
             canvasCtx.fillRect(0,0, canvasElement.width, canvasElement.height);
          }
        }
      } else {
        targetStatus.innerText = "> TARGET: SEEKING...";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCamera() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: currentFacingMode, width: 1280, height: 720
      });
      await cameraInstance.start();
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
      addLog("Switching optic sensor...");
    });
  </script>
</body>
</html>
