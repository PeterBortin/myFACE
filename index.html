<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyber Mesh Terminal v2.0</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    
    /* Кнопка запуска (защита от блокировки браузером) */
    #overlay-start {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 100; display: flex;
      justify-content: center; align-items: center; cursor: pointer;
    }
    #overlay-start h1 { border: 1px solid #fff; padding: 20px; text-transform: uppercase; letter-spacing: 5px; }

    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .input_video { display: none; }
    
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }

    .interface-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      font-size: 12px; text-shadow: 0 0 5px #fff;
    }

    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, rgba(0,0,0,1), transparent);
      padding-bottom: 20px;
    }

    #audio_visualizer { width: 80%; height: 60px; margin-bottom: 5px; }

    #terminal-box {
      width: 85%; height: 120px; background: rgba(0, 0, 0, 0.8);
      border: 1px solid #fff; padding: 15px; box-sizing: border-box;
      overflow: hidden; position: relative;
    }

    #terminal-output {
      margin: 0; font-size: 18px; line-height: 1.4;
      text-transform: uppercase; color: #fff;
    }

    .cursor { animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>

<body>

  <div id="overlay-start" onclick="startSystem()">
    <h1>INITIALIZE SYSTEM</h1>
  </div>

  <div id="container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div>> CORE: ACTIVE</div>
      <div id="vox-status">> VOX: STANDBY</div>
    </div>

    <div class="bottom-peripherals">
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box">
        <p id="terminal-output">READY FOR INPUT...<span class="cursor">_</span></p>
      </div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const terminalOutput = document.getElementById('terminal-output');
    const voxStatus = document.getElementById('vox-status');

    // --- АУДИО ВИЗУАЛИЗАЦИЯ ---
    let audioCtx, analyser, dataArray, source;
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');

    async function initAudio() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 1024;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      drawWave();
    }

    function drawWave() {
      requestAnimationFrame(drawWave);
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteTimeDomainData(dataArray);
      
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      aCtx.lineWidth = 2;
      aCtx.strokeStyle = '#ffffff';
      aCtx.beginPath();

      let sliceWidth = audioCanvas.width / dataArray.length;
      let x = 0;
      for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = v * audioCanvas.height / 2;
        if (i === 0) aCtx.moveTo(x, y); else aCtx.lineTo(x, y);
        x += sliceWidth;
      }
      aCtx.lineTo(audioCanvas.width, audioCanvas.height / 2);
      aCtx.stroke();
    }

    // --- РАСПОЗНАВАНИЕ РЕЧИ (RU/EN) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU'; // Базовый, но Chrome ловит и EN

      recognition.onresult = (event) => {
        let text = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          text += event.results[i][0].transcript;
        }
        terminalOutput.innerHTML = `> ${text}<span class="cursor">_</span>`;
      };

      recognition.onstart = () => voxStatus.innerText = "> VOX: LISTENING";
      recognition.onend = () => recognition.start(); // Авто-рестарт
      window.startSpeech = () => recognition.start();
    }

    // --- FACE MESH ---
    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      
      // ЧЕРНЫЙ ФОН
      canvasCtx.fillStyle = '#000';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

      // Прозрачный силуэт видео (5%)
      canvasCtx.globalAlpha = 0.05;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
          // БЕЛАЯ СЕТКА
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: 'rgba(255,255,255,0.3)', lineWidth: 0.5});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#ffffff', lineWidth: 2});
          drawConnectors(canvasCtx, landmarks, FACEMESH_FACE_OVAL, {color: '#ffffff', lineWidth: 1});
        }
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({image: videoElement}); },
      width: 1280, height: 720
    });

    // Функция запуска по клику
    window.startSystem = function() {
      document.getElementById('overlay-start').style.display = 'none';
      initAudio();
      if (window.startSpeech) window.startSpeech();
      camera.start();
    }
  </script>
</body>
</html>
