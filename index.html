<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v9.8 | PIXEL_GRID_LIDAR</title>
    
    <!-- Подключаем ядро и WASM для старых CPU -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { 
            --target: #ffff00; --hostile: #ff0000; --bio: #ff00ff; --obj: #ffffff; --plant: #00ff41;
            --bg: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff41; }
        
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; flex: 1; overflow: hidden; cursor: crosshair; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.35) contrast(1.3) grayscale(0.2); 
            z-index: 1; 
            transition: opacity 0.3s ease;
        }
        video.lidar-mode { opacity: 0; } /* Скрываем видео в лидаре, оставляем только сетку */

        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }

        /* Панель управления */
        #ui-layer {
            position: absolute; top: 10px; right: 10px; z-index: 20; display: flex; gap: 10px;
        }
        .ui-btn {
            background: rgba(0,0,0,0.7); border: 1px solid #00ff41; color: #00ff41;
            padding: 8px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
        .ui-btn.active { background: #00ff41; color: #000; }

        #terminal { 
            height: 160px; background: var(--bg); border-top: 2px solid #1a1a1a; 
            padding: 15px; box-sizing: border-box; overflow: hidden; font-size: 12px;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }
        .term-row { margin-bottom: 4px; opacity: 0.9; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #overlay button {
            background: none; border: 1px solid #00ff41; color: #00ff41;
            padding: 15px 40px; cursor: pointer; letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="margin-bottom:20px; font-size:10px;">CORE_V9: COMPATIBILITY_MODE_ACTIVE</div>
    <button onclick="initVision()">BOOT SYSTEM</button>
</div>

<div id="container">
    <div id="ui-layer">
        <button id="btn-std" class="ui-btn active" onclick="setMode('STD')">Vision: STD</button>
        <button id="btn-lidar" class="ui-btn" onclick="setMode('LIDAR')">Vision: LiDAR</button>
    </div>
    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<!-- Скрытый холст для анализа пикселей видеопотока -->
<canvas id="buffer" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const buffer = document.getElementById('buffer');
    const bctx = buffer.getContext('2d', {willReadFrequently: true});
    const termContent = document.getElementById('term-content');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];
    let currentMode = 'STD';

    const COLORS = {
        'person': '#ffff00',
        'car': '#ff0000', 'truck': '#ff0000', 'bus': '#ff0000', 'motorcycle': '#ff0000',
        'dog': '#ff00ff', 'cat': '#ff00ff', 'bird': '#ff00ff',
        'potted plant': '#00ff41',
        'default': '#ffffff'
    };

    async function initVision() {
        try {
            await tf.setBackend('wasm');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
            });
            video.srcObject = stream;
            await video.play();
            
            buffer.width = 160; // Уменьшенное разрешение для анализа производительности
            buffer.height = 120;
            
            writeTerm("ENGINE: LOADING COCO-SSD LIGHTWEIGHT...");
            model = await cocoSsd.load();
            
            document.getElementById('overlay').style.display = 'none';
            writeTerm("SYSTEM ONLINE. WASM_BACKEND: ENABLED.");
            render();
        } catch (e) {
            alert("INIT_ERROR: " + e.message);
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-std').classList.toggle('active', mode === 'STD');
        document.getElementById('btn-lidar').classList.toggle('active', mode === 'LIDAR');
        video.className = (mode === 'LIDAR') ? 'lidar-mode' : '';
        writeTerm(`SWITCHING_MODE: ${mode}... OK`);
    }

    document.getElementById('viewport').addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });

        if (lockedObj) {
            e.stopPropagation();
            startDecrypt(lockedObj);
        }
    });

    function resetLock() {
        lockedObj = null;
        termContent.innerHTML = "";
        writeTerm("SCANNING ENVIRONMENTS... NO_LOCK");
    }

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 7) termContent.lastChild.remove();
    }

    function startDecrypt(obj) {
        termContent.innerHTML = "";
        const lines = [
            `LOCK_ACQUIRED: ${obj.class.toUpperCase()}`,
            `COORDINATES: X:${Math.round(obj.bbox[0])} Y:${Math.round(obj.bbox[1])}`,
            `DISTANCE: ${((1200 * 0.5) / obj.bbox[2]).toFixed(2)}m`,
            `DECRYPTING_SIGNATURE...`,
            `STATUS: [${(obj.score * 100).toFixed(0)}% PROBABILITY]`,
            `SENSORS: SCANNING_PIXELS...`
        ];
        lines.forEach((l, i) => setTimeout(() => writeTerm(l), i * 150));
    }

    async function render() {
        predictions = await model.detect(video);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentMode === 'LIDAR') {
            drawPixelGrid();
        }

        // В обычном режиме увеличиваем лимит захвата до 20 объектов и дальность
        const limit = (currentMode === 'STD') ? 20 : 8;
        const activeTargets = predictions.slice(0, limit);

        activeTargets.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            // Увеличенная базовая константа для дальности в STD режиме
            const distMult = (currentMode === 'STD') ? 1200 : 850;
            const dist = ((distMult * 0.5) / w); 
            
            let color;
            if (currentMode === 'LIDAR') {
                const hue = Math.min(240, dist * 25);
                color = `hsl(${240 - hue}, 100%, 50%)`;
            } else {
                color = COLORS[label] || COLORS['default'];
            }

            ctx.save();
            const isLocked = lockedObj && Math.abs(lockedObj.bbox[0] - x) < 5;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = isLocked ? 4 : 2;
            
            if (currentMode === 'LIDAR') {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = color;
                ctx.fillRect(x, y, w, h);
                ctx.globalAlpha = 1.0;
            } else {
                ctx.setLineDash(isLocked ? [] : [8, 4]);
                ctx.strokeRect(x, y, w, h);
            }
            
            ctx.fillStyle = color;
            ctx.font = "bold 12px Courier New";
            ctx.fillText(`${label.toUpperCase()}`, x, y - 10);
            ctx.font = "9px Courier New";
            ctx.fillText(`RANGE: ${dist.toFixed(2)}m`, x, y - 22);

            ctx.setLineDash([]);
            drawCorners(x, y, w, h, color, isLocked ? 30 : 15);
            ctx.restore();
        });

        requestAnimationFrame(render);
    }

    // Режим пиксельной проекции
    function drawPixelGrid() {
        bctx.drawImage(video, 0, 0, buffer.width, buffer.height);
        const imgData = bctx.getImageData(0, 0, buffer.width, buffer.height).data;
        
        const cellW = canvas.width / buffer.width;
        const cellH = canvas.height / buffer.height;

        for (let y = 0; y < buffer.height; y += 2) { // Шаг 2 для оптимизации
            for (let x = 0; x < buffer.width; x += 2) {
                const i = (y * buffer.width + x) * 4;
                const r = imgData[i];
                const g = imgData[i+1];
                const b = imgData[i+2];
                const avg = (r + g + b) / 3;

                if (avg > 40) { // Порог шума
                    // Создаем эффект "точек лидара"
                    const size = (avg / 255) * 3;
                    ctx.fillStyle = `rgb(0, ${avg}, ${avg/2})`;
                    ctx.fillRect(x * cellW, y * cellH, size, size);
                }
            }
        }
        
        // Матричная сетка поверх
        ctx.strokeStyle = "rgba(0, 255, 65, 0.05)";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for(let i=0; i<canvas.width; i+=20) { ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); }
        for(let i=0; i<canvas.height; i+=20) { ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); }
        ctx.stroke();
    }

    function drawCorners(x, y, w, h, color, s) {
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }
</script>
</body>
</html>
