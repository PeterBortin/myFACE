<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myFACE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    :root {
      --cyan:       #00f5ff;
      --red:        #ff2244;
      --green:      #00ff88;
      --dim:        #0a0a0f;
      --border:     rgba(0, 245, 255, 0.15);
      --glow:       0 0 20px rgba(0, 245, 255, 0.3);
      --font-mono:  'Share Tech Mono', monospace;
      --font-title: 'Orbitron', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dim);
      overflow: hidden;
      font-family: var(--font-mono);
      color: var(--cyan);
      cursor: crosshair;
    }

    /* Static CRT scanline texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Corner HUD brackets */
    .corner {
      position: fixed;
      width: 30px; height: 30px;
      z-index: 1000; pointer-events: none;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--cyan);
    }
    .corner::before { width: 100%; height: 2px; top: 0; }
    .corner::after  { width: 2px; height: 100%; top: 0; }
    .corner.tl { top: 15px; left: 15px; }
    .corner.tr { top: 15px; right: 15px; transform: scaleX(-1); }
    .corner.bl { bottom: 15px; left: 15px; transform: scaleY(-1); }
    .corner.br { bottom: 15px; right: 15px; transform: scale(-1); }

    /* PRELOADER */
    #preloader {
      position: fixed; inset: 0;
      background: var(--dim);
      z-index: 500;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #preloader.hidden { opacity: 0; visibility: hidden; }

    .boot-logo {
      font-family: var(--font-title);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--cyan);
      text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,245,255,0.3);
      animation: flicker 3s infinite;
      margin-bottom: 8px;
    }
    .boot-sub {
      font-size: 10px;
      letter-spacing: 6px;
      color: rgba(0,245,255,0.4);
      margin-bottom: 60px;
    }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.2; }
      99% { opacity: 1; }
    }

    .boot-lines {
      width: min(400px, 85vw);
      margin-bottom: 40px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .boot-line {
      font-size: 9px;
      color: rgba(0,245,255,0.5);
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeInLine 0.3s forwards;
    }
    .boot-line.ok::after  { content: ' [OK]';   color: var(--green); }
    .boot-line.err::after { content: ' [WARN]'; color: var(--red); }
    @keyframes fadeInLine { to { opacity: 1; } }

    #access-btn {
      font-family: var(--font-title);
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 14px 40px;
      font-size: 11px;
      letter-spacing: 4px;
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
      display: none;
    }
    #access-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--cyan);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }
    #access-btn:hover::before { transform: translateX(0); }
    #access-btn:hover { color: var(--dim); }
    #access-btn span { position: relative; z-index: 1; }

    .ring-container {
      position: relative;
      width: 70px; height: 70px;
      margin-bottom: 30px;
      display: none;
    }
    .ring-container svg {
      position: absolute; inset: 0;
      animation: spin 1.2s linear infinite;
    }
    .ring-container svg.reverse {
      animation-direction: reverse;
      animation-duration: 1.8s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-text {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,245,255,0.35);
      margin-top: 20px;
      min-height: 14px;
    }

    /* MAIN CONTAINER */
    #container {
      position: relative;
      width: 100vw; height: 100vh;
      visibility: hidden;
    }

    .input_video { display: none; }

    .output_canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    /* HUD OVERLAY */
    .hud-overlay {
      position: absolute; inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    .hud-tl {
      position: absolute;
      top: 25px; left: 25px;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,245,255,0.6);
      display: flex; flex-direction: column; gap: 5px;
    }
    .hud-row { display: flex; align-items: center; gap: 8px; }
    .hud-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green);
      animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
      50%       { opacity: 0.3; box-shadow: none; }
    }

    /* TOP-RIGHT CONTROLS */
    .hud-tr {
      position: absolute;
      top: 20px; right: 20px;
      display: flex; gap: 8px;
      pointer-events: all;
      z-index: 20;
    }
    .ui-btn {
      font-family: var(--font-mono);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,245,255,0.3);
      color: rgba(0,245,255,0.7);
      padding: 7px 14px;
      font-size: 9px;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .ui-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: var(--glow);
      background: rgba(0,245,255,0.05);
    }
    .ui-btn:active { transform: scale(0.97); }

    /* RETICLE */
    #reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 120px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #reticle.visible { opacity: 1; }
    #reticle svg { width: 100%; height: 100%; }

    /* ACQUIRED FLASH */
    #acquired-flash {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 30;
      opacity: 0;
    }
    #acquired-flash.flash {
      animation: acquiredFlash 0.6s ease forwards;
    }
    @keyframes acquiredFlash {
      0%   { opacity: 0; background: rgba(0,255,136,0.15); }
      30%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* TARGET LABEL */
    #target-label {
      position: absolute;
      top: calc(50% + 70px); left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-title);
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--cyan);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      text-shadow: 0 0 10px var(--cyan);
      pointer-events: none;
    }
    #target-label.visible { opacity: 1; }

    /* CREATOR TAG */
    #creator {
      position: absolute;
      bottom: 185px; left: 25px;
      font-size: 8px; letter-spacing: 2px;
      color: rgba(0,245,255,0.2);
      z-index: 20; pointer-events: none;
    }

    /* LANG INDICATOR */
    #lang-indicator {
      position: absolute;
      bottom: 185px; right: 25px;
      font-size: 8px; letter-spacing: 3px;
      color: rgba(0,245,255,0.3);
      z-index: 20; pointer-events: none;
    }

    /* RIGHT METRICS */
    #metrics {
      position: absolute;
      right: 25px; top: 50%;
      transform: translateY(-50%);
      z-index: 15;
      pointer-events: none;
      display: flex; flex-direction: column; gap: 16px;
      opacity: 0; transition: opacity 0.5s;
    }
    #metrics.visible { opacity: 1; }
    .metric-block {
      display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
    }
    .metric-label { font-size: 7px; letter-spacing: 3px; color: rgba(0,245,255,0.4); }
    .metric-bar {
      width: 80px; height: 2px;
      background: rgba(0,245,255,0.1);
      position: relative; overflow: hidden;
    }
    .metric-fill {
      position: absolute; top: 0; left: 0; height: 100%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      transition: width 0.4s ease;
    }
    .metric-value { font-size: 9px; letter-spacing: 2px; color: var(--cyan); }

    /* BOTTOM PANEL */
    .bottom-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
      padding: 0 25px 20px;
    }

    #live-speech-box {
      text-align: center;
      font-family: var(--font-title);
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      min-height: 32px;
      padding: 8px 0 6px;
      transition: color 0.3s;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #live-speech-box.speaking {
      color: var(--green);
      text-shadow: 0 0 20px var(--green);
    }

    #audio_visualizer {
      width: 100%;
      height: 60px;
      margin-bottom: 10px;
      display: block;
    }

    #terminal-box {
      width: 100%;
      height: 120px;
      border: 1px solid rgba(0,245,255,0.12);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      padding: 16px 12px 10px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,245,255,0.2) transparent;
      position: relative;
    }
    #terminal-box::before {
      content: 'NEURAL LOG // SESSION';
      position: sticky; top: 0;
      display: block;
      font-size: 8px; letter-spacing: 3px;
      color: rgba(0,245,255,0.25);
      margin-bottom: 4px;
    }
    .log-entry {
      font-size: 9px;
      color: rgba(0,245,255,0.7);
      border-left: 1px solid rgba(0,245,255,0.3);
      padding-left: 8px;
      margin: 3px 0;
      white-space: pre-wrap;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: logAppear 0.3s forwards;
    }
    .log-entry .ts { color: rgba(0,245,255,0.35); margin-right: 6px; }
    .log-entry.speech { border-color: var(--green); color: rgba(0,255,136,0.8); }
    @keyframes logAppear {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 600px) {
      #metrics { display: none; }
      .hud-tl  { font-size: 8px; }
      #terminal-box { height: 90px; }
    }
  </style>

</head>

<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="preloader">
    <div class="boot-logo">myFACE</div>
    <div class="boot-sub">NEURAL BIOMETRIC SCANNER v2.0</div>
    <div class="boot-lines" id="boot-lines"></div>
    <div class="ring-container" id="ring-container">
      <svg viewBox="0 0 70 70">
        <circle cx="35" cy="35" r="30" fill="none" stroke="rgba(0,245,255,0.15)" stroke-width="1"/>
        <circle cx="35" cy="35" r="30" fill="none" stroke="var(--cyan)" stroke-width="1.5"
          stroke-dasharray="40 150" stroke-linecap="round"/>
      </svg>
      <svg viewBox="0 0 70 70" class="reverse" style="width:50px;height:50px;top:10px;left:10px">
        <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(0,245,255,0.08)" stroke-width="1"/>
        <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(0,245,255,0.4)" stroke-width="1"
          stroke-dasharray="15 110" stroke-linecap="round"/>
      </svg>
    </div>
    <button id="access-btn" onclick="startSequence()"><span>// INITIALIZE SYSTEM //</span></button>
    <div id="status-text">AWAITING BIOMETRIC AUTHORIZATION</div>
  </div>

  <div id="container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>

<div id="acquired-flash"></div>

<div class="hud-overlay">
  <div class="hud-tl">
    <div class="hud-row"><div class="hud-dot"></div><span>LINK_STATUS: ACTIVE</span></div>
    <div class="hud-row" id="target-status"><span>&gt; TARGET: SEEKING...</span></div>
    <div class="hud-row" id="fps-row"><span>FPS: --</span></div>
  </div>
</div>

<div class="hud-tr">
  <button id="export-btn" class="ui-btn">Export Log</button>
  <button id="lang-btn" class="ui-btn" onclick="toggleLang()">RU / UK</button>
  <button id="switch-cam" class="ui-btn">Switch Cam</button>
</div>

<div id="reticle">
  <svg viewBox="0 0 120 120" fill="none">
    <g stroke="#00f5ff" stroke-width="1" opacity="0.8">
      <path d="M 20 10 L 10 10 L 10 20"/>
      <path d="M 100 10 L 110 10 L 110 20"/>
      <path d="M 10 100 L 10 110 L 20 110"/>
      <path d="M 110 100 L 110 110 L 100 110"/>
      <line x1="60" y1="50" x2="60" y2="56" stroke-width="0.8" opacity="0.5"/>
      <line x1="60" y1="64" x2="60" y2="70" stroke-width="0.8" opacity="0.5"/>
      <line x1="50" y1="60" x2="56" y2="60" stroke-width="0.8" opacity="0.5"/>
      <line x1="64" y1="60" x2="70" y2="60" stroke-width="0.8" opacity="0.5"/>
      <circle cx="60" cy="60" r="18" stroke-dasharray="8 6" opacity="0.4">
        <animateTransform attributeName="transform" type="rotate"
          from="0 60 60" to="360 60 60" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </svg>
</div>

<div id="target-label">TARGET ACQUIRED</div>

<div id="metrics">
  <div class="metric-block">
    <div class="metric-label">SYMMETRY</div>
    <div class="metric-bar"><div class="metric-fill" id="m-symmetry" style="width:0%"></div></div>
    <div class="metric-value" id="mv-symmetry">--</div>
  </div>
  <div class="metric-block">
    <div class="metric-label">CONFIDENCE</div>
    <div class="metric-bar"><div class="metric-fill" id="m-conf" style="width:0%"></div></div>

  <div class="metric-block">
    <div class="metric-label">MESH PTS</div>

  </div>
</div>

<div id="creator">CREATED BY BORTIN</div>
<div id="lang-indicator">LANG: --</div>

<div class="bottom-panel">
  <div id="live-speech-box">...</div>
  <canvas id="audio_visualizer"></canvas>
  <div id="terminal-box"><div id="log-content"></div></div>
</div>

  </div>

  <script type="module">

    // DOM refs
    const videoEl      = document.querySelector('.input_video');
    const canvasEl     = document.querySelector('.output_canvas');
    const ctx          = canvasEl.getContext('2d');
    const liveSpeech   = document.getElementById('live-speech-box');
    const terminalBox  = document.getElementById('terminal-box');
    const logContent   = document.getElementById('log-content');
    const audioCanvas  = document.getElementById('audio_visualizer');
    const aCtx         = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');
    const reticle      = document.getElementById('reticle');
    const targetLabel  = document.getElementById('target-label');
    const acqFlash     = document.getElementById('acquired-flash');
    const metricsEl    = document.getElementById('metrics');
    const fpsRow       = document.getElementById('fps-row');
    const langInd      = document.getElementById('lang-indicator');

    // State
    let facingMode     = 'user';
    let camInstance    = null;
    let audioCtxNode, analyser, freqData;
    let isSpeaking     = false;
    let logHistory     = [];
    let prevTarget     = false;
    let frameCount     = 0;
    let lastFpsTime    = performance.now();
    let recognition    = null;
    let recRestarting  = false;
    let acquiredLogged = false;

    // Boot sequence
    const bootMessages = [
      { txt: 'INITIALIZING NEURAL CORE...',   cls: 'ok',  delay: 300  },
      { txt: 'LOADING MEDIAPIPE FACE_MESH...', cls: 'ok',  delay: 600  },
      { txt: 'CALIBRATING DEPTH SENSORS...',   cls: 'ok',  delay: 900  },
      { txt: 'BIOMETRIC DATABASE: READY',      cls: 'ok',  delay: 1200 },
      { txt: 'AUDIO SUBSYSTEM: STANDBY',       cls: 'err', delay: 1500 },
      { txt: 'AWAITING OPERATOR CLEARANCE...', cls: '',    delay: 1800 },
    ];

    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('boot-lines');
      bootMessages.forEach(function(msg) {
        setTimeout(function() {
          var div = document.createElement('div');
          div.className = msg.cls ? ('boot-line ' + msg.cls) : 'boot-line';
          div.textContent = '> ' + msg.txt;
          container.appendChild(div);
        }, msg.delay);
      });
      setTimeout(function() {
        document.getElementById('access-btn').style.display = 'block';
      }, 2200);
    });

    // Start sequence
    window.startSequence = async function() {
      var btn    = document.getElementById('access-btn');
      var ring   = document.getElementById('ring-container');
      var status = document.getElementById('status-text');
      btn.style.display = 'none';

      try {
        status.textContent = 'ACCESSING CORE SENSORS...';
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        ring.style.display = 'block';
        status.textContent = 'CALIBRATING NEURAL MESH...';

        audioCtxNode = new (window.AudioContext || window.webkitAudioContext)();
        analyser     = audioCtxNode.createAnalyser();
        analyser.fftSize = 256;
        audioCtxNode.createMediaStreamSource(stream).connect(analyser);
        freqData = new Uint8Array(analyser.frequencyBinCount);

        drawBars();
        videoEl.srcObject = stream;
        await startCamera();

        var loader = document.getElementById('preloader');
        loader.classList.add('hidden');
        setTimeout(function() {
          loader.style.display = 'none';
          document.getElementById('container').style.visibility = 'visible';
          initSpeech();
          addLog('SYSTEM ONLINE - BIOMETRIC SCANNING ACTIVE', 'system');
        }, 800);

      } catch (err) {
        status.textContent = 'FATAL ERROR: ACCESS DENIED';
        btn.style.display = 'block';
        ring.style.display = 'none';
        console.error(err);
      }
    };

    // Equalizer visualizer
    function drawBars() {
      requestAnimationFrame(drawBars);
      if (!analyser || !freqData) return;

      // getBoundingClientRect works even when container is transitioning from hidden.
      // offsetWidth is the fallback; 600x60 is the safe last-resort default.
      var rect = audioCanvas.getBoundingClientRect();
      var cw   = Math.round(rect.width)  || audioCanvas.offsetWidth  || 600;
      var ch   = Math.round(rect.height) || audioCanvas.offsetHeight || 60;

      if (audioCanvas.width  !== cw) audioCanvas.width  = cw;
      if (audioCanvas.height !== ch) audioCanvas.height = ch;

      analyser.getByteFrequencyData(freqData);
      aCtx.clearRect(0, 0, cw, ch);

      var total = freqData.length;
      var barW  = (cw / total) * 2.2;
      var x     = 0;

      for (var i = 0; i < total; i++) {
        var v  = freqData[i] / 255;
        var bh = Math.max(v * ch, 1); // always at least 1px so idle bars are visible
        var g  = Math.floor(200 + v * 55);
        var b  = Math.floor(255 * (1 - v * 0.3));
        aCtx.fillStyle = 'rgba(0,' + g + ',' + b + ',' + (0.3 + v * 0.7) + ')';
        aCtx.fillRect(x, ch - bh, Math.max(barW - 1, 1), bh);
        x += barW;
      }
    }

    // Auto language detection based on browser locale
    function detectSpeechLang() {
      var nav = (navigator.languages && navigator.languages[0]) || navigator.language || 'ru-RU';
      // Normalize: 'uk', 'uk-UA', 'uk_UA' all → 'uk-UA'
      if (/^uk/i.test(nav)) return 'uk-UA';
      if (/^ru/i.test(nav)) return 'ru-RU';
      return 'ru-RU'; // safe fallback
    }

    var currentLang = 'ru-RU'; // set properly in initSpeech

    // Speech recognition — supports ru-RU and uk-UA
    function initSpeech() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        addLog('SPEECH ENGINE: NOT SUPPORTED IN THIS BROWSER', 'system');
        langInd.textContent = 'LANG: N/A';
        return;
      }

      currentLang = detectSpeechLang();
      _SR_ref = SR;
      startRecognition(SR, currentLang);
    }

    function startRecognition(SR, lang) {
      // Stop existing session cleanly
      if (recognition) {
        recognition.onend  = null;
        recognition.onerror = null;
        try { recognition.abort(); } catch(_) {}
        recognition = null;
      }
      recRestarting = false;

      currentLang = lang;
      langInd.textContent = 'LANG: ' + lang.toUpperCase();

      recognition = new SR();
      recognition.continuous     = true;
      recognition.interimResults = true;
      recognition.lang           = lang;

      recognition.onresult = function(e) {
        var interim = '';
        for (var i = e.resultIndex; i < e.results.length; i++) {
          var t = e.results[i][0].transcript.trim();
          if (e.results[i].isFinal && t) {
            addLog(t, 'speech');
          } else {
            interim = t;
          }
        }
        if (interim) {
          isSpeaking = true;
          liveSpeech.textContent = interim.toUpperCase();
          liveSpeech.classList.add('speaking');
        }
      };

      recognition.onend = function() {
        isSpeaking = false;
        liveSpeech.classList.remove('speaking');
        liveSpeech.textContent = 'IDLE';
        // Auto-restart unless we're switching languages
        if (!recRestarting) {
          recRestarting = true;
          var savedLang = currentLang;
          var savedSR   = SR;
          setTimeout(function() {
            recRestarting = false;
            startRecognition(savedSR, savedLang);
          }, 400);
        }
      };

      recognition.onerror = function(e) {
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          addLog('MICROPHONE ACCESS DENIED', 'system');
        } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
          console.warn('Speech error:', e.error);
        }
      };

      try {
        recognition.start();
        addLog('SPEECH ENGINE: ' + lang.toUpperCase(), 'system');
      } catch(_) {}
    }

    // Language toggle — exposed to window so lang-btn onclick works
    var _SR_ref = null; // store SR constructor for toggle use
    window.toggleLang = function() {
      var newLang = currentLang === 'ru-RU' ? 'uk-UA' : 'ru-RU';
      var btn = document.getElementById('lang-btn');
      if (btn) btn.textContent = newLang === 'ru-RU' ? 'RU / UK' : 'UK / RU';
      recRestarting = true; // suppress auto-restart from onend
      startRecognition(_SR_ref || (window.SpeechRecognition || window.webkitSpeechRecognition), newLang);
    };

    // Log helper
    function addLog(text, type) {
      var ts    = new Date().toLocaleTimeString('ru-RU');
      var entry = document.createElement('div');
      entry.className = type === 'speech' ? 'log-entry speech' : 'log-entry';
      var safe = text.toUpperCase().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      entry.innerHTML = '<span class="ts">[' + ts + ']</span>' + safe;
      logContent.appendChild(entry);
      terminalBox.scrollTop = terminalBox.scrollHeight;
      logHistory.push('[' + ts + '] ' + text.toUpperCase());
    }

    // Export log
    document.getElementById('export-btn').addEventListener('click', function() {
      if (!logHistory.length) { alert('LOG IS EMPTY'); return; }
      var content = 'NEURAL SCANNER LOG\n==================\n' + logHistory.join('\n');
      var blob    = new Blob([content], { type: 'text/plain;charset=utf-8' });
      var url     = URL.createObjectURL(blob);
      var a       = document.createElement('a');
      a.href     = url;
      a.download = 'neural_log_' + Date.now() + '.txt';
      a.click();
      URL.revokeObjectURL(url);
    });

    // Camera start / switch
    async function startCamera() {
      if (camInstance) {
        try { await camInstance.stop(); } catch(_) {}
        camInstance = null;
      }
      camInstance = new Camera(videoEl, {
        onFrame: async function() {
          if (videoEl.readyState >= 2) await faceMesh.send({ image: videoEl });
        },
        facingMode: facingMode,
        width: 1280,
        height: 720
      });
      await camInstance.start();
      canvasEl.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-cam').addEventListener('click', function() {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      startCamera();
    });

    // Face mesh results
    function onResults(results) {
      // FPS counter
      frameCount++;
      var now = performance.now();
      if (now - lastFpsTime >= 1000) {
        fpsRow.querySelector('span').textContent = 'FPS: ' + frameCount;
        frameCount  = 0;
        lastFpsTime = now;
      }

      var W = videoEl.videoWidth  || canvasEl.clientWidth;
      var H = videoEl.videoHeight || canvasEl.clientHeight;
      if (canvasEl.width  !== W) canvasEl.width  = W;
      if (canvasEl.height !== H) canvasEl.height = H;

      ctx.save();
      ctx.clearRect(0, 0, W, H);

      // Darkened video background
      ctx.globalAlpha = 0.18;
      ctx.drawImage(results.image, 0, 0, W, H);
      ctx.globalAlpha = 1.0;

      var faces     = results.multiFaceLandmarks;
      var hasTarget = !!(faces && faces.length > 0);

      if (hasTarget) {
        if (!prevTarget) {
          reticle.classList.add('visible');
          targetLabel.classList.add('visible');
          acqFlash.classList.remove('flash');
          void acqFlash.offsetWidth;
          acqFlash.classList.add('flash');
          metricsEl.classList.add('visible');
          targetStatus.querySelector('span').textContent = '> TARGET: ACQUIRED';
          if (!acquiredLogged) {
            addLog('BIOMETRIC TARGET ACQUIRED - SCANNING IN PROGRESS', 'system');
            acquiredLogged = true;
          }
        }

        for (var fi = 0; fi < faces.length; fi++) {
          var lm = faces[fi];

          // Blink detection
          var ld = Math.hypot(lm[159].x - lm[145].x, lm[159].y - lm[145].y);
          var rd = Math.hypot(lm[386].x - lm[374].x, lm[386].y - lm[374].y);
          var eyesClosed = ld < 0.015 && rd < 0.015;

          var color = isSpeaking ? '#00ff88' : (eyesClosed ? '#ff2244' : '#00f5ff');

          // Connector shorthand
          function dc(list, stroke, lw) {
            drawConnectors(ctx, lm, list, { color: stroke, lineWidth: lw });
          }

          // 1. Full tesselation — deforms with real face geometry
          dc(FACEMESH_TESSELATION, color + '1a', 0.35);

          // 2. Face oval
          dc(FACEMESH_FACE_OVAL, color + '55', 1);

          // 3. Eyes
          dc(FACEMESH_RIGHT_EYE, color + 'dd', 1.2);
          dc(FACEMESH_LEFT_EYE,  color + 'dd', 1.2);

          // 4. Iris rings (refineLandmarks pts 469-477)
          var irisRings = [[469,470,471,472,469],[474,475,476,477,474]];
          for (var r = 0; r < irisRings.length; r++) {
            var ring = irisRings[r];
            ctx.beginPath();
            for (var k = 0; k < ring.length; k++) {
              var p = lm[ring[k]];
              if (!p) continue;
              if (k === 0) ctx.moveTo(p.x * W, p.y * H);
              else         ctx.lineTo(p.x * W, p.y * H);
            }
            ctx.strokeStyle = color + 'aa';
            ctx.lineWidth   = 1;
            ctx.stroke();
          }

          // 5. Eyebrows
          dc(FACEMESH_RIGHT_EYEBROW, color + '88', 1);
          dc(FACEMESH_LEFT_EYEBROW,  color + '88', 1);

          // 6. Lips — FACEMESH_LIPS covers outer + inner contours,
          //    same approach as FACEMESH_RIGHT_EYE / LEFT_EYE
          dc(FACEMESH_LIPS, color + 'dd', 1.2);

          // 7. Key landmark dots with glow
          var keyPts = [1, 4, 6, 10, 152, 234, 454, 33, 263, 61, 291];
          ctx.fillStyle   = color;
          ctx.shadowColor = color;
          ctx.shadowBlur  = 6;
          for (var d = 0; d < keyPts.length; d++) {
            var pt = lm[keyPts[d]];
            if (!pt) continue;
            ctx.beginPath();
            ctx.arc(pt.x * W, pt.y * H, 1.8, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.shadowBlur = 0;

          // 8. Symmetry metric
          var symm    = Math.abs(lm[234].x - (1 - lm[454].x));
          var symmPct = Math.max(0, Math.min(100, Math.round((1 - symm * 10) * 100)));
          document.getElementById('m-symmetry').style.width  = symmPct + '%';
          document.getElementById('mv-symmetry').textContent = symmPct + '%';
          document.getElementById('m-conf').style.width      = '91%';
          document.getElementById('mv-conf').textContent     = '91%';
        }

      } else {
        if (prevTarget) {
          reticle.classList.remove('visible');
          targetLabel.classList.remove('visible');
          metricsEl.classList.remove('visible');
          targetStatus.querySelector('span').textContent = '> TARGET: SEEKING...';
          addLog('TARGET LOST - RESUMING SCAN', 'system');
          acquiredLogged = false;
        }
      }

      prevTarget = hasTarget;
      ctx.restore();
    }

    // Face mesh init
    var faceMesh = new FaceMesh({
      locateFile: function(file) {
        return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/' + file;
      }
    });
    faceMesh.setOptions({
      maxNumFaces:            1,
      refineLandmarks:        true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence:  0.5
    });
    faceMesh.onResults(onResults);

  </script>

</body>
</html>
