<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Face Scanner v5.0</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    
    #overlay-start {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 100; display: flex;
      flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
    }
    #overlay-start h1 { border: 1px solid #fff; padding: 20px; text-transform: uppercase; letter-spacing: 5px; }

    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .input_video { display: none; }
    
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }

    #switch-camera {
      position: absolute; top: 20px; right: 20px; z-index: 110;
      background: rgba(0,0,0,0.5); border: 1px solid #fff; color: #fff;
      padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 10px;
    }

    .interface-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      font-size: 11px; text-shadow: 0 0 5px #fff; pointer-events: none;
    }

    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, #000 85%, transparent);
      padding-bottom: 20px;
    }

    #live-speech-box {
      width: 90%; min-height: 35px; margin-bottom: 5px;
      text-align: center; font-size: 18px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px; color: #fff;
    }

    #audio_visualizer { width: 90%; height: 60px; margin-bottom: 10px; }

    #terminal-box {
      width: 90%; height: 100px; background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255,255,255,0.2); padding: 10px; box-sizing: border-box;
      overflow-y: auto; font-size: 10px; scrollbar-width: none;
    }
    #terminal-box::-webkit-scrollbar { display: none; }

    .log-entry { margin: 2px 0; color: rgba(255,255,255,0.5); border-left: 1px solid #fff; padding-left: 8px; }
  </style>
</head>

<body>

  <div id="overlay-start" onclick="initSystem()">
    <h1>ACCESS GRANTED</h1>
    <p>[ CLICK TO INITIALIZE SCANNER ]</p>
  </div>

  <button id="switch-camera">Toggle Cam</button>

  <div id="container">
    <video class="input_video" playsinline></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div>> NEURAL_LINK: ESTABLISHED</div>
      <div>> SCAN_MODE: 3D_MESH_RECONSTRUCTION</div>
      <div id="target-status">> TARGET: SEARCHING...</div>
    </div>

    <div class="bottom-peripherals">
      <div id="live-speech-box">READY_FOR_VOICE</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, dataArray;
    let scanLineY = 0; 

    async function initAudio() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 2048;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawWave();
      } catch(e) { console.log("Audio Error"); }
    }

    function drawWave() {
      requestAnimationFrame(drawWave);
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteTimeDomainData(dataArray);

      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      aCtx.lineWidth = 1.5;
      aCtx.strokeStyle = '#ffffff';
      aCtx.beginPath();

      let sliceWidth = audioCanvas.width / dataArray.length;
      let x = 0;
      for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = v * audioCanvas.height / 2;
        if (i === 0) aCtx.moveTo(x, y); else aCtx.lineTo(x, y);
        x += sliceWidth;
      }
      aCtx.stroke();
    }

    function addLog(text) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerText = `[${new Date().toLocaleTimeString()}] ${text.toUpperCase()}`;
      document.getElementById('log-content').appendChild(entry);
      terminalBox.scrollTop = terminalBox.scrollHeight;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU';

      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) addLog(event.results[i][0].transcript);
          else interim += event.results[i][0].transcript;
        }
        liveSpeechBox.innerText = interim || "LISTENING...";
      };
      recognition.onend = () => recognition.start();
      window.runSpeech = () => recognition.start();
    }

    function drawTargetingFrame(ctx, x, y, width, height, isLocked) {
      const size = 40;
      ctx.lineWidth = 2;
      ctx.strokeStyle = isLocked ? '#fff' : '#ff0000';
      
      const corners = [
        [x, y, x + size, y, x, y + size], 
        [x + width, y, x + width - size, y, x + width, y + size], 
        [x, y + height, x + size, y + height, x, y + height - size], 
        [x + width, y + height, x + width - size, y + height, x + width, y + height - size] 
      ];

      corners.forEach(c => {
        ctx.beginPath();
        ctx.moveTo(c[0], c[1]); ctx.lineTo(c[2], c[3]);
        ctx.moveTo(c[0], c[1]); ctx.lineTo(c[4], c[5]);
        ctx.stroke();
      });

      if (!isLocked) {
        ctx.font = "10px monospace";
        ctx.fillStyle = "#ff0000";
        ctx.fillText("SEARCHING_FOR_SUBJECT", x, y - 10);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillText("TARGET_LOCKED", x, y - 10);
      }
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.fillStyle = '#000';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

      canvasCtx.globalAlpha = 0.05;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      scanLineY = (scanLineY + 0.01) % 1.0;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        targetStatus.innerText = "> TARGET: LOCKED";
        targetStatus.style.color = "#fff";

        for (const landmarks of results.multiFaceLandmarks) {
          for (const connector of FACEMESH_TESSELATION) {
            const start = landmarks[connector[0]];
            const end = landmarks[connector[1]];
            
            const dist = Math.abs(start.y - scanLineY);
            // ОБНОВЛЕНО: базовая яркость 0.3 вместо 0.1 для лучшей видимости
            canvasCtx.strokeStyle = dist < 0.05 ? '#fff' : 'rgba(255,255,255,0.3)';
            canvasCtx.lineWidth = dist < 0.05 ? 1.2 : 0.6;

            canvasCtx.beginPath();
            canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
            canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
            canvasCtx.stroke();
          }

          const highlightStyle = {color: '#fff', lineWidth: 2};
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, highlightStyle);
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, highlightStyle);
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, highlightStyle);

          const xCoords = landmarks.map(l => l.x * canvasElement.width);
          const yCoords = landmarks.map(l => l.y * canvasElement.height);
          const minX = Math.min(...xCoords) - 30;
          const maxX = Math.max(...xCoords) + 30;
          const minY = Math.min(...yCoords) - 50;
          const maxY = Math.max(...yCoords) + 30;
          drawTargetingFrame(canvasCtx, minX, minY, maxX - minX, maxY - minY, true);
        }
      } else {
        targetStatus.innerText = "> TARGET: SEARCHING...";
        targetStatus.style.color = "#ff0000";
        drawTargetingFrame(canvasCtx, canvasElement.width/4, canvasElement.height/4, canvasElement.width/2, canvasElement.height/2, false);
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCamera() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: currentFacingMode, width: 1280, height: 720
      });
      cameraInstance.start();
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    });

    window.initSystem = function() {
      document.getElementById('overlay-start').style.display = 'none';
      initAudio();
      if (window.runSpeech) window.runSpeech();
      startCamera();
      addLog("NEURAL_ENGINE_ONLINE");
    }
  </script>
</body>
</html>
