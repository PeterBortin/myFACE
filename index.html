<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAUTJA_PRIME_HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: monospace; user-select: none; }
        video { display: none; }
        canvas { position: absolute; inset: 0; z-index: 10; transition: filter 0.3s ease; }

        /* Эффект вертикального дождя помех */
        #glitch-overlay {
            position: absolute; inset: 0; z-index: 25; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                repeating-linear-gradient(90deg, rgba(255, 0, 0, 0.03) 0px, rgba(255, 0, 0, 0.03) 1px, transparent 2px);
            background-size: 100% 4px, 40px 100%;
        }

        #vignette {
            position: absolute; inset: 0; z-index: 30; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.9) 100%);
        }

        .wave-bar {
            width: 8px; background: #ff0000; margin: 1px 0;
            box-shadow: 0 0 10px #ff0000; transition: width 0.05s ease;
        }

        #mode-toggle {
            position: absolute; bottom: 30px; right: 30px; z-index: 200;
            background: rgba(40, 0, 0, 0.6); border: 1px solid #ff0000; color: #ff0000;
            padding: 12px 24px; font-size: 12px; letter-spacing: 2px;
        }

        #ignite {
            position: absolute; inset: 0; z-index: 300; background: #000; color: #ff0000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    
    <div id="glitch-overlay"></div>
    <div id="vignette"></div>
    
    <div id="ui-layer" class="absolute inset-0 z-50 pointer-events-none p-6">
        <div id="top-telemetry" class="absolute top-10 right-10 text-red-600 text-3xl font-bold"></div>
        <div class="absolute bottom-10 left-10 text-red-600 text-[10px] leading-tight">
            REC [●] <br>
            CORE_TEMP: 38.2°C <br>
            MODE: <span id="mode-status">NEUTRAL</span>
        </div>
    </div>

    <div id="audio-wave-container" class="absolute left-6 top-1/4 h-1/2 flex flex-col justify-center"></div>

    <button id="mode-toggle" class="hidden">CHANGE_VISOR</button>

    <button id="ignite">
        <div class="animate-pulse text-5xl font-black mb-4">TERMINAL_LINK</div>
        <div class="opacity-50 text-xs tracking-widest">CONNECTING TO YAUTJA_NETWORK...</div>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const waveContainer = document.getElementById('audio-wave-container');
        const modeToggle = document.getElementById('mode-toggle');
        const modeStatus = document.getElementById('mode-status');

        let model, audioCtx, analyser, dataArray;
        let isThermal = false;
        const waveBars = [];
        const yautjaSymbols = ["ᚦ", "ᛗ", "ᛖ", "ᛟ", "ᚱ", "ᛚ", "ᛒ", "ᛘ", "ᛞ"];

        // Инициализация аудио-бара
        for(let i=0; i < 30; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar h-1';
            waveContainer.appendChild(bar);
            waveBars.push(bar);
        }

        async function init() {
            document.getElementById('ignite').remove();
            modeToggle.classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
            video.srcObject = stream;
            
            audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            model = await cocoSsd.load();
            draw();
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Фоновый поток
            ctx.save();
            if (isThermal) {
                ctx.filter = "contrast(1.8) brightness(1.2) saturate(2) hue-rotate(140deg)";
            } else {
                ctx.filter = "contrast(1.1) sepia(0.2) brightness(0.8)";
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            drawScanLines();
            drawCentralDots();
            updateAudioUI();
            renderDetections();

            requestAnimationFrame(draw);
        }

        // 1. Вертикальные помехи (Референс 5)
        function drawScanLines() {
            ctx.strokeStyle = "rgba(255, 0, 0, 0.15)";
            ctx.lineWidth = 1;
            const time = Date.now() * 0.05;
            for(let i = 0; i < 5; i++) {
                let x = (time * (1 + i * 2)) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
        }

        // 2. Центральные 3 точки (Референс 1)
        function drawCentralDots() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const pulse = Math.sin(Date.now() * 0.005) * 2;
            
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "red";
            ctx.fillStyle = "#ff0000";
            
            const r = 18;
            [[0, -r], [-r, r*0.6], [r, r*0.6]].forEach(pos => {
                ctx.beginPath();
                ctx.arc(cx + pos[0], cy + pos[1], 4 + pulse, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        function updateAudioUI() {
            analyser.getByteFrequencyData(dataArray);
            waveBars.forEach((bar, i) => {
                const val = dataArray[i % dataArray.length];
                bar.style.width = `${(val / 255) * 50 + 5}px`;
                bar.style.opacity = val / 255 + 0.2;
            });
        }

        async function renderDetections() {
            const predictions = await model.detect(video);
            const scale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);

            predictions.forEach(p => {
                if (p.class !== 'person' || p.score < 0.6) return;

                const [x, y, w, h] = p.bbox.map(v => v * scale);
                const cx = x + w/2;
                const cy = y + h/2;
                const time = Date.now() * 0.003;

                // 3. Треугольный прицел (Референс 2)
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(time * 0.5);
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 3;
                
                const side = (Math.max(w, h) / 2) + 20;
                ctx.beginPath();
                for(let i = 0; i < 3; i++) {
                    const angle = (i * Math.PI * 2) / 3;
                    const tx = Math.cos(angle) * side;
                    const ty = Math.sin(angle) * side;
                    i === 0 ? ctx.moveTo(tx, ty) : ctx.lineTo(tx, ty);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();

                // 4. Эффект Плетения / Био-сетка (Референс 3)
                drawPlexus(x, y, w, h);
            });
        }

        function drawPlexus(x, y, w, h) {
            const points = [];
            const count = 15;
            const seed = Math.floor(Date.now() / 100);

            // Генерируем точки внутри контура цели
            for(let i=0; i<count; i++) {
                points.push({
                    x: x + (Math.sin(seed + i) * 0.5 + 0.5) * w,
                    y: y + (Math.cos(seed * 0.5 + i) * 0.5 + 0.5) * h
                });
            }

            ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
            ctx.fillStyle = "#ff0000";
            ctx.lineWidth = 0.5;

            points.forEach((p1, i) => {
                ctx.beginPath();
                ctx.arc(p1.x, p1.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                points.slice(i+1).forEach(p2 => {
                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if(dist < w * 0.4) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
        }

        modeToggle.onclick = () => {
            isThermal = !isThermal;
            modeStatus.innerText = isThermal ? "THERMAL_HUNT" : "NEUTRAL";
            modeStatus.style.color = isThermal ? "#ffff00" : "#ff0000";
        };

        document.getElementById('ignite').onclick = init;
    </script>
</body>
</html>
