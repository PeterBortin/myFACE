<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAULT-TEC | VISION-OS v11.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --pip-green: #1aff80;
            --pip-green-dim: rgba(26, 255, 128, 0.2);
            --pip-bg: #071a0e;
            --pip-scan: rgba(26, 255, 128, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'VT323', monospace; }

        body {
            background-color: #000;
            color: var(--pip-green);
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Эффект ЭЛТ-монитора (CRT) */
        #crt-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 1000; pointer-events: none;
            opacity: 0.3;
        }

        #container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            border: 10px solid #222;
        }

        #viewport {
            position: relative; flex: 1; background: #000;
            border: 2px solid var(--pip-green); margin: 5px;
            overflow: hidden;
        }

        video {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            filter: sepia(1) hue-rotate(60deg) brightness(0.8) contrast(1.2);
        }

        canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        /* Интерфейс Fallout */
        #hud-top {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; z-index: 10;
        }

        .stat-box {
            background: var(--pip-bg); border: 1px solid var(--pip-green);
            padding: 5px 15px; font-size: 20px;
            box-shadow: 0 0 10px var(--pip-green-dim);
        }

        #terminal {
            height: 180px; background: var(--pip-bg);
            border: 2px solid var(--pip-green); margin: 5px;
            padding: 10px; overflow-y: hidden;
            font-size: 18px; line-height: 1.2;
            box-shadow: inset 0 0 20px #000;
        }

        .term-row { margin-bottom: 2px; border-bottom: 1px solid var(--pip-green-dim); }

        #overlay {
            position: fixed; inset: 0; background: var(--pip-bg);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .vault-logo { font-size: 80px; margin-bottom: 20px; animation: flicker 2s infinite; }

        .btn {
            background: var(--pip-green); color: #000;
            border: none; padding: 10px 30px; font-size: 30px;
            cursor: pointer; transition: 0.3s;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--pip-green); }

        @keyframes flicker {
            0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.9; }
        }

        /* Стилизация полосок HP/AP */
        .bar-container { width: 150px; height: 10px; border: 1px solid var(--pip-green); margin-top: 5px; }
        .bar-fill { height: 100%; background: var(--pip-green); width: 80%; }
    </style>
</head>
<body>

<div id="crt-overlay"></div>

<div id="overlay">
    <div class="vault-logo">☢ VAULT-TEC ☢</div>
    <div style="font-size: 24px; margin-bottom: 30px;">KNOWLEDGE BASE INITIALIZATION...</div>
    <button class="btn" onclick="initVaultSight()">[ START SYSTEM ]</button>
</div>

<div id="container">
    <div id="hud-top">
        <div class="stat-box">
            HP [||||||||||  ]
            <div id="location-name">LOC: UNKNOWN_WASTELAND</div>
        </div>
        <div class="stat-box" style="text-align: right;">
            AP [||||||||||||]
            <div id="fps-counter">SCAN_FREQ: 00HZ</div>
        </div>
    </div>

    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termContent = document.getElementById('term-content');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];
    
    // --- LOCAL DATABASE SYSTEM ---
    const VAULT_DB = JSON.parse(localStorage.getItem('vault_knowledge_base')) || {
        encounters: 0,
        known_entities: {}, // ID: {name: 'person', seen: 5, first_seen: Date}
        discovery_points: 0
    };

    function saveDB() {
        localStorage.setItem('vault_knowledge_base', JSON.stringify(VAULT_DB));
    }

    // --- INITIALIZATION ---
    async function initVaultSight() {
        writeTerm("BOOTING VAULT-TEC OS v11.0...", "#fff");
        writeTerm("LOADING TENSOR-CORE: COCO-SSD MOBILENET V2");
        
        try {
            await tf.setBackend('wasm');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: 1280 }
            });
            video.srcObject = stream;
            await video.play();
            
            model = await cocoSsd.load();
            document.getElementById('overlay').style.display = 'none';
            
            writeTerm("DATABASE CONNECTED. " + VAULT_DB.encounters + " ENTRIES FOUND.");
            renderLoop();
        } catch (e) {
            writeTerm("CRITICAL ERROR: SENSOR FAILURE", "#ff0000");
        }
    }

    function writeTerm(text, color = "var(--pip-green)") {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.style.color = color;
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 8) termContent.lastChild.remove();
    }

    // --- CORE LOGIC ---
    function updateKnowledgeBase(label) {
        VAULT_DB.encounters++;
        if (!VAULT_DB.known_entities[label]) {
            VAULT_DB.known_entities[label] = { seen: 1, first_seen: new Date().toLocaleDateString() };
            writeTerm("NEW DATA ENTRY: " + label.toUpperCase(), "#fff");
        } else {
            VAULT_DB.known_entities[label].seen++;
        }
        saveDB();
    }

    document.getElementById('viewport').addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });

        if (lockedObj) {
            updateKnowledgeBase(lockedObj.class);
            displayEntityData(lockedObj);
        }
    });

    function displayEntityData(obj) {
        const info = VAULT_DB.known_entities[obj.class];
        writeTerm("--- TARGET_DATA_LOCK ---", "#fff");
        writeTerm("ENTITY: " + obj.class.toUpperCase());
        writeTerm("TOTAL ENCOUNTERS: " + info.seen);
        writeTerm("THREAT LEVEL: " + (obj.class === 'person' ? "MEASURABLE" : "MINIMAL"));
        writeTerm("COORD: " + Math.round(obj.bbox[0]) + "." + Math.round(obj.bbox[1]));
    }

    function resetLock() { lockedObj = null; writeTerm("SCANNING WASTELAND..."); }

    // --- RENDER ---
    async function renderLoop() {
        predictions = await model.detect(video);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const isLocked = lockedObj && lockedObj.class === p.class && Math.abs(lockedObj.bbox[0] - x) < 20;

            ctx.strokeStyle = isLocked ? "#fff" : "var(--pip-green)";
            ctx.lineWidth = isLocked ? 4 : 2;
            
            // Fallout-style Brackets
            drawVaultBrackets(x, y, w, h, isLocked);

            // Текстовая метка
            ctx.fillStyle = isLocked ? "#fff" : "var(--pip-green)";
            ctx.font = "24px VT323";
            ctx.fillText(`${p.class.toUpperCase()} ${Math.round(p.score*100)}%`, x + 5, y + 25);
            
            // V.A.T.S. line
            if (isLocked) {
                ctx.beginPath();
                ctx.moveTo(x + w/2, y + h/2);
                ctx.lineTo(canvas.width/2, canvas.height);
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });

        requestAnimationFrame(renderLoop);
    }

    function drawVaultBrackets(x, y, w, h, locked) {
        const s = 20; // size of corners
        ctx.beginPath();
        // Top Left
        ctx.moveTo(x, y + s); ctx.lineTo(x, y); ctx.lineTo(x + s, y);
        // Top Right
        ctx.moveTo(x + w - s, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + s);
        // Bottom Left
        ctx.moveTo(x, y + h - s); ctx.lineTo(x, y + h); ctx.lineTo(x + s, y + h);
        // Bottom Right
        ctx.moveTo(x + w - s, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - s);
        ctx.stroke();
        
        if (locked) {
            ctx.globalAlpha = 0.1;
            ctx.fillRect(x, y, w, h);
            ctx.globalAlpha = 1.0;
        }
    }

    // Имитация FPS
    setInterval(() => {
        document.getElementById('fps-counter').innerText = `SCAN_FREQ: ${Math.floor(Math.random()*5 + 24)}HZ`;
    }, 1000);
</script>
</body>
</html>
