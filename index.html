<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAULT-TEC | VISION_OS v11.8</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root {
            --pip-green: #1aff80;
            --pip-bg: #071a0e;
            --pip-glow: 0 0 12px rgba(26, 255, 128, 0.6);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'VT323', monospace; color: var(--pip-green); }
        
        /* CRT & Scanline FX */
        #container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        #viewport { position: relative; width: 100vw; height: calc(100vh - 180px); overflow: hidden; cursor: crosshair; border-bottom: 2px solid var(--pip-green); }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: sepia(1) hue-rotate(60deg) brightness(0.7) contrast(1.2); }
        canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        #terminal { height: 180px; background: var(--pip-bg); padding: 15px; overflow: hidden; position: relative; }
        .term-row { font-size: 20px; margin-bottom: 4px; border-left: 3px solid var(--pip-green); padding-left: 10px; animation: blink 0.1s; }
        
        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }

        #boot-overlay { position: fixed; inset: 0; background: var(--pip-bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-boot { background: var(--pip-green); color: #000; border: none; padding: 15px 50px; font-size: 30px; cursor: pointer; font-family: 'VT323'; }
    </style>
</head>
<body>

<div id="boot-overlay">
    <div style="font-size: 50px; margin-bottom: 20px;">☢ VISION_OS v11.8 ☢</div>
    <button class="btn-boot" onclick="initSystem()">[ INITIALIZE ]</button>
</div>

<div id="container">
    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termContent = document.getElementById('term-content');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];

    const TYPE_MAP = {
        'person': 'BIOLOGICAL / THREAT',
        'dog': 'BIOLOGICAL / FAUNA',
        'cat': 'BIOLOGICAL / FAUNA',
        'car': 'MECHANICAL / TRANSPORT',
        'truck': 'MECHANICAL / TRANSPORT',
        'cell phone': 'ELECTRONIC / TECH'
    };

    async function initSystem() {
        writeTerm("BOOT SEQUENCE START...");
        await tf.setBackend('wasm');
        model = await cocoSsd.load();
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            document.getElementById('boot-overlay').style.display = 'none';
            render();
        };
        writeTerm("NEURAL ENGINE ONLINE.");
    }

    function writeTerm(text, color = "var(--pip-green)") {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.style.color = color;
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 7) termContent.lastChild.remove();
    }

    // Обработка тапа (Дешифрация)
    viewport.addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const cx = (e.clientX - rect.left) * scaleX;
        const cy = (e.clientY - rect.top) * scaleY;

        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return cx >= x && cx <= x + w && cy >= y && cy <= y + h;
        });

        if (lockedObj) {
            e.stopPropagation();
            decryptObject(lockedObj);
        }
    });

    function decryptObject(obj) {
        termContent.innerHTML = "";
        const type = TYPE_MAP[obj.class] || "UNKNOWN ENTITY";
        const dist = ((900 * 0.5) / obj.bbox[2]).toFixed(2);
        
        const data = [
            `LOCK_ACQUIRED: ${obj.class.toUpperCase()}`,
            `CLASSIFICATION: ${type}`,
            `DISTANCE: ${dist} METERS`,
            `SIG_STRENGTH: ${(obj.score * 100).toFixed(1)}%`,
            `COORD: X.${Math.round(obj.bbox[0])} Y.${Math.round(obj.bbox[1])}`,
            `STATUS: DECRYPTED`
        ];

        data.forEach((msg, i) => setTimeout(() => writeTerm(msg, "#fff"), i * 150));
    }

    function resetLock() {
        lockedObj = null;
        writeTerm("SCANNING AREA... NO LOCK");
    }

    function render() {
        model.detect(video).then(preds => {
            predictions = preds;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(p => {
                const [x, y, w, h] = p.bbox;
                const isLocked = lockedObj && lockedObj.class === p.class && Math.abs(lockedObj.bbox[0] - x) < 20;

                ctx.strokeStyle = isLocked ? "#fff" : "var(--pip-green)";
                ctx.lineWidth = isLocked ? 4 : 2;
                ctx.shadowBlur = isLocked ? 15 : 0;
                ctx.shadowColor = "var(--pip-green)";

                // Отрисовка тех-рамок (Brackets)
                drawBrackets(x, y, w, h, isLocked);

                // Индикаторы распознавания
                ctx.fillStyle = isLocked ? "#fff" : "var(--pip-green)";
                ctx.font = "22px VT323";
                ctx.fillText(`${p.class.toUpperCase()}`, x + 5, y - 10);
                
                if (isLocked) {
                    // Эффект прицела V.A.T.S.
                    ctx.beginPath();
                    ctx.moveTo(x + w/2, y + h/2);
                    ctx.lineTo(canvas.width/2, canvas.height);
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });
            requestAnimationFrame(render);
        });
    }

    function drawBrackets(x, y, w, h, locked) {
        const s = locked ? 35 : 20;
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }
</script>
</body>
</html>
