<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_CORE v10.0 | PROTON</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- Библиотека для лиц -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root { 
            --target: #ffff00; --hostile: #ff0000; --bio: #ff00ff; --face: #00d4ff; --neon: #00ff41;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        #viewport { position: relative; width: 100vw; height: calc(100vh - 140px); overflow: hidden; cursor: crosshair; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) contrast(1.2); z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }

        #terminal { 
            height: 140px; background: #050505; border-top: 1px solid #222; 
            padding: 15px; box-sizing: border-box; color: var(--neon); font-size: 11px; overflow-y: hidden;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--neon);
        }
        button {
            background: none; border: 1px solid var(--neon); color: var(--neon);
            padding: 20px 50px; cursor: pointer; letter-spacing: 5px; font-weight: bold;
        }
        .scan-anim { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 65, 0.2); top: 0; animation: scan 3s linear infinite; z-index: 6; }
        @keyframes scan { from {top:0} to {top:100%} }
    </style>
</head>
<body>

<div id="overlay">
    <div id="loader-msg">LOADING NEURAL MODULES...</div>
    <button id="start-btn" style="display:none" onclick="startSystem()">INITIALIZE CORE</button>
</div>

<div id="container">
    <div id="viewport" onclick="unlockTarget()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
        <div class="scan-anim"></div>
    </div>
    <div id="terminal">
        <div id="term-rows"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termRows = document.getElementById('term-rows');
    
    let objModel, faceModelsLoaded = false;
    let predictions = [], faces = [];
    let lockedTarget = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Звуковой движок (генерация "бипа")
    function playBeep(freq = 880, type = 'square', duration = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    async function preload() {
        const msg = document.getElementById('loader-msg');
        try {
            msg.innerText = "LOADING OBJECT_DETECTOR...";
            objModel = await cocoSsd.load();
            msg.innerText = "LOADING FACE_RECOGNITION...";
            // Загрузка легковесных моделей для лиц (TinyFaceDetector)
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            faceModelsLoaded = true;
            msg.style.display = "none";
            document.getElementById('start-btn').style.display = "block";
        } catch (e) { msg.innerText = "CORS/LOAD ERROR. CHECK INTERNET."; console.error(e); }
    }

    async function startSystem() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        await video.play();
        document.getElementById('overlay').style.display = 'none';
        log("SYSTEM_READY: ALL_MODULES_AFLOAT");
        detect();
    }

    function log(text) {
        const div = document.createElement('div');
        div.innerText = `> ${new Date().toLocaleTimeString()}: ${text}`;
        termRows.prepend(div);
        if (termRows.childNodes.length > 8) termRows.lastChild.remove();
    }

    // Обработка клика
    viewport.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        const found = predictions.find(p => x > p.bbox[0] && x < p.bbox[0]+p.bbox[2] && y > p.bbox[1] && y < p.bbox[1]+p.bbox[3]);
        
        if (found) {
            lockedTarget = found;
            playBeep(1200, 'sine', 0.2);
            log(`LOCK_ON: ${found.class.toUpperCase()} | ANALYZING...`);
        }
    });

    function unlockTarget() { if(!lockedTarget) return; lockedTarget = null; playBeep(440, 'sawtooth', 0.1); log("TARGET_LOST"); }

    async function detect() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // 1. Обнаружение объектов
        predictions = await objModel.detect(video);
        
        // 2. Обнаружение лиц (каждые N кадров для экономии ресурсов)
        if (faceModelsLoaded) {
            faces = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Отрисовка лиц (Синий)
        faces.forEach(f => {
            const { x, y, width, height } = f.box;
            ctx.strokeStyle = "var(--face)";
            ctx.setLineDash([2, 2]);
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = "var(--face)";
            ctx.font = "10px monospace";
            ctx.fillText("HUMAN_FACE_ID", x, y - 5);
        });

        // Отрисовка объектов
        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const isLocked = lockedTarget && lockedTarget.class === p.class && Math.abs(lockedTarget.bbox[0] - x) < 50;
            
            let color = "white";
            if (p.class === 'person') color = "var(--target)";
            if (['car', 'bus'].includes(p.class)) color = "var(--hostile)";

            // Расчет дистанции (базовая калибровка)
            const dist = ((900 * 0.6) / w).toFixed(1);

            ctx.save();
            ctx.shadowBlur = isLocked ? 15 : 5;
            ctx.shadowColor = "black";
            ctx.strokeStyle = isLocked ? "var(--neon)" : color;
            ctx.lineWidth = isLocked ? 4 : 2;
            
            // Рамка
            ctx.setLineDash(isLocked ? [] : [10, 5]);
            ctx.strokeRect(x, y, w, h);
            
            // Углы
            ctx.setLineDash([]);
            drawBrackets(x, y, w, h, isLocked ? 30 : 15);

            // Тайтл
            ctx.fillStyle = isLocked ? "var(--neon)" : color;
            ctx.font = "bold 13px monospace";
            ctx.fillText(`${p.class.toUpperCase()} [${dist}m]`, x + 5, y - 10);
            
            if (isLocked) {
                ctx.font = "9px monospace";
                ctx.fillText(`STATUS: TRACKING_ACTIVE`, x + 5, y + h + 15);
            }
            ctx.restore();
        });

        requestAnimationFrame(detect);
    }

    function drawBrackets(x, y, w, h, s) {
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }

    preload();
</script>
</body>
</html>
