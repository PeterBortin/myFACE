<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v10.0 | HYPER_SCAN_LIDAR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { 
            --target: #ffff00; --hostile: #ff0000; --bio: #ff00ff; --obj: #ffffff; --plant: #00ff41;
            --bg: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff41; }
        
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; flex: 1; overflow: hidden; cursor: crosshair; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.35) contrast(1.3) grayscale(0.2); 
            z-index: 1; 
            transition: opacity 0.4s ease;
        }
        video.lidar-mode { opacity: 0.05; filter: brightness(0.1) contrast(3); }

        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }

        #ui-layer {
            position: absolute; top: 10px; right: 10px; z-index: 20; display: flex; gap: 10px;
        }
        .ui-btn {
            background: rgba(0,0,0,0.7); border: 1px solid #00ff41; color: #00ff41;
            padding: 8px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }
        .ui-btn.active { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }

        #terminal { 
            height: 160px; background: var(--bg); border-top: 2px solid #1a1a1a; 
            padding: 15px; box-sizing: border-box; overflow: hidden; font-size: 11px;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }
        .term-row { margin-bottom: 4px; opacity: 0.9; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #overlay button {
            background: none; border: 1px solid #00ff41; color: #00ff41;
            padding: 15px 40px; cursor: pointer; letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div style="margin-bottom:20px; font-size:10px;">CORE_V10: HYPER_VISION_READY</div>
    <button onclick="initVision()">INITIATE SYSTEM</button>
</div>

<div id="container">
    <div id="ui-layer">
        <button id="btn-std" class="ui-btn active" onclick="setMode('STD')">Vision: MAX_SCAN</button>
        <button id="btn-lidar" class="ui-btn" onclick="setMode('LIDAR')">Vision: LIDAR_3D</button>
    </div>
    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<canvas id="buffer" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const buffer = document.getElementById('buffer');
    const bctx = buffer.getContext('2d', {willReadFrequently: true});
    const termContent = document.getElementById('term-content');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];
    let currentMode = 'STD';

    const COLORS = {
        'person': '#ffff00', 'car': '#ff0000', 'truck': '#ff0000', 
        'dog': '#ff00ff', 'cat': '#ff00ff', 'potted plant': '#00ff41',
        'default': '#ffffff'
    };

    async function initVision() {
        try {
            await tf.setBackend('wasm');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            await video.play();
            
            // Сетка 728x1024 для LiDAR анализа
            buffer.width = 128; 
            buffer.height = 91;
            
            writeTerm("ENGINE: LOADING COCO-SSD HYPER_MODE...");
            model = await cocoSsd.load();
            
            document.getElementById('overlay').style.display = 'none';
            writeTerm("SYSTEM ONLINE. SENSOR_ARRAY: ACTIVE.");
            render();
        } catch (e) {
            alert("INIT_ERROR: " + e.message);
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-std').classList.toggle('active', mode === 'STD');
        document.getElementById('btn-lidar').classList.toggle('active', mode === 'LIDAR');
        video.className = (mode === 'LIDAR') ? 'lidar-mode' : '';
        writeTerm(`MODE_SHIFT: ${mode === 'LIDAR' ? 'DEPTH_PROJECTION_3D' : 'MAX_OBJECT_ACQUISITION'}`);
    }

    document.getElementById('viewport').addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });
        if (lockedObj) { e.stopPropagation(); startDecrypt(lockedObj); }
    });

    function resetLock() { lockedObj = null; termContent.innerHTML = ""; writeTerm("SCANNING... READY"); }

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 8) termContent.lastChild.remove();
    }

    function startDecrypt(obj) {
        termContent.innerHTML = "";
        const lines = [
            `TARGET: ${obj.class.toUpperCase()}`,
            `DIST: ${((1500 * 0.5) / obj.bbox[2]).toFixed(2)}m`,
            `VOLUME: ${Math.round(obj.bbox[2] * obj.bbox[3])}px_sq`,
            `3D_LOCK: STABLE`,
            `VECTOR: [${(Math.random()*1).toFixed(2)}, ${(Math.random()*1).toFixed(2)}, 0]`
        ];
        lines.forEach((l, i) => setTimeout(() => writeTerm(l), i * 100));
    }

    async function render() {
        predictions = await model.detect(video, currentMode === 'STD' ? 40 : 15);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentMode === 'LIDAR') drawHyperLidar();

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            const dist = ((1500 * 0.5) / w); 
            
            let color = (currentMode === 'LIDAR') ? `hsl(${Math.max(0, 240 - dist*30)}, 100%, 50%)` : (COLORS[label] || COLORS['default']);
            
            ctx.save();
            const isLocked = lockedObj && Math.abs(lockedObj.bbox[0] - x) < 5;
            ctx.strokeStyle = color;
            ctx.lineWidth = isLocked ? 3 : 1;

            if (currentMode === 'LIDAR') {
                draw3DCube(x, y, w, h, dist, color);
            } else {
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.1;
                ctx.fillRect(x, y, w, h);
                ctx.globalAlpha = 1.0;
            }

            ctx.fillStyle = color;
            ctx.font = "10px Courier New";
            ctx.fillText(`${label.toUpperCase()} [${dist.toFixed(1)}m]`, x, y - 5);
            drawCorners(x, y, w, h, color, isLocked ? 25 : 10);
            ctx.restore();
        });

        requestAnimationFrame(render);
    }

    function drawHyperLidar() {
        bctx.drawImage(video, 0, 0, buffer.width, buffer.height);
        const imgData = bctx.getImageData(0, 0, buffer.width, buffer.height).data;
        const cellW = canvas.width / buffer.width;
        const cellH = canvas.height / buffer.height;

        for (let y = 0; y < buffer.height; y++) {
            for (let x = 0; x < buffer.width; x++) {
                const i = (y * buffer.width + x) * 4;
                const brightness = (imgData[i] + imgData[i+1] + imgData[i+2]) / 3;
                
                if (brightness > 30) {
                    // Спектр: тусклый - синий, яркий - белый
                    let r = 0, g = brightness/2, b = brightness;
                    if (brightness > 180) { r = brightness; g = brightness; b = brightness; }
                    
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x * cellW, y * cellH, 1.5, 1.5);
                }
            }
        }
    }

    function draw3DCube(x, y, w, h, dist, color) {
        const offset = Math.min(w, h) * 0.2; // Смещение для эффекта 3D
        ctx.beginPath();
        ctx.setLineDash([2, 2]);
        // Передняя грань
        ctx.rect(x, y, w, h);
        // Задняя грань (смещение внутрь)
        ctx.rect(x + offset, y - offset, w, h);
        // Соединительные линии
        ctx.moveTo(x, y); ctx.lineTo(x + offset, y - offset);
        ctx.moveTo(x + w, y); ctx.lineTo(x + w + offset, y - offset);
        ctx.moveTo(x, y + h); ctx.lineTo(x + offset, y + h - offset);
        ctx.moveTo(x + w, y + h); ctx.lineTo(x + w + offset, y + h - offset);
        ctx.stroke();
    }

    function drawCorners(x, y, w, h, color, s) {
        ctx.beginPath(); ctx.setLineDash([]);
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }
</script>
</body>
</html>
