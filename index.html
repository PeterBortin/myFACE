<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Face Scanner v6.2.3 - MONOCHROME</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #888; }
    
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.5s ease;
      border: 1px solid #333; box-sizing: border-box;
    }

    .loader-ring {
      display: none; width: 60px; height: 60px; border: 2px solid #222;
      border-radius: 50%; border-top-color: #fff;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #access-btn {
      background: none; border: 1px solid #fff; color: #fff;
      padding: 15px 30px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 3px; font-family: inherit; transition: 0.3s;
    }
    #access-btn:hover { background: #fff; color: #000; }

    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
    .input_video { display: none; }
    
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }

    #switch-camera {
      position: absolute; top: 20px; right: 20px; z-index: 110;
      background: rgba(0,0,0,0.7); border: 1px solid #fff; color: #fff;
      padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 10px;
    }

    .interface-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      font-size: 11px; pointer-events: none; color: #666;
    }

    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, #000 90%, transparent);
      padding-bottom: 20px;
    }

    #live-speech-box {
      width: 90%; min-height: 35px; margin-bottom: 5px;
      text-align: center; font-size: 18px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px; color: #fff;
    }

    #audio_visualizer { 
      width: 90%; height: 80px; margin-bottom: 10px; 
      background: rgba(255,255,255,0.02); border: 1px solid #222; 
    }

    #terminal-box {
      width: 90%; height: 150px; background: rgba(255, 255, 255, 0.01);
      border: 1px solid #222; padding: 10px; box-sizing: border-box;
      overflow-y: auto; font-size: 10px; scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .log-entry { 
      margin: 2px 0; color: #555; 
      border-left: 1px solid #222; 
      padding-left: 8px; white-space: pre-wrap;
    }
    .log-entry:last-child { color: #fff; border-left: 1px solid #fff; }
  </style>
</head>

<body>

  <div id="preloader">
    <div style="color:#fff; margin-bottom:10px;">NEURAL CORE LOADER v6.2.3</div>
    <div class="loader-ring" id="ring"></div>
    <button id="access-btn" onclick="startSequence()">INITIALIZE NEURAL LINK</button>
    <p id="status-text" style="margin-top: 20px; font-size: 10px; color: #444;">AWAITING BIOMETRIC AUTHORIZATION...</p>
  </div>

  <button id="switch-camera">Switch Cam</button>

  <div id="container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div>> LINK_STATUS: ACTIVE</div>
      <div id="target-status">> TARGET: SEEKING...</div>
    </div>

    <div class="bottom-peripherals">
      <div id="live-speech-box">IDLE</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const logContent = document.getElementById('log-content');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, frequencyArray;
    let globalStream = null;
    let isSpeaking = false;
    let speechTimeout;

    // --- УСКОРЕННЫЙ ТЕРМИНАЛ ---
    const logQueue = [];
    let isTyping = false;

    async function processLogQueue() {
      if (isTyping || logQueue.length === 0) return;
      isTyping = true;
      const { text, timestamp } = logQueue.shift();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerText = `[${timestamp}] `;
      logContent.appendChild(entry);
      const message = text.toUpperCase();
      for (let i = 0; i < message.length; i++) {
        entry.innerText += message[i];
        terminalBox.scrollTop = terminalBox.scrollHeight;
        await new Promise(r => setTimeout(r, 5));
      }
      isTyping = false;
      processLogQueue();
    }

    function addLog(text) {
      logQueue.push({ text, timestamp: new Date().toLocaleTimeString() });
      if (!isTyping) processLogQueue();
    }

    // --- ИНИЦИАЛИЗАЦИЯ (ФИКС ДОСТУПОВ) ---
    window.startSequence = async function() {
      const btn = document.getElementById('access-btn');
      const ring = document.getElementById('ring');
      const status = document.getElementById('status-text');

      try {
        btn.style.display = 'none';
        status.innerText = "ACCESSING CORE SENSORS...";

        // Запрашиваем всё один раз
        globalStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true }, 
            video: { facingMode: currentFacingMode } 
        });
        
        ring.style.display = 'block';
        status.innerText = "CALIBRATING...";

        // Инициализация Аудио (фиксим эквалайзер)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(globalStream);
        source.connect(analyser);
        analyser.fftSize = 64; // Меньше размер - больше чувствительность для барабанов
        frequencyArray = new Uint8Array(analyser.frequencyBinCount);
        
        drawBars();

        videoElement.srcObject = globalStream;
        videoElement.onloadedmetadata = () => {
            videoElement.play();
            startCameraTask();
        };
        
        document.getElementById('preloader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('preloader').style.display = 'none';
          document.getElementById('container').style.visibility = 'visible';
          if (window.runSpeech) window.runSpeech();
          addLog("System Online");
        }, 500);

      } catch (err) {
        console.error(err);
        status.innerText = "FATAL ERROR: ACCESS DENIED";
        btn.style.display = 'block';
        ring.style.display = 'none';
      }
    };

    function drawBars() {
      requestAnimationFrame(drawBars);
      if(!analyser) return;
      
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteFrequencyData(frequencyArray);
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);

      const barCount = frequencyArray.length;
      const gutter = 4;
      const barWidth = (audioCanvas.width / barCount) - gutter;
      
      for (let i = 0; i < barCount; i++) {
        const val = frequencyArray[i];
        const percent = val / 255;
        const height = audioCanvas.height * percent;
        const x = i * (barWidth + gutter);
        
        aCtx.fillStyle = `rgb(${150 + percent * 105}, ${150 + percent * 105}, ${150 + percent * 105})`;
        aCtx.fillRect(x, audioCanvas.height - height, barWidth, height);
      }
    }

    // --- РАСПОЗНАВАНИЕ РЕЧИ (ЦВЕТОВОЙ ТРИГГЕР) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU';
      
      recognition.onresult = (event) => {
        isSpeaking = true;
        clearTimeout(speechTimeout);
        
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            addLog("VOICE_IN: " + transcript.trim()); 
          } else {
            interim += transcript;
          }
        }
        liveSpeechBox.innerText = interim.trim() ? interim.toUpperCase() : "LISTENING...";
        
        // Сбрасываем статус через 1.5 секунды тишины
        speechTimeout = setTimeout(() => { isSpeaking = false; }, 1500);
      };
      
      recognition.onerror = () => recognition.stop();
      recognition.onend = () => recognition.start();
      window.runSpeech = () => recognition.start();
    }

    function getEyeDist(landmarks, p1, p2) {
        return Math.sqrt(Math.pow(landmarks[p1].x - landmarks[p2].x, 2) + Math.pow(landmarks[p1].y - landmarks[p2].y, 2));
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Фон
      canvasCtx.globalAlpha = 0.1;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        targetStatus.innerText = "> TARGET: ACQUIRED";
        
        for (const landmarks of results.multiFaceLandmarks) {
          // Логика цвета
          const leftEyeDist = getEyeDist(landmarks, 159, 145);
          const rightEyeDist = getEyeDist(landmarks, 386, 374);
          const eyesClosed = (leftEyeDist < 0.015 && rightEyeDist < 0.015);

          let dynamicColor = "rgba(255, 255, 255, 0.25)"; // Дефолт белая
          let activeColor = "#ffffff";

          if (isSpeaking) {
            dynamicColor = "rgba(0, 255, 100, 0.25)"; // Зеленая при речи
            activeColor = "#00ff64";
          } else if (eyesClosed) {
            dynamicColor = "rgba(255, 0, 0, 0.3)"; // Красная при закрытых глазах
            activeColor = "#ff0000";
          }

          // Сетка
          canvasCtx.strokeStyle = dynamicColor;
          canvasCtx.lineWidth = 0.5;
          for (const connector of FACEMESH_TESSELATION) {
            const start = landmarks[connector[0]];
            const end = landmarks[connector[1]];
            canvasCtx.beginPath();
            canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
            canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
            canvasCtx.stroke();
          }
          
          // Контуры (Глаза/Рот)
          canvasCtx.strokeStyle = activeColor;
          canvasCtx.lineWidth = 1.5;
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: activeColor});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: activeColor});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: activeColor});
        }
      } else {
        targetStatus.innerText = "> TARGET: SEEKING...";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCameraTask() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 1280, height: 720
      });
      cameraInstance.start();
    }

    document.getElementById('switch-camera').addEventListener('click', async () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      
      // Переключаем трек в существующем стриме без нового запроса разрешений
      const videoTrack = globalStream.getVideoTracks()[0];
      const constraints = { facingMode: currentFacingMode };
      await videoTrack.applyConstraints(constraints);
      
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
      addLog("Camera Switched: " + currentFacingMode);
    });
  </script>
</body>
</html>
