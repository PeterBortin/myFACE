<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v11.0 | PURE_SCAN</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { 
            --target: #ffff00; --hostile: #ff0000; --bio: #ff00ff; --obj: #ffffff; --plant: #00ff41;
            --bg: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff41; }
        
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; flex: 1; overflow: hidden; cursor: crosshair; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.4) contrast(1.4) saturate(1.2); 
            z-index: 1; 
        }

        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }

        #ui-layer {
            position: absolute; top: 10px; right: 10px; z-index: 20; display: flex; gap: 10px;
        }
        .ui-status {
            background: rgba(0,0,0,0.8); border: 1px solid #00ff41; color: #00ff41;
            padding: 8px 15px; font-size: 10px; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,65,0.3);
            letter-spacing: 2px;
        }

        #terminal { 
            height: 160px; background: var(--bg); border-top: 2px solid #1a1a1a; 
            padding: 15px; box-sizing: border-box; overflow: hidden; font-size: 11px;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }
        .term-row { margin-bottom: 4px; opacity: 0.9; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #overlay button {
            background: none; border: 1px solid #00ff41; color: #00ff41;
            padding: 15px 40px; cursor: pointer; letter-spacing: 3px;
            transition: all 0.3s;
        }
        #overlay button:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="margin-bottom:20px; font-size:10px; letter-spacing:5px;">CORE_V11: ULTIMATE_SCAN_ENABLED</div>
    <button onclick="initVision()">START HYPER_SCAN</button>
</div>

<div id="container">
    <div id="ui-layer">
        <div class="ui-status">SYSTEM_STABLE: MAX_RANGE</div>
    </div>
    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termContent = document.getElementById('term-content');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];

    const COLORS = {
        'person': '#ffff00', 'car': '#ff0000', 'truck': '#ff0000', 
        'dog': '#ff00ff', 'cat': '#ff00ff', 'potted plant': '#00ff41',
        'default': '#ffffff'
    };

    async function initVision() {
        try {
            // Использование WASM для максимальной производительности
            await tf.setBackend('wasm');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment', 
                    width: { ideal: 1920 }, // Увеличиваем входное разрешение для дальности
                    frameRate: { ideal: 60 } // Приоритет плавности
                }
            });
            video.srcObject = stream;
            await video.play();
            
            writeTerm("ENGINE: INITIATING HYPER_SCAN_SSD...");
            writeTerm("WASM_BACKEND: MULTI_THREADING_ACTIVE");
            
            model = await cocoSsd.load();
            
            document.getElementById('overlay').style.display = 'none';
            writeTerm("SYSTEM ONLINE. RANGE_LIMITER: DISABLED.");
            render();
        } catch (e) {
            alert("INIT_ERROR: " + e.message);
        }
    }

    document.getElementById('viewport').addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });
        
        if (lockedObj) { 
            e.stopPropagation(); 
            startDecrypt(lockedObj); 
        }
    });

    function resetLock() { 
        lockedObj = null; 
        termContent.innerHTML = ""; 
        writeTerm("SCANNING DEPTHS... SCAN_MAX_ACTIVE"); 
    }

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 8) termContent.lastChild.remove();
    }

    function startDecrypt(obj) {
        termContent.innerHTML = "";
        const lines = [
            `SIGNAL_LOCKED: ${obj.class.toUpperCase()}`,
            `EXT_RANGE: ${((2000 * 0.5) / obj.bbox[2]).toFixed(2)}m`,
            `MOTION_STATE: ${Math.random() > 0.5 ? 'DYNAMIC' : 'STATIC'}`,
            `SIG_STRENGTH: ${(obj.score * 100).toFixed(1)}%`,
            `TRACKING_ID: #X${Math.floor(Math.random()*9999)}`
        ];
        lines.forEach((l, i) => setTimeout(() => writeTerm(l), i * 80));
    }

    async function render() {
        // Увеличено количество обнаруживаемых объектов для сложных сцен
        predictions = await model.detect(video, 50); 
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            // Коэффициент дальности увеличен до 2000 для обнаружения мелких объектов
            const dist = ((2000 * 0.5) / w); 
            
            const color = COLORS[label] || COLORS['default'];
            
            ctx.save();
            const isLocked = lockedObj && Math.abs(lockedObj.bbox[0] - x) < 5;
            
            // Визуализация данных
            ctx.strokeStyle = color;
            ctx.lineWidth = isLocked ? 4 : 1.5;
            
            // Рамка с быстрым паттерном сканирования
            ctx.setLineDash(isLocked ? [] : [10, 5]);
            ctx.strokeRect(x, y, w, h);
            
            // Динамический индикатор вероятности (шкала сбоку)
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.3;
            ctx.fillRect(x + w + 4, y + h, 4, -(h * p.score));
            ctx.globalAlpha = 1.0;

            // Текстовый блок данных
            ctx.font = "bold 12px Courier New";
            ctx.fillText(`${label.toUpperCase()}`, x, y - 8);
            ctx.font = "10px Courier New";
            ctx.fillText(`D:${dist.toFixed(1)}m | S:${(p.score * 100).toFixed(0)}%`, x, y - 20);

            // Отрисовка высокотехнологичных углов
            drawCorners(x, y, w, h, color, isLocked ? 35 : 15);
            
            ctx.restore();
        });

        // Прямой вызов кадра для максимального FPS
        requestAnimationFrame(render);
    }

    function drawCorners(x, y, w, h, color, s) {
        ctx.beginPath();
        ctx.setLineDash([]);
        ctx.lineWidth = 2;
        // Top Left
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        // Top Right
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        // Bottom Left
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        // Bottom Right
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }
</script>
</body>
</html>
