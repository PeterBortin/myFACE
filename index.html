<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SCANNER PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { --green: #00ff41; --blue: #0084ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* Кнопка запуска для iOS */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            color: var(--green); text-align: center; padding: 20px;
        }

        button {
            background: transparent; border: 1px solid var(--green);
            color: var(--green); padding: 15px 30px; font-size: 1.2rem;
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
            box-shadow: 0 0 10px var(--green);
        }

        .hud-top { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; color: var(--green); padding: 0 15px; box-sizing: border-box; font-size: 12px; z-index: 20; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--green); opacity: 0.5; top: 0; animation: scan 3s linear infinite; z-index: 20; }
        @keyframes scan { from {top: 0%} to {top: 100%} }
    </style>
</head>
<body>

<div id="start-screen">
    <div style="font-size: 24px; letter-spacing: 5px;">SYSTEM OFFLINE</div>
    <p>ТРЕБУЕТСЯ АВТОРИЗАЦИЯ ВИДЕОПОТОКА</p>
    <button id="auth-btn">АКТИВИРОВАТЬ КАМЕРУ</button>
</div>

<div id="container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="hud-top">
        <span>CAM_03 // ACTIVE</span>
        <span style="color: #ff0000">● REC</span>
    </div>
    <div class="scan-line"></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('start-screen');
    const authBtn = document.getElementById('auth-btn');

    let model = null;

    // Функция запроса камеры (вызывается по кнопке для iOS)
    async function setupCamera() {
        const constraints = {
            video: {
                facingMode: 'environment', // Основная камера
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            
            // Важно для iOS: дожидаемся возможности играть видео
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
        } catch (err) {
            console.error(err);
            alert("ОШИБКА: Доступ запрещен или камера занята. Проверьте настройки Safari.");
            throw err;
        }
    }

    async function startDetection() {
        authBtn.innerText = "ЗАГРУЗКА AI...";
        authBtn.disabled = true;

        try {
            // 1. Сначала просим камеру
            await setupCamera();
            // 2. Затем грузим модель
            model = await cocoSsd.load();
            
            startScreen.style.display = 'none';
            render();
        } catch (e) {
            authBtn.innerText = "ОШИБКА ЗАПУСКА";
            authBtn.disabled = false;
        }
    }

    async function render() {
        // Синхронизация размеров под экран
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(p => {
            if (p.class === 'person') {
                const [x, y, w, h] = p.bbox;

                // Рамка (Green)
                ctx.strokeStyle = '#00ff41';
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, w, h);

                // Тэг (Blue)
                ctx.fillStyle = '#0084ff';
                ctx.font = 'bold 20px monospace';
                ctx.fillText(`TARGET: IDENTIFIED`, x, y > 30 ? y - 10 : 30);
                
                // Декоративные линии (White)
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, 0); // Линия наверх
                ctx.stroke();
            }
        });

        requestAnimationFrame(render);
    }

    // Событие нажатия — критично для iOS
    authBtn.addEventListener('click', startDetection);

</script>
</body>
</html>
