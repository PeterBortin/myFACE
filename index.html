<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Mesh Matrix Effect</title>
  <!-- Подключаем библиотеки MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    
    /* Видео скрыто, мы рисуем его на канвасе */
    .input_video { display: none; }
    
    /* Канвас на весь экран */
    .output_canvas {
      max-width: 100%;
      max-height: 100%;
      transform: scaleX(-1); /* Зеркальное отображение для фронталки */
    }

    .status {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff41;
      text-shadow: 0 0 5px #00ff41;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="status">SYSTEM: FACE_DETECTION_ACTIVE</div>
  <div id="container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script type="module">
    const videoElement = document.getElementsByClassName('input_video')[0];
    const canvasElement = document.getElementsByClassName('output_canvas')[0];
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
      // Устанавливаем размер канваса под видео
      if (canvasElement.width !== videoElement.videoWidth) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // Рисуем само видео (слегка затемненное для эффекта)
      canvasCtx.globalAlpha = 0.4;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
          
          // 1. Рисуем соединительные линии (Сетка)
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, 
            {color: '#00ff41', lineWidth: 0.5});

          // 2. Рисуем контуры глаз и губ ярче
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#00ffff'});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#00ffff'});

          // 3. Рисуем точки (как на референсах с точками)
          // Ограничим количество точек для стиля "Matrix DOT"
          for (let i = 0; i < landmarks.length; i += 3) { 
            const x = landmarks[i].x * canvasElement.width;
            const y = landmarks[i].y * canvasElement.height;
            
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, 1.5, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "#ffffff";
            canvasCtx.fill();
          }
        }
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    
    camera.start();
  </script>
</body>
</html>
