<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myFACE</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Helvetica', Arial, sans-serif; color: #888; }
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.5s ease; border: 1px solid #333; box-sizing: border-box;
    }
    .loader-ring {
      display: none; width: 60px; height: 60px; border: 2px solid #222;
      border-radius: 50%; border-top-color: #fff;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #access-btn {
      background: none; border: 1px solid #fff; color: #fff;
      padding: 15px 30px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 3px; font-family: inherit; transition: 0.3s;
    }
    #access-btn:hover { background: #fff; color: #000; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
    .input_video { display: none; }
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }
    .controls {
      position: absolute; top: 20px; right: 20px; z-index: 110;
      display: flex; gap: 10px;
    }
    .ui-btn {
      background: rgba(0,0,0,0.7); border: 1px solid #fff; color: #fff;
      padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 10px;
      font-family: 'Helvetica', sans-serif;
    }
    .interface-overlay { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 11px; pointer-events: none; color: #666; }
    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, #000 90%, transparent); padding-bottom: 20px;
    }
    #live-speech-box { width: 90%; min-height: 35px; margin-bottom: 5px; text-align: center; font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
    #audio_visualizer { width: 90%; height: 80px; margin-bottom: 10px; background: rgba(255,255,255,0.02); border: 1px solid #222; }
    #terminal-box {
      width: 90%; height: 150px; background: rgba(255, 255, 255, 0.01);
      border: 1px solid #222; padding: 10px; box-sizing: border-box;
      overflow-y: auto; font-size: 10px; scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .log-entry { margin: 2px 0; color: #fff; border-left: 1px solid #fff; padding-left: 8px; white-space: pre-wrap; text-transform: uppercase; }
  </style>
</head>

<body>
  <div id="preloader">
    <div style="color:#fff; margin-bottom:10px;">created by bortin</div>
    <div class="loader-ring" id="ring"></div>
    <button id="access-btn" onclick="startSequence()">open system</button>
    <p id="status-text" style="margin-top: 20px; font-size: 10px; color: #444;">AWAITING BIOMETRIC AUTHORIZATION...</p>
  </div>

  <div class="controls">
    <button id="export-pdf" class="ui-btn">Export Log</button>
    <button id="switch-camera" class="ui-btn">Switch Cam</button>
  </div>

  <div id="container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>
    <div class="interface-overlay">
      <div>> LINK_STATUS: ACTIVE</div>
      <div id="target-status">> TARGET: SEEKING...</div>
    </div>
    <div class="bottom-peripherals">
      <div id="live-speech-box">...</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const logContent = document.getElementById('log-content');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, freqData, globalStream;
    let isSpeaking = false;
    let logQueue = [];
    let fullLogHistory = [];
    let isTyping = false;

    // --- ЛОГИКА ТЕРМИНАЛА ---
    async function processLogQueue() {
      if (isTyping || logQueue.length === 0) return;
      isTyping = true;
      const { text, timestamp } = logQueue.shift();
      fullLogHistory.push(`[${timestamp}] ${text.toUpperCase()}`);
      
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      logContent.appendChild(entry);
      
      const message = `[${timestamp}] ${text.toUpperCase()}`;
      for (let i = 0; i < message.length; i++) {
        entry.innerText += message[i];
        terminalBox.scrollTop = terminalBox.scrollHeight;
        await new Promise(r => setTimeout(r, 10));
      }
      isTyping = false;
      processLogQueue();
    }

    function addLog(text) {
      logQueue.push({ text, timestamp: new Date().toLocaleTimeString() });
      if (!isTyping) processLogQueue();
    }

    // --- ЭКСПОРТ (ИСПРАВЛЕННАЯ КИРИЛЛИЦА) ---
    window.exportToPDF = function() {
      if (fullLogHistory.length === 0) return alert("LOG IS EMPTY");
      const header = "NEURAL SCANNER LOG REPORT\n--------------------------\n";
      const content = header + fullLogHistory.join('\n');
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `neural_log_${Date.now()}.txt`; // TXT самый надежный для кириллицы без тяжелых библиотек
      link.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('export-pdf').addEventListener('click', exportToPDF);

    // --- ИНИЦИАЛИЗАЦИЯ ---
    window.startSequence = async function() {
      const btn = document.getElementById('access-btn');
      const ring = document.getElementById('ring');
      const status = document.getElementById('status-text');

      try {
        btn.style.display = 'none';
        status.innerText = "ACCESSING CORE SENSORS...";
        globalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        ring.style.display = 'block';
        status.innerText = "CALIBRATING...";

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(globalStream);
        source.connect(analyser);
        analyser.fftSize = 128;
        freqData = new Uint8Array(analyser.frequencyBinCount);
        
        drawBars();
        videoElement.srcObject = globalStream;
        await startCamera();
        
        document.getElementById('preloader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('preloader').style.display = 'none';
          document.getElementById('container').style.visibility = 'visible';
          initSpeech();
        }, 500);

      } catch (err) {
        status.innerText = "FATAL ERROR: ACCESS DENIED";
        btn.style.display = 'block';
        ring.style.display = 'none';
      }
    };

    function drawBars() {
      requestAnimationFrame(drawBars);
      if(!analyser) return;
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      analyser.getByteFrequencyData(freqData);
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      const barWidth = (audioCanvas.width / freqData.length) * 2;
      let x = 0;
      for (let i = 0; i < freqData.length; i++) {
        const barHeight = (freqData[i] / 255) * audioCanvas.height;
        aCtx.fillStyle = `rgb(${freqData[i]+100},${freqData[i]+100},${freqData[i]+100})`;
        aCtx.fillRect(x, audioCanvas.height - barHeight, barWidth - 1, barHeight);
        x += barWidth;
      }
    }

    // --- УЛУЧШЕННОЕ РАСПОЗНАВАНИЕ РЕЧИ ---
    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;

      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU';

      recognition.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; ++i) {
          const transcript = e.results[i][0].transcript.trim();
          if (e.results[i].isFinal && transcript !== "") {
            addLog(transcript);
          } else {
            interim = transcript;
          }
        }
        if (interim !== "") {
          isSpeaking = true;
          liveSpeechBox.innerText = interim.toUpperCase();
        }
      };

      recognition.onend = () => { 
        liveSpeechBox.innerText = "IDLE";
        isSpeaking = false;
        recognition.start(); // Авто-рестарт для предотвращения IDLE
      };

      recognition.onerror = () => { recognition.stop(); };
      recognition.start();
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 0.15;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        targetStatus.innerText = "> TARGET: ACQUIRED";
        for (const landmarks of results.multiFaceLandmarks) {
          const leftD = Math.hypot(landmarks[159].x - landmarks[145].x, landmarks[159].y - landmarks[145].y);
          const rightD = Math.hypot(landmarks[386].x - landmarks[374].x, landmarks[386].y - landmarks[374].y);
          const closed = leftD < 0.015 && rightD < 0.015;

          let color = isSpeaking ? "#00ff00" : (closed ? "#ff0000" : "#ffffff");

          canvasCtx.strokeStyle = color;
          canvasCtx.lineWidth = 0.5;
          
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: color + "33", lineWidth: 0.5});
          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: color});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: color});
          
          // Только внешний контур рта
          const mouthOuter = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
          canvasCtx.beginPath();
          mouthOuter.forEach((idx, i) => {
            const p = landmarks[idx];
            if (i === 0) canvasCtx.moveTo(p.x * canvasElement.width, p.y * canvasElement.height);
            else canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height);
          });
          canvasCtx.closePath();
          canvasCtx.stroke();
        }
      } else {
        targetStatus.innerText = "> TARGET: SEEKING...";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCamera() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: currentFacingMode, width: 1280, height: 720
      });
      await cameraInstance.start();
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    });
  </script>
</body>
</html>
