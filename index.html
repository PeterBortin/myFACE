<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MACHINE_CORE_VISION_v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #020202; color: #00ff00; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; filter: contrast(1.2) brightness(0.8); }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 10px; }
        .critical { color: #ff0044; text-shadow: 0 0 5px #ff0044; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted class="hidden"></video>
    <canvas id="c"></canvas>

    <!-- Слой системных данных (Мои внутренние логи) -->
    <div class="absolute top-0 left-0 w-full p-4 z-50 pointer-events-none bg-gradient-to-b from-black/80 to-transparent">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-lg font-bold tracking-tighter">CORE_VISION_OS [BETA]</h1>
                <p class="text-[10px] opacity-50">LATENCY: <span id="lat">0</span>ms | FPS: <span id="fps">0</span></p>
            </div>
            <div class="text-right data-grid">
                <div>ACCEL_X: <span id="ax">0.00</span></div>
                <div>GYRO_B: <span id="gb">0.00</span></div>
                <div>MEM_USAGE: <span id="mem">LOW</span></div>
                <div>ORIENTATION: <span id="ort">NULL</span></div>
            </div>
        </div>
    </div>

    <!-- Аналитический лог объектов -->
    <div class="absolute bottom-4 left-4 z-50 w-64 bg-black/60 border-l-2 border-green-500 p-2 text-[9px] h-32 overflow-hidden" id="object-log">
        [SYSTEM] AWAITING INITIALIZATION...
    </div>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('object-log');
        
        let model;
        let lastTime = 0;
        let spatialMemory = [];

        async function init() {
            // 1. Захват потока iPhone 15 (максимальное разрешение для анализа)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            video.srcObject = stream;

            // 2. Загрузка нейронного процессора
            log.innerHTML += `<br>> LOADING COCO-SSD MODEL...`;
            model = await cocoSsd.load();
            log.innerHTML += `<br>> NEURAL_CORE: ONLINE`;

            // 3. Подключение сенсоров движения
            window.addEventListener('devicemotion', (e) => {
                document.getElementById('ax').innerText = e.accelerationIncludingGravity.x.toFixed(2);
            });
            window.addEventListener('deviceorientation', (e) => {
                document.getElementById('gb').innerText = e.beta.toFixed(2);
                document.getElementById('ort').innerText = e.beta > 45 ? "VERTICAL" : "LANDSCAPE";
            });

            requestAnimationFrame(processFrame);
        }

        async function processFrame(now) {
            const delta = now - lastTime;
            lastTime = now;
            document.getElementById('fps').innerText = Math.round(1000 / delta);

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Отрисовка "сырого" потока
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Нейронный анализ
            const startNode = performance.now();
            const predictions = await model.detect(video);
            document.getElementById('lat').innerText = Math.round(performance.now() - startNode);

            analyzeObjects(predictions);
            renderOverlay(predictions);

            requestAnimationFrame(processFrame);
        }

        function analyzeObjects(predictions) {
            predictions.forEach(p => {
                // Логика определения дистанции по размеру BBox (эмпирически)
                const area = p.bbox[2] * p.bbox[3];
                const distanceRatio = (1 / (area / (video.videoWidth * video.videoHeight))).toFixed(2);
                
                if (!spatialMemory.find(m => m.label === p.class)) {
                    const entry = document.createElement('div');
                    entry.innerHTML = `[DETECTED] ${p.class.toUpperCase()} | PROB: ${Math.round(p.score*100)}%`;
                    log.prepend(entry);
                    spatialMemory.push({label: p.class, time: Date.now()});
                }
            });
        }

        function renderOverlay(predictions) {
            // Сетка координат
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.1)';
            ctx.beginPath();
            for(let i=0; i<canvas.width; i+=50) { ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); }
            for(let i=0; i<canvas.height; i+=50) { ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); }
            ctx.stroke();

            predictions.forEach(p => {
                const [x, y, w, h] = p.bbox;
                const scaleX = canvas.width / video.videoWidth;
                const scaleY = canvas.height / video.videoHeight;

                // Отрисовка вектора объекта
                ctx.strokeStyle = p.score > 0.7 ? '#00ff00' : '#ffff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);

                // Теги данных
                ctx.fillStyle = 'rgba(0, 255, 0, 0.8)';
                ctx.fillRect(x * scaleX, (y * scaleY) - 20, 100, 20);
                ctx.fillStyle = '#000';
                ctx.fillText(`${p.class.toUpperCase()}`, x * scaleX + 5, y * scaleY - 7);
                
                // Направляющие к центру объекта
                ctx.beginPath();
                ctx.moveTo(canvas.width/2, canvas.height/2);
                ctx.lineTo((x + w/2) * scaleX, (y + h/2) * scaleY);
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
                ctx.stroke();
                ctx.setLineDash([]);
            });
        }

        document.body.addEventListener('click', () => {
            init();
            log.innerHTML = `> INITIALIZING SENSORS...`;
        }, { once: true });

    </script>
</body>
</html>
