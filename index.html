<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyber Mesh Terminal v1.0</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    
    .input_video { display: none; }
    
    /* Основной канвас с лицом (зеркальный) */
    .output_canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    /* Верхний UI */
    .interface-overlay {
      position: absolute;
      top: 20px; left: 20px;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 5px #fff;
      font-size: 12px;
    }

    /* Нижняя часть: Звук + Терминал */
    .bottom-peripherals {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding-bottom: 10px;
    }

    /* Канвас звуковой дорожки */
    #audio_visualizer {
      width: 80%;
      height: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    /* Окно терминала */
    #terminal-box {
      width: 80%;
      height: 100px;
      background: rgba(0, 10, 0, 0.5);
      border: 1px solid #fff;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse; /* Новые строки сверху */
    }

    .terminal-typer {
      color: #fff;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
      text-shadow: 0 0 5px #fff;
    }

    .terminal-typer::after {
      content: '_';
      animation: blink 1s infinite;
    }

    .lang-status {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>

<body>

  <div id="container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div>> SYS_STATUS: ACTIVE</div>
      <div>> MESH_COLOR: white</div>
      <div id="lip-status">> VOX_STREAM: WAITING</div>
    </div>

    <div class="bottom-peripherals">
      <canvas id="audio_visualizer"></canvas>
      
      <div id="terminal-box">
        <div class="lang-status">LANG: RU/EN</div>
        <p class="terminal-typer" id="terminal-output">Initialize system...</p>
      </div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.getElementsByClassName('input_video')[0];
    const canvasElement = document.getElementsByClassName('output_canvas')[0];
    const canvasCtx = canvasElement.getContext('2d');
    
    const terminalOutput = document.getElementById('terminal-output');
    const lipStatus = document.getElementById('lip-status');

    // --- Настройка Аудио Визуализации (Web Audio API) ---
    const audioCanvas = document.getElementById('audio_visualizer');
    const audioCtx = audioCanvas.getContext('2d');
    let audioAnalyser;
    let dataArray;
    let audioSource;
    let audioContext;

    async function initAudioVisualizer() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioAnalyser = audioContext.createAnalyser();
        audioSource = audioContext.createMediaStreamSource(stream);
        audioSource.connect(audioAnalyser);
        
        audioAnalyser.fftSize = 2048; // Детализация
        const bufferLength = audioAnalyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);
        
        drawWaveform();
      } catch (err) {
        console.error("Ошибка доступа к микрофону для визуализатора:", err);
      }
    }

    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      
      // Настройка размера канваса под CSS
      if (audioCanvas.width !== audioCanvas.clientWidth) {
        audioCanvas.width = audioCanvas.clientWidth;
        audioCanvas.height = audioCanvas.clientHeight;
      }

      audioAnalyser.getByteTimeDomainData(dataArray);

      audioCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Хвост затухания
      audioCtx.fillRect(0, 0, audioCanvas.width, audioCanvas.height);

      audioCtx.lineWidth = 1;
      audioCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; // Белая линия
      audioCtx.beginPath();

      const sliceWidth = audioCanvas.width * 1.0 / dataArray.length;
      let x = 0;

      for (let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * audioCanvas.height / 2;

        if (i === 0) {
          audioCtx.moveTo(x, y);
        } else {
          audioCtx.lineTo(x, y);
        }
        x += sliceWidth;
      }

      audioCtx.lineTo(audioCanvas.width, audioCanvas.height / 2);
      audioCtx.stroke();
    }

    // --- Настройка распознавания речи (RU/EN) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true; // Не останавливаться после одной фразы
      recognition.interimResults = true; // Показывать промежуточные результаты
      
      // Хак для поддержки двух языков: Chrome лучше понимает, если указать один, 
      // но в реальности он часто подхватывает оба, если они похожи акустически, 
      // либо можно переключать. Для простоты ставим RU, EN он часто понимает "бонусом".
      recognition.lang = 'ru-RU'; 

      recognition.onresult = (event) => {
        let interimTranscript = "";
        let finalTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        // Выводим текст в терминал (приоритет конечному результату)
        if (finalTranscript) {
          terminalOutput.innerText = "> " + finalTranscript;
        } else if (interimTranscript) {
          terminalOutput.innerText = ">> " + interimTranscript;
        }
      };

      // Авто-рестарт при остановке
      recognition.onend = () => { recognition.start(); };
      recognition.start();
    } else {
      terminalOutput.innerText = "Speech Recognition not supported in this browser.";
    }

    // --- Обработка видео и Face Mesh ---
    function onResults(results) {
      // Установка размеров основного канваса
      if (canvasElement.width !== videoElement.videoWidth) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
      }

      canvasCtx.save();
      // Фон в ноль (черный)
      canvasCtx.fillStyle = '#000';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

      // Рисуем видео силуэтом (4% непрозрачности)
      canvasCtx.globalAlpha = 0.04;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
          
          // Рисуем сетку БЕЛЫМ (полупрозрачным)
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, 
            {color: 'rgba(255, 255, 255, 0.2)', lineWidth: 0.5});

          // Яркие белые контуры для ключевых черт
          drawConnectors(canvasCtx, landmarks, FACEMESH_FACE_OVAL, {color: 'rgba(255,255,255,0.8)', lineWidth: 1});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#fff', lineWidth: 1.5});
          drawConnectors(canvasCtx, landmarks, FACEMESH_EYEBROWS, {color: 'rgba(255,255,255,0.5)', lineWidth: 1});

          // Анализ активности губ (для UI статуса)
          const topLip = landmarks[13];
          const bottomLip = landmarks[14];
          const lipDistance = Math.abs(topLip.y - bottomLip.y);

          if (lipDistance > 0.015) { // Порог "открытого рта"
            lipStatus.innerText = "> VOX_STREAM: TALKING";
            lipStatus.style.color = "#fff";
            lipStatus.style.textShadow = "0 0 10px #fff";
          } else {
            lipStatus.innerText = "> VOX_STREAM: IDLE";
            lipStatus.style.color = "rgba(255,255,255,0.5)";
            lipStatus.style.textShadow = "none";
          }
        }
      }
      canvasCtx.restore();
    }

    // Инициализация Face Mesh
    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    // Запуск камеры
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    
    camera.start();

    // Запуск аудиовизуализатора после старта
    initAudioVisualizer();

  </script>
</body>
</html>
