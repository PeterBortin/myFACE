<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAUTJA_SYSTEM_OVERRIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: monospace; }
        video { display: none; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; }

        /* Эффект шума и помех (как на скриншоте 1) */
        #glitch-overlay {
            position: absolute; inset: 0; z-index: 25; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 2px);
            opacity: 0.3;
        }

        /* Виньетка и свечение */
        #vignette {
            position: absolute; inset: 0; z-index: 30; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(40, 0, 0, 0.4) 100%);
        }

        /* Контейнер для аудио-волны (Скриншот 5) */
        #audio-wave-container {
            position: absolute; left: 10px; top: 15%; height: 70%; width: 60px;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .wave-bar {
            width: 4px; background: #ff0000; margin: 1px 0;
            box-shadow: 0 0 10px #ff0000; transition: width 0.05s ease;
        }

        #ui-layer {
            position: absolute; inset: 0; z-index: 50; pointer-events: none;
            border: 2px solid rgba(255, 0, 0, 0.2); margin: 10px;
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    
    <div id="glitch-overlay"></div>
    <div id="vignette"></div>
    <div id="ui-layer">
        <div id="top-telemetry" class="absolute top-4 right-10 text-red-600 text-xl tracking-tighter"></div>
    </div>

    <div id="audio-wave-container"></div>

    <button id="ignite" class="absolute inset-0 z-[300] bg-black text-red-600 flex flex-col items-center justify-center">
        <div class="mb-6 animate-pulse text-4xl font-bold tracking-[1em]">SEARCHING...</div>
        <div class="text-[10px] opacity-60">LINKING_YAUTJA_GAUNTLET_V2.6</div>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const waveContainer = document.getElementById('audio-wave-container');
        const telemetry = document.getElementById('top-telemetry');

        let model, audioCtx, analyser, dataArray;
        const waveBars = [];
        const barCount = 50;

        // Создаем бары для симметричной волны (Скриншот 5)
        for(let i=0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            waveContainer.appendChild(bar);
            waveBars.push(bar);
        }

        // Эмуляция глифов Хищника (на основе ваших картинок)
        const yautjaSymbols = ["ᚦ", "ᛗ", "ᛖ", "ᛟ", "ᚱ", "ᛚ", "ᛒ", "ᚦ", "ᛘ", "ᛞ"];

        async function init() {
            document.getElementById('ignite').remove();
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: true
                });
                video.srcObject = stream;

                // Настройка звука
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                model = await cocoSsd.load();
                draw();
            } catch (err) {
                console.error("Access denied", err);
            }
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // --- ТЕРМАЛЬНЫЙ ФИЛЬТР (Скриншот 6) ---
            ctx.save();
            // Цвета: Синий (холод), Зеленый (средне), Красный/Желтый (жар)
            ctx.filter = "contrast(1.8) brightness(1.1) saturate(2.5) hue-rotate(140deg)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            updateVisuals();
            renderDetections();
            requestAnimationFrame(draw);
        }

        function updateVisuals() {
            // Обновление звуковой волны (Симметрия)
            analyser.getByteFrequencyData(dataArray);
            waveBars.forEach((bar, i) => {
                const val = dataArray[i % dataArray.length];
                const width = Math.max(2, (val / 255) * 50);
                bar.style.width = `${width}px`;
                // Цвет меняется от красного к желтому при пиках
                bar.style.background = val > 200 ? '#ffff00' : '#ff0000';
            });

            // Случайные глифы в углу
            if(Math.random() > 0.9) {
                telemetry.innerText = Array.from({length: 6}, () => yautjaSymbols[Math.floor(Math.random()*yautjaSymbols.length)]).join(' ');
            }
        }

        async function renderDetections() {
            const predictions = await model.detect(video);
            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            predictions.forEach(p => {
                if (p.score < 0.6) return;
                const [x, y, w, h] = p.bbox.map(v => v * (sx > sy ? sx : sy));
                const cx = x + w/2;
                const cy = y + h/2;

                // ПРИЦЕЛ (Три красные точки - Скриншот 2)
                ctx.fillStyle = "#ff0000";
                ctx.shadowBlur = 20;
                ctx.shadowColor = "red";
                const r = 18;
                [[0, -r], [-r, r], [r, r]].forEach(offset => {
                    ctx.beginPath();
                    ctx.arc(cx + offset[0], cy + offset[1], 5, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                // РАМКА ЗАХВАТА (Скриншот 2 - красные контуры)
                ctx.strokeStyle = "rgba(255, 0, 0, 0.8)";
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(x, y, w, h);
                ctx.setLineDash([]);

                // ТЕКСТ ОБЪЕКТА ГЛИФАМИ
                ctx.font = "20px monospace";
                ctx.fillStyle = "#ff0000";
                ctx.fillText(yautjaSymbols[Math.floor(Math.random()*yautjaSymbols.length)], x, y - 10);
            });
        }

        document.getElementById('ignite').onclick = init;
    </script>
</body>
</html>
