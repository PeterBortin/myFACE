<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADVANCED AI SURVEILLANCE</title>
    
    <!-- Основной AI движок -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- Детектор объектов (авто, животные, предметы) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- Детектор лиц, пола, возраста -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root { --green: #00ff41; --blue: #0084ff; --white: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: var(--green);
        }
        button {
            background: rgba(0, 255, 65, 0.1); border: 1px solid var(--green);
            color: var(--green); padding: 20px 40px; font-size: 1rem; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); text-transform: uppercase;
        }
        #log { font-size: 10px; margin-top: 20px; color: #666; width: 80%; text-align: left; }
        .hud { position: absolute; z-index: 10; color: var(--green); font-size: 12px; pointer-events: none; padding: 20px; width: 100%; box-sizing: border-box; }
        .bottom-ui { bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 20px; margin-bottom: 10px;">MULTIMODAL AI ANALYZER</div>
    <button id="start-btn">ИНДИВИДУАЛЬНЫЙ ДОСТУП</button>
    <div id="log">LOADER: ОЖИДАНИЕ...</div>
</div>

<div id="container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div class="hud" style="top:0">
        <div>CORE: v4.0.2 [STABLE]</div>
        <div id="distance-info">DEPTH_SCAN: ACTIVE</div>
    </div>
    <div class="hud bottom-ui">
        <span>SENSOR: ON</span>
        <span>FACE_RECOGNITION: ENABLED</span>
        <span style="color:red">● REC</span>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const log = document.getElementById('log');

    let objModel = null;
    const FOCAL_LENGTH = 800; // Примерное фокусное расстояние для расчета дистанции

    function writeLog(msg) { log.innerHTML += `<br>> ${msg}`; }

    async function initAI() {
        startBtn.style.display = 'none';
        try {
            writeLog("ЗАПРОС КАМЕРЫ...");
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } },
                audio: false
            });
            video.srcObject = stream;
            await new Promise(r => video.onloadedmetadata = () => video.play().then(r));

            writeLog("ЗАГРУЗКА COCO-SSD (ОБЪЕКТЫ)...");
            objModel = await cocoSsd.load();

            writeLog("ЗАГРУЗКА FACE-API (ЛИЦА/ПОЛ/ВОЗРАСТ)...");
            // Загружаем веса моделей из CDN
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceAgeGenderNet.loadFromUri(MODEL_URL);

            writeLog("СИСТЕМА ГОТОВА.");
            setTimeout(() => { overlay.style.display = 'none'; render(); }, 800);
        } catch (e) {
            writeLog("КРИТИЧЕСКАЯ ОШИБКА: " + e.message);
        }
    }

    async function render() {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Детекция общих объектов
        const objects = await objModel.detect(video);
        
        // 2. Детекция лиц (одновременно)
        const faces = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                                   .withFaceLandmarks()
                                   .withAgeAndGender();

        objects.forEach(obj => {
            const [x, y, w, h] = obj.bbox;
            const label = obj.class;
            
            // Расчет примерного расстояния (D = (W_real * Focal) / W_pixel)
            // Допустим, средняя ширина человека 0.5м, машины 2м
            let realWidth = 0.5;
            if (label === 'car' || label === 'truck') realWidth = 2.0;
            const distance = (realWidth * FOCAL_LENGTH) / w;

            // Стилизация под ваши фото
            ctx.strokeStyle = label === 'person' ? '#00ff41' : '#0084ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);

            // Тэг объекта
            ctx.fillStyle = label === 'person' ? '#00ff41' : '#0084ff';
            ctx.font = '12px monospace';
            
            let title = "ПРЕДМЕТ: " + label.toUpperCase();
            if (label === 'person') title = "ЧЕЛОВЕК (TARGET)";
            if (['car', 'bus', 'truck', 'motorcycle'].includes(label)) title = "ТРАНСПОРТ";
            if (['cat', 'dog', 'bird'].includes(label)) title = "БИО-ОБЪЕКТ";

            ctx.fillText(`${title}`, x, y > 20 ? y - 25 : 20);
            ctx.fillText(`DIST: ${distance.toFixed(1)}m | CONF: ${Math.round(obj.score*100)}%`, x, y > 20 ? y - 10 : 35);

            // Оценка габаритов (объем)
            if (label !== 'person') {
                const volume = (w * h * ((w+h)/2) * 0.0001).toFixed(2);
                ctx.fillStyle = '#fff';
                ctx.fillText(`EST_VOLUME: ${volume} units`, x, y + h + 15);
            }

            drawBrackets(x, y, w, h);
        });

        // Отрисовка данных лица (тип: пол, возраст)
        faces.forEach(f => {
            const { x, y, width, height } = f.detection.box;
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(x, y, width, height);
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            ctx.fillText(`GENDER: ${f.gender.toUpperCase()}`, x, y + height + 15);
            ctx.fillText(`AGE: ~${Math.round(f.age)}`, x, y + height + 30);
            ctx.fillText(`HEIGHT_EST: ~${(f.detection.box.height * 0.6).toFixed(0)}cm`, x, y + height + 45);
        });

        requestAnimationFrame(render);
    }

    function drawBrackets(x, y, w, h) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        const s = 15;
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }

    startBtn.addEventListener('click', initAI);
</script>
</body>
</html>
