<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v10.0 | ULTIMATE AI</title>
    
    <!-- Ядро, WASM и Face-API -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root { 
            --target: #ffff00; --hostile: #ff0000; --bio: #ff00ff; --obj: #ffffff; --plant: #00ff41;
            --face: #00d4ff; --bg: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff41; }
        
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #viewport { position: relative; flex: 1; overflow: hidden; cursor: crosshair; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.35) contrast(1.4) grayscale(0.1); 
            z-index: 1; 
        }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }

        #terminal { 
            height: 160px; background: var(--bg); border-top: 2px solid #1a1a1a; 
            padding: 15px; box-sizing: border-box; overflow: hidden; font-size: 12px;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }
        .term-row { margin-bottom: 4px; opacity: 0.9; }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        button {
            background: none; border: 1px solid #00ff41; color: #00ff41;
            padding: 15px 40px; cursor: pointer; letter-spacing: 3px; font-weight: bold;
        }
        .scan-line { position: absolute; width: 100%; height: 1px; background: rgba(0, 255, 65, 0.3); z-index: 6; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div id="overlay">
    <div id="status-msg" style="margin-bottom:20px; font-size:10px;">SYSTEM_V10: WAITING_FOR_KERNEL...</div>
    <button id="boot-btn" style="display:none" onclick="initVision()">BOOT SYSTEM</button>
</div>

<div id="container">
    <div id="viewport" onclick="resetLock()">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
        <div class="scan-line"></div>
    </div>
    <div id="terminal">
        <div id="term-content"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termContent = document.getElementById('term-content');
    const statusMsg = document.getElementById('status-msg');
    const bootBtn = document.getElementById('boot-btn');
    
    let model = null;
    let lockedObj = null;
    let predictions = [];
    let faces = [];
    let audioCtx = null;

    const COLORS = {
        'person': '#ffff00',
        'car': '#ff0000', 'truck': '#ff0000', 'bus': '#ff0000', 'motorcycle': '#ff0000',
        'dog': '#ff00ff', 'cat': '#ff00ff', 'bird': '#ff00ff',
        'potted plant': '#00ff41',
        'default': '#ffffff'
    };

    // Звуковой движок (чистый код)
    function playSound(freq, type = 'sine', duration = 0.1) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    async function loadModels() {
        try {
            statusMsg.innerText = "LOADING OBJECT_DETECTOR...";
            model = await cocoSsd.load();
            statusMsg.innerText = "LOADING FACE_AI...";
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
            statusMsg.innerText = "ALL MODULES READY.";
            bootBtn.style.display = "block";
        } catch (e) {
            statusMsg.innerText = "ERROR: " + e.message;
        }
    }

    async function initVision() {
        try {
            await tf.setBackend('wasm');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            await video.play();
            
            document.getElementById('overlay').style.display = 'none';
            writeTerm("SYSTEM ONLINE. NEURAL_V10 ACTIVATED.");
            render();
        } catch (e) {
            alert("INIT_ERROR: " + e.message);
        }
    }

    viewport.addEventListener('mousedown', (e) => {
        const rect = video.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

        lockedObj = predictions.find(p => {
            const [x, y, w, h] = p.bbox;
            return clickX >= x && clickX <= x + w && clickY >= y && clickY <= y + h;
        });

        if (lockedObj) {
            e.stopPropagation();
            playSound(880, 'square', 0.15); // Приятный бип захвата
            startDecrypt(lockedObj);
        }
    });

    function resetLock() {
        if (lockedObj) playSound(220, 'sine', 0.1);
        lockedObj = null;
        termContent.innerHTML = "";
        writeTerm("SEARCHING... SCAN_MODE: BROAD");
    }

    function writeTerm(text) {
        const line = document.createElement('div');
        line.className = 'term-row';
        line.innerText = `> ${text}`;
        termContent.prepend(line);
        if (termContent.childNodes.length > 7) termContent.lastChild.remove();
    }

    function startDecrypt(obj) {
        termContent.innerHTML = "";
        const dist = ((950 * 0.5) / obj.bbox[2]).toFixed(2);
        const lines = [
            `LOCK_ESTABLISHED: ${obj.class.toUpperCase()}`,
            `TELEMETRY: RANGE_${dist}m`,
            `SIG_ANALYSIS: ${(obj.score * 100).toFixed(1)}% MATCH`,
            `DECODING_ENCRYPTION...`,
            `DATA: ${Math.random().toString(16).substr(2, 8).toUpperCase()}`,
            `STATUS: TARGET_FROZEN`
        ];
        lines.forEach((l, i) => setTimeout(() => writeTerm(l), i * 120));
    }

    async function render() {
        predictions = await model.detect(video);
        
        // Лица проверяем чуть реже или через tiny detector для скорости
        faces = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Лица (Голубой)
        faces.forEach(f => {
            const { x, y, width, height } = f.box;
            ctx.strokeStyle = "var(--face)";
            ctx.setLineDash([2, 2]);
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = "var(--face)";
            ctx.font = "10px Courier New";
            ctx.fillText("FACE_SIGNATURE", x, y - 5);
        });

        // Объекты (до 15 для глубины обнаружения)
        const activeTargets = predictions.slice(0, 15);

        activeTargets.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            const color = COLORS[label] || COLORS['default'];

            ctx.save();
            const isLocked = lockedObj && Math.abs(lockedObj.bbox[0] - x) < 50;
            
            ctx.strokeStyle = isLocked ? "#00ff41" : color;
            ctx.lineWidth = isLocked ? 4 : 2;
            ctx.setLineDash(isLocked ? [] : [10, 5]);
            
            ctx.shadowColor = "black";
            ctx.shadowBlur = 10;
            ctx.strokeRect(x, y, w, h);
            
            // Тайтл и Метрика
            const dist = ((950 * 0.5) / w).toFixed(1);
            ctx.fillStyle = isLocked ? "#00ff41" : color;
            ctx.font = "bold 13px Courier New";
            ctx.fillText(`${label.toUpperCase()} [${dist}m]`, x, y - 12);

            // Угловые скобки
            ctx.setLineDash([]);
            drawCorners(x, y, w, h, isLocked ? "#00ff41" : color, isLocked ? 30 : 15);
            
            // Специфические элементы
            ctx.strokeStyle = "#ff6600";
            ctx.setLineDash([3, 3]);
            if (label === 'person') ctx.strokeRect(x + w*0.3, y + h*0.05, w*0.4, h*0.15);
            if (['car','bus','truck'].includes(label)) {
                ctx.strokeRect(x + w*0.1, y + h*0.75, w*0.2, w*0.2);
                ctx.strokeRect(x + w*0.7, y + h*0.75, w*0.2, w*0.2);
            }

            ctx.restore();
        });

        requestAnimationFrame(render);
    }

    function drawCorners(x, y, w, h, color, s) {
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();
    }

    loadModels();
</script>
</body>
</html>
