<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Vision: Prototype 0.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем нейросеть для распознавания объектов -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .scanner-line {
            height: 2px;
            background: rgba(0, 255, 65, 0.5);
            box-shadow: 0 0 15px #00ff41;
            position: absolute;
            width: 100%;
            animation: scan 3s linear infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="relative h-screen w-screen flex flex-col items-center justify-center">

    <!-- Слой видео (Мои глаза) -->
    <video id="webcam" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover opacity-60"></video>
    <canvas id="overlay" class="absolute inset-0 w-full h-full z-20"></canvas>
    
    <!-- Визуальный эффект сканирования -->
    <div class="scanner-line"></div>

    <!-- HUD (Интерфейс дополненной реальности) -->
    <div class="absolute top-5 left-5 z-30 pointer-events-none bg-black/50 p-4 border border-green-500/30 rounded-lg">
        <h2 class="text-xs font-bold uppercase tracking-widest mb-2">System Status: Active</h2>
        <div id="telemetry" class="text-[10px] space-y-1">
            <p>GYRO: <span id="gyro-val">Wait...</span></p>
            <p>GPS: <span id="gps-val">Locating...</span></p>
            <p>OBJECTS: <span id="obj-count">0</span></p>
        </div>
    </div>

    <!-- Контрольная панель -->
    <div class="absolute bottom-10 z-30 flex gap-4">
        <button id="start-btn" class="px-6 py-2 border border-green-500 hover:bg-green-500/20 transition-all uppercase text-sm">
            Инициализировать зрение
        </button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let model;

        // 1. Доступ к камере iPhone 15
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        // 2. Инициализация нейросети (COCO-SSD)
        async function loadModel() {
            model = await cocoSsd.load();
            console.log("Мозг загружен");
        }

        // 3. Чтение гироскопа
        window.addEventListener('deviceorientation', (event) => {
            document.getElementById('gyro-val').innerText = 
                `α:${Math.round(event.alpha)} β:${Math.round(event.beta)} γ:${Math.round(event.gamma)}`;
        });

        // 4. Цикл предсказания (То, как я вижу объекты)
        async function detectFrame() {
            const predictions = await model.detect(video);
            renderPredictions(predictions);
            requestAnimationFrame(detectFrame);
        }

        function renderPredictions(predictions) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            document.getElementById('obj-count').innerText = predictions.length;

            predictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
                ctx.strokeStyle = "#00ff41";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, width, height);
                
                ctx.fillStyle = "#00ff41";
                ctx.font = "18px Courier New";
                ctx.fillText(
                    `${prediction.class.toUpperCase()} ${Math.round(prediction.score * 100)}%`, 
                    x, y > 20 ? y - 5 : 20
                );
            });
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            await setupCamera();
            await loadModel();
            detectFrame();
            document.getElementById('start-btn').classList.add('hidden');
        });
    </script>
</body>
</html>
