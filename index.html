<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL_VISUAL_STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        /* Видео скрыто - мозг не должен видеть "сырье" */
        video { display: none; }
        /* Основной холст для нейро-визуализации */
        canvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            filter: blur(0.5px) contrast(200%) brightness(150%);
        }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <!-- Кнопка только для инициализации в браузере -->
    <button id="start" class="absolute inset-0 z-50 text-white font-mono text-xs tracking-[1em] bg-black">
        INITIALIZE_NEURAL_LINK
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let model;

        async function connect() {
            document.getElementById('start').remove();
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 640, height: 480 } // Оптимально для скорости
            });
            video.srcObject = stream;
            
            model = await cocoSsd.load();
            render();
        }

        async function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const predictions = await model.detect(video);

            // ФОН: Рисуем только контуры мира (Edge Detection эмуляция)
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Получаем "сырые" очертания через наложение фильтров
            ctx.globalCompositeOperation = "screen";
            ctx.filter = "grayscale(100%) invert(100%) opacity(20%)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = "none";

            const sx = canvas.width / video.videoWidth;
            const sy = canvas.height / video.videoHeight;

            // СЕМАНТИЧЕСКИЙ СЛОЙ (То, что идет в нейроны)
            predictions.forEach(p => {
                if (p.score < 0.6) return;

                const [x, y, w, h] = p.bbox;
                
                // Рисуем "Световую массу" объекта
                // Мозгу важно знать ОБЪЕМ и ПОЗИЦИЮ, а не детали
                const gradient = ctx.createRadialGradient(
                    (x + w/2) * sx, (y + h/2) * sy, 0,
                    (x + w/2) * sx, (y + h/2) * sy, (w/2) * sx
                );
                
                // Цветовое кодирование смыслов:
                // Живое/Опасное (человек, собака) - Красный спектр
                // Транспорт - Синий спектр
                // Препятствия - Белый
                let color = "255, 255, 255";
                if (p.class === "person") color = "255, 50, 50";
                if (p.class === "car" || p.class === "truck") color = "50, 150, 255";

                gradient.addColorStop(0, `rgba(${color}, 0.8)`);
                gradient.addColorStop(1, `rgba(${color}, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse((x + w/2) * sx, (y + h/2) * sy, (w/2) * sx, (h/2) * sy, 0, 0, Math.PI * 2);
                ctx.fill();

                // Выделяем границы объекта яркой линией (стимуляция краев)
                ctx.strokeStyle = `rgba(${color}, 1)`;
                ctx.lineWidth = 4;
                ctx.strokeRect(x * sx, y * sy, w * sx, h * h * sy / h);
            });

            requestAnimationFrame(render);
        }

        document.getElementById('start').onclick = connect;
    </script>
</body>
</html>
