<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyber Mesh Interface</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .input_video { display: none; }
    .output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }

    .interface-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px;
      box-sizing: border-box;
      color: #ffffff;
      text-shadow: 0 0 8px #fff;
    }

    #subtitle-box {
      align-self: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
      border: 1px solid #ffffff;
      font-size: 24px;
      min-height: 40px;
      max-width: 80%;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .active-text { opacity: 1 !important; }
    .status-bar { font-size: 14px; color: #fff; }
  </style>
</head>

<body>
  <div id="container">
    <video class="input_video"></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div class="status-bar">
        <div>> CORE_INIT: SUCCESS</div>
        <div>> AUDIO_VOX: LISTENING...</div>
        <div id="lip-status">> MOUTH_CLOSED</div>
      </div>
      <div id="subtitle-box">...</div>
      <div class="status-bar" style="text-align: right;">SECURE_CONNECTION // 0xAF44</div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.getElementsByClassName('input_video')[0];
    const canvasElement = document.getElementsByClassName('output_canvas')[0];
    const canvasCtx = canvasElement.getContext('2d');
    const subtitleBox = document.getElementById('subtitle-box');
    const lipStatus = document.getElementById('lip-status');

    // --- Настройка распознавания речи ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let finalTranscript = "";
    
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU'; // Или 'en-US'

      recognition.onresult = (event) => {
        let interimTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript = event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }
        subtitleBox.innerText = interimTranscript || finalTranscript;
      };

      recognition.start();
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.save();
      // Очищаем в черный
      canvasCtx.fillStyle = '#000';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

      // Рисуем видео с очень низкой прозрачностью (4%), чтобы был виден только силуэт
      canvasCtx.globalAlpha = 0.04;
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
          
          // Рисуем сетку БЕЛЫМ цветом
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, 
            {color: 'rgba(255, 255, 255, 0.3)', lineWidth: 0.5});

          // Контуры глаз и губ
          drawConnectors(canvasCtx, landmarks, FACEMESH_FACE_OVAL, {color: '#FFFFFF', lineWidth: 1});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#FFFFFF', lineWidth: 2});

          // --- АНАЛИЗ ГУБ ---
          // Точка 13 (верхняя губа) и 14 (нижняя губа)
          const topLip = landmarks[13];
          const bottomLip = landmarks[14];
          const lipDistance = Math.abs(topLip.y - bottomLip.y);

          // Если расстояние между губами больше порога, считаем, что человек говорит
          if (lipDistance > 0.015) { 
            subtitleBox.classList.add('active-text');
            lipStatus.innerText = "> MOUTH_OPEN / ANALYZING...";
            lipStatus.style.color = "#ff0000";
          } else {
            // Небольшая задержка перед исчезновением текста
            setTimeout(() => {
                if (lipDistance <= 0.015) {
                    subtitleBox.classList.remove('active-text');
                    lipStatus.innerText = "> MOUTH_CLOSED";
                    lipStatus.style.color = "#fff";
                }
            }, 1000);
          }
        }
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    
    camera.start();
  </script>
</body>
</html>
