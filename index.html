<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Face Scanner v6.0 - Fixed</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    #overlay-start {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 100; display: flex;
      flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
    }
    #container { position: relative; width: 100vw; height: 100vh; }
    .input_video { display: none; }
    .output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    
    .controls { position: absolute; top: 20px; right: 20px; z-index: 110; display: flex; gap: 10px; }
    button { background: rgba(0,0,0,0.7); border: 1px solid #0f0; color: #0f0; padding: 8px 12px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
    button.active { background: #0f0; color: #000; }

    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 10;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 20px 0;
      display: flex; flex-direction: column; align-items: center;
    }
    #live-speech-box { font-size: 20px; font-weight: bold; color: #0f0; margin-bottom: 10px; height: 24px; text-shadow: 0 0 10px #0f0; }
    #audio_visualizer { width: 90%; height: 80px; border-bottom: 1px solid rgba(0,255,0,0.3); }
  </style>
</head>
<body>

  <div id="overlay-start" onclick="initSystem()">
    <h1 style="border: 1px solid #0f0; padding: 20px;">INITIALIZE SYSTEM</h1>
  </div>

  <div class="controls">
    <button id="btn-face">Texture: OFF</button>
    <button id="switch-camera">Switch Cam</button>
  </div>

  <div id="container">
    <video class="input_video" playsinline></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="bottom-peripherals">
      <div id="live-speech-box">WAITING_FOR_VOICE...</div>
      <canvas id="audio_visualizer"></canvas>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const btnFace = document.getElementById('btn-face');

    let isFaceMode = false;
    let textureCanvas = document.createElement('canvas');
    let textureCtx = textureCanvas.getContext('2d');
    let textureLandmarks = null;
    let currentFacingMode = 'user';

    // --- ЗВУКОВОЙ ЭКВАЛАЙЗЕР ---
    let audioCtx, analyser, dataArray;
    async function initAudio() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256; 
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawVisualizer();
      } catch(e) { console.error("Audio init failed", e); }
    }

    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);
      analyser.getByteFrequencyData(dataArray);
      
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);
      
      const barWidth = (audioCanvas.width / dataArray.length) * 2.5;
      let x = 0;
      for(let i = 0; i < dataArray.length; i++) {
        const barHeight = (dataArray[i] / 255) * audioCanvas.height;
        aCtx.fillStyle = `rgb(0, ${dataArray[i] + 100}, 0)`;
        aCtx.fillRect(x, audioCanvas.height - barHeight, barWidth, barHeight);
        x += barWidth + 1;
      }
    }

    // --- РАСПОЗНАВАНИЕ РЕЧИ ---
    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onresult = (event) => {
          const result = event.results[event.results.length - 1];
          liveSpeechBox.innerText = result[0].transcript.toUpperCase();
        };

        recognition.onend = () => recognition.start(); // Автоперезапуск
        recognition.start();
      }
    }

    // --- ТЕКСТУРЫ (TRIANGLE MAPPING) ---
    function drawTriangle(ctx, img, s1, s2, s3, d1, d2, d3) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(d1.x, d1.y);
      ctx.lineTo(d2.x, d2.y);
      ctx.lineTo(d3.x, d3.y);
      ctx.closePath();
      ctx.clip();

      const det = (s1.x * (s2.y - s3.y) + s2.x * (s3.y - s1.y) + s3.x * (s1.y - s2.y));
      if (Math.abs(det) < 0.1) { ctx.restore(); return; }

      ctx.transform(
        (d1.x * (s2.y - s3.y) + d2.x * (s3.y - s1.y) + d3.x * (s1.y - s2.y)) / det,
        (d1.y * (s2.y - s3.y) + d2.y * (s3.y - s1.y) + d3.y * (s1.y - s2.y)) / det,
        (s1.x * (d2.x - d3.x) + s2.x * (d3.x - d1.x) + s3.x * (d1.x - d2.x)) / det,
        (s1.x * (d2.y - d3.y) + s2.x * (d3.y - d1.y) + s3.x * (d1.y - d2.y)) / det,
        (s1.x * (s2.y * d3.x - s3.y * d2.x) + s2.x * (s3.y * d1.x - s1.y * d3.x) + s3.x * (s1.y * d2.x - s2.y * d1.x)) / det,
        (s1.x * (s2.y * d3.y - s3.y * d2.y) + s2.x * (s3.y * d1.y - s1.y * d3.y) + s3.x * (s1.y * d2.y - s2.y * d1.y)) / det
      );
      ctx.drawImage(img, 0, 0);
      ctx.restore();
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        
        // Определяем цвет сетки
        const eyeDist = Math.abs(landmarks[159].y - landmarks[145].y);
        const lipDist = Math.abs(landmarks[13].y - landmarks[14].y);
        let color = '#fff';
        if (eyeDist < 0.01) color = '#f00';
        else if (lipDist > 0.02) color = '#0f0';

        if (isFaceMode && textureLandmarks) {
          for (const triangle of FACEMESH_TESSELATION) {
            const s = triangle.map(i => ({x: textureLandmarks[i].x * canvasElement.width, y: textureLandmarks[i].y * canvasElement.height}));
            const d = triangle.map(i => ({x: landmarks[i].x * canvasElement.width, y: landmarks[i].y * canvasElement.height}));
            drawTriangle(canvasCtx, textureCanvas, s[0], s[1], s[2], d[0], d[1], d[2]);
          }
        }

        // Отрисовка сетки
        canvasCtx.strokeStyle = color;
        canvasCtx.lineWidth = 0.5;
        for (const [a, b] of FACEMESH_TESSELATION) {
          canvasCtx.beginPath();
          canvasCtx.moveTo(landmarks[a].x * canvasElement.width, landmarks[a].y * canvasElement.height);
          canvasCtx.lineTo(landmarks[b].x * canvasElement.width, landmarks[b].y * canvasElement.height);
          canvasCtx.stroke();
        }
        window.lastLandmarks = landmarks;
      }
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    window.initSystem = async () => {
      document.getElementById('overlay-start').remove();
      await initAudio();
      initSpeech();
      const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 1280, height: 720
      });
      camera.start();
    };

    btnFace.onclick = () => {
      if (!isFaceMode && window.lastLandmarks) {
        textureCanvas.width = videoElement.videoWidth;
        textureCanvas.height = videoElement.videoHeight;
        textureCtx.drawImage(videoElement, 0, 0);
        textureLandmarks = JSON.parse(JSON.stringify(window.lastLandmarks));
        isFaceMode = true;
        btnFace.innerText = "Texture: ON";
        btnFace.classList.add('active');
      } else {
        isFaceMode = false;
        btnFace.innerText = "Texture: OFF";
        btnFace.classList.remove('active');
      }
    };
  </script>
</body>
</html>
