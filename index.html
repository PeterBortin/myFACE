<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Vision HUD</title>
    <style>
        :root {
            --thermal-blue: #000033;
            --thermal-green: #00ff00;
            --thermal-bright-blue: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            cursor: none; /* Скрываем стандартный курсор */
        }

        /* Контейнер тепловизора */
        .thermal-env {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--thermal-blue);
            filter: contrast(1.3) brightness(0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Силуэты людей (тестовые цели) */
        .target {
            position: absolute;
            width: 60px;
            height: 150px;
            background: var(--thermal-green);
            border-radius: 30px 30px 10px 10px;
            filter: blur(4px);
            box-shadow: 0 0 30px var(--thermal-green), 0 0 60px rgba(0, 255, 0, 0.4);
            animation: moveAround 15s infinite alternate ease-in-out;
        }

        /* HUD: Текстовая информация */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 30px;
            color: var(--thermal-green);
            pointer-events: none;
            z-index: 10;
        }

        .rec {
            font-size: 20px;
            animation: blink 1s steps(2, start) infinite;
        }

        /* Прицел */
        #reticle {
            position: fixed;
            width: 160px;
            height: 160px;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        /* Анимация пульсации всего прицела */
        .reticle-svg {
            width: 100%;
            height: 100%;
            animation: pulse 2s infinite ease-in-out;
        }

        /* Анимация дрожания центра (эффект рук) */
        .crosshair-center {
            animation: jitter 0.15s infinite;
        }

        /* Эффект шума и линий сканирования */
        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                radial-gradient(circle, transparent 30%, rgba(0, 0, 0, 0.5) 100%);
            background-size: 100% 4px, cover;
            z-index: 5;
            opacity: 0.4;
        }

        /* Ключевые кадры анимаций */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes jitter {
            0% { transform: translate(0,0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(0,0); }
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        @keyframes moveAround {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(200px, 50px) scale(1.1); }
        }
    </style>
</head>
<body>

<div class="thermal-env">
    <!-- Силуэты (для примера) -->
    <div class="target" style="top: 20%; left: 20%;"></div>
    <div class="target" style="top: 60%; left: 75%; animation-delay: -5s;"></div>
    
    <!-- Слой помех -->
    <div class="overlay"></div>

    <!-- Интерфейс -->
    <div class="hud">
        <div class="rec">● LIVE 00:42:15</div>
        <div style="position: absolute; bottom: 30px; left: 30px;">MODE: THERMAL GAIN</div>
        <div style="position: absolute; bottom: 30px; right: 30px;">ZOOM x8.0</div>
    </div>

    <!-- Кастомный прицел -->
    <div id="reticle">
        <svg class="reticle-svg" viewBox="0 0 100 100">
            <!-- Углы -->
            <path d="M 25 10 H 10 V 25" fill="none" stroke="#00ff00" stroke-width="1.5" />
            <path d="M 75 10 H 90 V 25" fill="none" stroke="#00ff00" stroke-width="1.5" />
            <path d="M 25 90 H 10 V 75" fill="none" stroke="#00ff00" stroke-width="1.5" />
            <path d="M 75 90 H 90 V 75" fill="none" stroke="#00ff00" stroke-width="1.5" />
            
            <!-- Центральная часть -->
            <g class="crosshair-center">
                <circle cx="50" cy="50" r="1.5" fill="#00ff00" />
                <line x1="50" y1="35" x2="50" y2="42" stroke="#00ff00" stroke-width="0.8" />
                <line x1="50" y1="58" x2="50" y2="65" stroke="#00ff00" stroke-width="0.8" />
                <line x1="35" y1="50" x2="42" y2="50" stroke="#00ff00" stroke-width="0.8" />
                <line x1="58" y1="50" x2="65" y2="50" stroke="#00ff00" stroke-width="0.8" />
            </g>
            
            <!-- Декоративные риски -->
            <line x1="10" y1="50" x2="20" y2="50" stroke="#00ff00" stroke-width="0.5" opacity="0.5" />
            <line x1="80" y1="50" x2="90" y2="50" stroke="#00ff00" stroke-width="0.5" opacity="0.5" />
        </svg>
    </div>
</div>

<script>
    const reticle = document.getElementById('reticle');

    // Движение прицела за мышкой
    document.addEventListener('mousemove', (e) => {
        // Используем requestAnimationFrame для идеальной плавности
        requestAnimationFrame(() => {
            reticle.style.left = e.clientX + 'px';
            reticle.style.top = e.clientY + 'px';
        });
    });

    // Эффект "помех" при клике
    document.addEventListener('mousedown', () => {
        document.querySelector('.thermal-env').style.filter = 'contrast(2) brightness(1.5) hue-rotate(90deg)';
    });

    document.addEventListener('mouseup', () => {
        document.querySelector('.thermal-env').style.filter = 'contrast(1.3) brightness(0.8)';
    });
</script>

</body>
</html>
