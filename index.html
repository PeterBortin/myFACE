<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION_OS v8.2 | CORE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root {
            --accent: #00ff9d;
            --bg: #0a0a0a;
            --panel: rgba(0, 255, 157, 0.05);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: var(--accent); }
        
        #viewport { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(0.8) contrast(1.2); }
        canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

        /* HUD */
        #ui-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 10px; border-left: 4px solid var(--accent); }
        
        #terminal { 
            height: 150px; background: rgba(0, 10, 5, 0.8); 
            border-top: 1px solid var(--accent); padding: 15px; 
            overflow-y: hidden; font-size: 13px; pointer-events: auto;
        }

        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(0,255,157,0.1); padding-bottom: 2px; }

        #boot-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .boot-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 15px 40px; font-size: 18px; cursor: pointer; letter-spacing: 3px; transition: 0.3s; }
        .boot-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div style="font-size: 24px; margin-bottom: 20px;">SYSTEM: VISION_OS v8.2</div>
    <button class="boot-btn" onclick="startApp()">INITIALIZE SENSORS</button>
</div>

<div id="viewport">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui-layer">
        <div class="header">
            <div>STATUS: <span id="sys-status">STANDBY</span></div>
            <div>DB_ENTRIES: <span id="db-count">0</span></div>
        </div>
        
        <div id="terminal">
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('log');
    
    let model = null;
    let localDB = JSON.parse(localStorage.getItem('vision_db_v8')) || {};

    // --- СИСТЕМА ЛОКАЛЬНОЙ БАЗЫ ---
    function updateDatabase(label) {
        if (!localDB[label]) {
            localDB[label] = { count: 1, first_seen: new Date().toLocaleString() };
            writeLog(`NEW ENTITY DISCOVERED: ${label.toUpperCase()}`, "#fff");
        } else {
            localDB[label].count++;
        }
        localStorage.setItem('vision_db_v8', JSON.stringify(localDB));
        document.getElementById('db-count').innerText = Object.keys(localDB).length;
    }

    function writeLog(text, color = "var(--accent)") {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.style.color = color;
        div.innerText = `> ${text}`;
        logEl.prepend(div);
        if (logEl.childNodes.length > 8) logEl.lastChild.remove();
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    async function startApp() {
        writeLog("LOADING NEURAL NETWORK...");
        try {
            model = await cocoSsd.load();
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('sys-status').innerText = "ACTIVE";
                document.getElementById('db-count').innerText = Object.keys(localDB).length;
                detectFrame();
            };
        } catch (e) {
            alert("CAMERA ERROR: " + e.message);
        }
    }

    // --- ЦИКЛ ОБНАРУЖЕНИЯ ---
    async function detectFrame() {
        const predictions = await model.detect(video);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            
            // Если уверенность выше 66%, обновляем базу
            if (p.score > 0.66) updateDatabase(p.class);

            // Визуализация в стиле 8-й версии (Белые рамки с уголками)
            drawUI(x, y, w, h, p.class, p.score);
        });

        requestAnimationFrame(detectFrame);
    }

    function drawUI(x, y, w, h, label, score) {
        // Основная рамка (Пунктир)
        ctx.strokeStyle = "white";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);

        // Уголки (Сплошные)
        const s = 15;
        ctx.beginPath();
        ctx.moveTo(x, y+s); ctx.lineTo(x,y); ctx.lineTo(x+s,y);
        ctx.moveTo(x+w-s, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+s);
        ctx.moveTo(x, y+h-s); ctx.lineTo(x, y+h); ctx.lineTo(x+s, y+h);
        ctx.moveTo(x+w-s, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-s);
        ctx.stroke();

        // Подпись
        ctx.fillStyle = "white";
        ctx.font = "14px monospace";
        const info = localDB[label] ? ` (SEEN: ${localDB[label].count})` : "";
        ctx.fillText(`${label.toUpperCase()}${info}`, x, y - 5);
    }
</script>
</body>
</html>
