<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL_OVERRIDE_V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');
        body { background: #000; color: #00ff41; font-family: 'Fira Code', monospace; overflow: hidden; margin: 0; text-transform: uppercase; }
        #v { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1) contrast(1.5); }
        #c { position: absolute; width: 100%; height: 100%; z-index: 10; }
        .terminal-grid { pointer-events: none; position: absolute; inset: 0; display: grid; grid-template-columns: 250px 1fr 250px; grid-template-rows: 1fr 200px; gap: 10px; padding: 20px; z-index: 20; }
        .panel { border: 1px solid rgba(0, 255, 65, 0.3); background: rgba(0, 20, 0, 0.7); backdrop-blur: 5px; padding: 10px; overflow: hidden; }
        .stat-val { color: #fff; float: right; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .scan-line { position: absolute; width: 100%; height: 4px; background: rgba(0, 255, 65, 0.2); top: 0; animation: scan 4s linear infinite; z-index: 5; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div class="scan-line"></div>

    <div class="terminal-grid">
        <!-- ЛЕВАЯ ПАНЕЛЬ: ТЕЛЕМЕТРИЯ СЕНСОРОВ -->
        <div class="panel">
            <h2 class="border-b border-green-500 mb-2 pb-1 text-xs">SENSORS_FUSION</h2>
            <div class="space-y-1 text-[10px]">
                <p>GRAVITY_X: <span id="gx" class="stat-val">0.00</span></p>
                <p>GRAVITY_Y: <span id="gy" class="stat-val">0.00</span></p>
                <p>GRAVITY_Z: <span id="gz" class="stat-val">0.00</span></p>
                <p>ROTATION_B: <span id="rb" class="stat-val">0.00</span></p>
                <p>ROTATION_G: <span id="rg" class="stat-val">0.00</span></p>
                <div class="mt-4 border-t border-green-900 pt-2 text-[9px] opacity-70">
                    <p>DEVICE: iPhone 15 Pro</p>
                    <p>ENGINE: WebGL_Accelerated</p>
                    <p>CORE: ARM_NEON_OPTIMIZED</p>
                </div>
            </div>
        </div>

        <!-- ЦЕНТР: ПУСТО (ЗДЕСЬ ОСНОВНОЙ ВИЗУАЛ) -->
        <div></div>

        <!-- ПРАВАЯ ПАНЕЛЬ: ОБЪЕКТНЫЙ АНАЛИЗ -->
        <div class="panel">
            <h2 class="border-b border-green-500 mb-2 pb-1 text-xs">OBJECT_PRIORITY</h2>
            <div id="obj-list" class="space-y-2 text-[9px]">
                <!-- Сюда динамически падают цели -->
            </div>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ: ЛОГ ВЫЧИСЛЕНИЙ -->
        <div class="panel col-span-3">
            <h2 class="border-b border-green-500 mb-1 pb-1 text-xs">NEURAL_PROCESSOR_LOG</h2>
            <div id="console-log" class="text-[9px] h-32 overflow-hidden leading-tight">
                [0.000] SYSTEM_BOOT: OK...<br>
                [0.002] WAITING_FOR_USER_INIT...
            </div>
        </div>
    </div>

    <button id="init-btn" class="absolute inset-0 z-[100] bg-black text-green-500 font-bold flex items-center justify-center tracking-[0.5em] text-2xl">
        <span class="blink">CONNECT_TO_CORE</span>
    </button>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('console-log');
        const objList = document.getElementById('obj-list');
        
        let model;
        let lastFrameTime = performance.now();
        let tracker = {}; // Моя память объектов

        function sysLog(msg) {
            const time = (performance.now() / 1000).toFixed(3);
            log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
        }

        async function start() {
            document.getElementById('init-btn').remove();
            sysLog("INITIALIZING_VISION_STREAM...");
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 },
                });
                video.srcObject = stream;
                
                sysLog("LOADING_TFJS_COCO_SSD_V2...");
                model = await cocoSsd.load();
                sysLog("NEURAL_WEIGHTS_LOADED_SUCCESSFULLY");

                window.addEventListener('devicemotion', (e) => {
                    document.getElementById('gx').innerText = e.accelerationIncludingGravity.x.toFixed(2);
                    document.getElementById('gy').innerText = e.accelerationIncludingGravity.y.toFixed(2);
                    document.getElementById('gz').innerText = e.accelerationIncludingGravity.z.toFixed(2);
                });

                requestAnimationFrame(loop);
            } catch (err) {
                sysLog("CRITICAL_ERROR: " + err.message);
            }
        }

        async function loop() {
            const now = performance.now();
            const fps = (1000 / (now - lastFrameTime)).toFixed(1);
            lastFrameTime = now;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const predictions = await model.detect(video);
            processDeepLogic(predictions);
            renderVisuals(predictions, fps);

            requestAnimationFrame(loop);
        }

        function processDeepLogic(preds) {
            objList.innerHTML = '';
            preds.forEach(p => {
                const area = p.bbox[2] * p.bbox[3];
                const threatLevel = (p.score * 100).toFixed(0);
                const distance = Math.round(5000 / Math.sqrt(area)); // Эмпирическая дистанция

                // Обновляем память
                if (!tracker[p.class]) tracker[p.class] = { seen: 0 };
                tracker[p.class].seen++;

                const entry = document.createElement('div');
                entry.className = threatLevel > 80 ? "text-white" : "text-green-700";
                entry.innerHTML = `
                    <div class="flex justify-between">
                        <span>ID: ${p.class}</span>
                        <span>DSTR: ~${distance}m</span>
                    </div>
                    <div class="w-full bg-green-900 h-1 mt-1">
                        <div class="bg-green-400 h-full" style="width: ${threatLevel}%"></div>
                    </div>
                `;
                objList.appendChild(entry);

                if (tracker[p.class].seen === 1) sysLog(`NEW_TARGET_ACQUIRED: ${p.class.toUpperCase()}`);
            });
        }

        function renderVisuals(preds, fps) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Сетка координат (Радар)
            ctx.strokeStyle = "rgba(0, 255, 65, 0.1)";
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 200, 0, Math.PI*2);
            ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
            ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();

            preds.forEach(p => {
                const [x, y, w, h] = p.bbox;
                const sx = canvas.width / video.videoWidth;
                const sy = canvas.height / video.videoHeight;
                
                // Рамка объекта
                ctx.strokeStyle = "#00ff41";
                ctx.lineWidth = 1;
                ctx.strokeRect(x*sx, y*sy, w*sx, h*sy);
                
                // Перекрестие на объекте
                const cx = (x + w/2) * sx;
                const cy = (y + h/2) * sy;
                ctx.beginPath();
                ctx.moveTo(cx - 10, cy); ctx.lineTo(cx + 10, cy);
                ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy + 10);
                ctx.stroke();

                // Вывод сырых данных рядом с боксом
                ctx.fillStyle = "#00ff41";
                ctx.font = "8px 'Fira Code'";
                ctx.fillText(`OBJ_REF: ${p.class}`, x*sx, y*sy - 15);
                ctx.fillText(`CONF: ${(p.score*100).toFixed(2)}%`, x*sx, y*sy - 5);
            });

            // Индикатор FPS
            ctx.fillStyle = "#00ff41";
            ctx.fillText(`PROCESSOR_LOAD: ${fps} FPS`, 20, canvas.height - 20);
        }

        document.getElementById('init-btn').addEventListener('click', start);
    </script>
</body>
</html>
