<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Face Scanner v6.2.2 - FUTURE-TECH</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
      transition: opacity 0.5s ease;
      border: 1px solid rgba(0, 255, 255, 0.3); box-sizing: border-box;
    }

    .loader-ring {
      display: none; width: 60px; height: 60px; border: 2px solid rgba(0, 255, 255, 0.1);
      border-radius: 50%; border-top-color: rgb(0, 255, 255);
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #access-btn {
      background: none; border: 1px solid rgb(0, 255, 255); color: rgb(0, 255, 255);
      padding: 15px 30px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 3px; font-family: inherit; transition: 0.3s;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    #access-btn:hover { background: rgb(0, 255, 255); color: #000; box-shadow: 0 0 20px rgb(0, 255, 255); }

    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; visibility: hidden; }
    .input_video { display: none; }
    
    .output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }

    #switch-camera {
      position: absolute; top: 20px; right: 20px; z-index: 110;
      background: rgba(0,0,0,0.5); border: 1px solid rgb(0, 255, 255); color: rgb(0, 255, 255);
      padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 10px;
    }

    .interface-overlay {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      font-size: 11px; text-shadow: 0 0 5px rgb(0, 255, 255); pointer-events: none;
      color: rgb(0, 255, 255);
    }

    .bottom-peripherals {
      position: absolute; bottom: 0; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10; background: linear-gradient(to top, #000 85%, transparent);
      padding-bottom: 20px;
    }

    #live-speech-box {
      width: 90%; min-height: 35px; margin-bottom: 5px;
      text-align: center; font-size: 18px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px; color: #fff;
    }

    #audio_visualizer { 
      width: 90%; height: 80px; margin-bottom: 10px; 
      background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 255, 255, 0.2); 
    }

    #terminal-box {
      width: 90%; height: 150px; background: rgba(0, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 255, 0.2); padding: 10px; box-sizing: border-box;
      overflow-y: auto; font-size: 10px; scrollbar-width: thin;
      scrollbar-color: rgba(0, 255, 255, 0.3) transparent;
    }

    .log-entry { 
      margin: 2px 0; color: rgba(0, 255, 255, 0.5); 
      border-left: 1px solid rgba(0, 255, 255, 0.3); 
      padding-left: 8px; white-space: pre-wrap;
    }
    .log-entry:last-child { color: rgb(0, 255, 255); border-left: 1px solid rgb(0, 255, 255); }
  </style>
</head>

<body>

  <div id="preloader">
    <div style="color:rgb(0, 255, 255); margin-bottom:10px;">NEURAL CORE LOADER v6.2.2</div>
    <div class="loader-ring" id="ring"></div>
    <button id="access-btn" onclick="startSequence()">INITIALIZE NEURAL LINK</button>
    <p id="status-text" style="margin-top: 20px; font-size: 10px; color: rgba(0, 255, 255, 0.7);">AWAITING BIOMETRIC AUTHORIZATION...</p>
  </div>

  <button id="switch-camera">Toggle Cam</button>

  <div id="container">
    <video class="input_video" playsinline></video>
    <canvas class="output_canvas"></canvas>
    
    <div class="interface-overlay">
      <div>> LINK_STATUS: ACTIVE</div>
      <div>> SCAN_MODE: FULL_MESH_RECONSTRUCTION</div>
      <div id="target-status">> TARGET: SEEKING...</div>
    </div>

    <div class="bottom-peripherals">
      <div id="live-speech-box">AWAITING_VOICE_STREAM</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const liveSpeechBox = document.getElementById('live-speech-box');
    const terminalBox = document.getElementById('terminal-box');
    const logContent = document.getElementById('log-content');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const targetStatus = document.getElementById('target-status');

    let currentFacingMode = 'user';
    let cameraInstance = null;
    let audioCtx, analyser, dataArray, frequencyArray;
    let scanLineY = 0; 
    let lastSoundTick = 0;
    let gridColor = 'rgba(0, 255, 255, 0.2)';
    let activeColorTime = 0;
    let globalStream = null;

    // --- ОЧЕРЕДЬ ПЕЧАТИ ТЕРМИНАЛА ---
    const logQueue = [];
    let isTyping = false;

    async function processLogQueue() {
      if (isTyping || logQueue.length === 0) return;
      isTyping = true;
      const { text, timestamp } = logQueue.shift();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerText = `[${timestamp}] `;
      logContent.appendChild(entry);
      const message = text.toUpperCase();
      for (let i = 0; i < message.length; i++) {
        entry.innerText += message[i];
        terminalBox.scrollTop = terminalBox.scrollHeight;
        await new Promise(r => setTimeout(r, 15));
      }
      isTyping = false;
      processLogQueue();
    }

    function addLog(text) {
      logQueue.push({ text, timestamp: new Date().toLocaleTimeString() });
      if (!isTyping) processLogQueue();
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    window.startSequence = async function() {
      const btn = document.getElementById('access-btn');
      const ring = document.getElementById('ring');
      const status = document.getElementById('status-text');

      try {
        btn.style.display = 'none';
        status.innerText = "REQUESTING ALL PERMISSIONS...";

        // ЕДИНЫЙ ЗАПРОС НА ВСЕ
        globalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        
        ring.style.display = 'block';
        status.innerText = "LINKING STREAMS...";

        // Аудио Контекст
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(globalStream);
        source.connect(analyser);
        analyser.fftSize = 128; // Меньше размер для более резкой "ёлки"
        frequencyArray = new Uint8Array(analyser.frequencyBinCount);
        drawBars();

        videoElement.srcObject = globalStream;
        await startCamera();
        
        document.getElementById('preloader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('preloader').style.display = 'none';
          document.getElementById('container').style.visibility = 'visible';
          if (window.runSpeech) window.runSpeech();
          addLog("Neural link: Secure");
          addLog("All sensors calibrated");
        }, 600);

      } catch (err) {
        status.innerText = "INIT ERROR: PERMISSION DENIED";
        btn.style.display = 'block';
        ring.style.display = 'none';
      }
    };

    // --- ЭКВАЛАЙЗЕР "ЁЛКА" (dB) ---
    function drawBars() {
      requestAnimationFrame(drawBars);
      audioCanvas.width = audioCanvas.clientWidth;
      audioCanvas.height = audioCanvas.clientHeight;
      
      analyser.getByteFrequencyData(frequencyArray);
      aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);

      const barCount = 40;
      const gutter = 4;
      const barWidth = (audioCanvas.width / barCount) - gutter;
      
      let average = 0;
      for (let i = 0; i < frequencyArray.length; i++) {
        average += frequencyArray[i];
        const percent = frequencyArray[i] / 255;
        const height = audioCanvas.height * percent;
        const x = i * (barWidth + gutter);
        
        // Цвет зависит от высоты (dB диапазона)
        let color = 'rgb(0, 255, 255)';
        if (percent > 0.8) color = 'rgb(255, 0, 0)';
        else if (percent > 0.5) color = 'rgb(0, 255, 0)';

        aCtx.fillStyle = color;
        // Рисуем сегментированные столбики ("ёлка")
        const segmentH = 4;
        const segments = Math.floor(height / (segmentH + 2));
        for(let j=0; j<segments; j++) {
            aCtx.fillRect(x, audioCanvas.height - (j * (segmentH + 2)), barWidth, -segmentH);
        }
      }
      
      // Логика цвета сетки на основе среднего уровня
      average /= frequencyArray.length;
      let now = Date.now();
      if (average > 70 && (now - lastSoundTick > 3000)) {
        gridColor = 'rgba(255, 0, 0, 0.6)';
        addLog("Peak detected: Red Alert");
        lastSoundTick = now; activeColorTime = now;
      } else if (average > 30 && (now - lastSoundTick > 3000)) {
        gridColor = 'rgba(0, 255, 0, 0.6)';
        addLog("Audio activity: Green Link");
        lastSoundTick = now; activeColorTime = now;
      } else if (now - activeColorTime > 3000 && gridColor !== 'rgba(255, 255, 255, 0.4)') {
        gridColor = 'rgba(255, 255, 255, 0.4)';
        activeColorTime = now + 5000;
      }
    }

    // --- РАСПОЗНАВАНИЕ РЕЧИ (БЕЗ НОВЫХ ЗАПРОСОВ) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'ru-RU';
      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) addLog("VOICE: " + event.results[i][0].transcript.trim() + " "); 
          else interim += event.results[i][0].transcript;
        }
        liveSpeechBox.innerText = interim.trim() ? ">> " + interim.toUpperCase().trim() : "LISTENING...";
      };
      recognition.onend = () => recognition.start();
      window.runSpeech = () => recognition.start();
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.save();
      canvasCtx.fillStyle = '#000';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 0.06; 
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalAlpha = 1.0;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        targetStatus.innerText = "> TARGET: ACQUIRED";
        for (const landmarks of results.multiFaceLandmarks) {
          canvasCtx.strokeStyle = gridColor;
          canvasCtx.lineWidth = 0.5;
          for (const connector of FACEMESH_TESSELATION) {
            const start = landmarks[connector[0]];
            const end = landmarks[connector[1]];
            canvasCtx.beginPath();
            canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
            canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
            canvasCtx.stroke();
          }
          
          // РОТ (Только отверстие)
          const mouthInner = [13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78, 191, 80, 81, 82];
          canvasCtx.strokeStyle = '#fff';
          canvasCtx.lineWidth = 1.2;
          canvasCtx.beginPath();
          mouthInner.forEach((idx, i) => {
            const pt = landmarks[idx];
            if(i===0) canvasCtx.moveTo(pt.x*canvasElement.width, pt.y*canvasElement.height);
            else canvasCtx.lineTo(pt.x*canvasElement.width, pt.y*canvasElement.height);
          });
          canvasCtx.closePath();
          canvasCtx.stroke();

          drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#fff', lineWidth: 1});
          drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#fff', lineWidth: 1});
        }
      } else {
        targetStatus.innerText = "> TARGET: SEEKING...";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    async function startCamera() {
      if(cameraInstance) await cameraInstance.stop();
      cameraInstance = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: currentFacingMode, width: 1280, height: 720
      });
      // Камера стартует сразу, так как поток в globalStream уже имеет разрешение
      await cameraInstance.start();
      canvasElement.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
    }

    document.getElementById('switch-camera').addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      startCamera();
    });
  </script>
</body>
</html>
