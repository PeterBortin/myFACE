<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI TERMINAL v7.1 FIXED</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { 
            --white: #ffffff;
            --yellow: #ffff00;
            --orange: #ff6600;
            --red: #ff0000;
            --terminal-bg: rgba(0, 5, 0, 0.95);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #video-wrapper { position: relative; flex: 1; width: 100%; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; }
        
        #terminal { 
            height: 100px; 
            width: 100%; 
            background: var(--terminal-bg); 
            border-top: 1px solid #222; 
            z-index: 20; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex;
            align-items: center;
        }

        #term-line {
            color: #00ff41;
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: #00ff41;
        }
        button {
            background: transparent; border: 1px solid #00ff41;
            color: #00ff41; padding: 15px 30px; font-size: 14px; cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="overlay">
    <button onclick="startApp()">CONNECTING TO CORE...</button>
</div>

<div id="container">
    <div id="video-wrapper">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="terminal">
        <div id="term-line">> ИНИЦИАЛИЗАЦИЯ...</div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const termLine = document.getElementById('term-line');
    
    let model = null;

    function updateTerminal(text) {
        termLine.innerText = "> " + text;
    }

    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            await video.play();
            model = await cocoSsd.load();
            document.getElementById('overlay').style.display = 'none';
            detectFrame();
        } catch (e) {
            updateTerminal("ERROR: NO_CAMERA");
        }
    }

    async function detectFrame() {
        const predictions = await model.detect(video);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (predictions.length > 0) {
            const p = predictions[0];
            updateTerminal(`TARGET: ${p.class.toUpperCase()} | POS: ${Math.round(p.bbox[0])},${Math.round(p.bbox[1])} | STATUS: SCANNING`);
        }

        predictions.forEach(p => {
            const [x, y, w, h] = p.bbox;
            const label = p.class;
            
            // Настройка цветов
            let color = "#ffffff"; // Предмет (Белый)
            if (label === 'person') color = "#ffff00"; // Человек (Желтый)
            if (['car', 'truck', 'bus', 'motorcycle'].includes(label)) color = "#ff0000"; // Авто (Красный)

            // Контур с тенью
            ctx.save();
            ctx.shadowBlur = 4;
            ctx.shadowColor = "black";
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            // 1. Основной пунктирный квадрат
            ctx.strokeStyle = color;
            ctx.setLineDash([10, 5]);
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.setLineDash([]); // Сброс пунктира для углов

            // 2. Углы (Сплошные)
            drawCorners(x, y, w, h, color);

            // 3. Тайтл объекта
            ctx.fillStyle = color;
            ctx.font = "bold 16px Courier New";
            ctx.fillText(label.toUpperCase(), x + 5, y - 12);
            ctx.restore();

            // 4. Дополнительные детекторы (Оранжевый пунктир)
            ctx.strokeStyle = "#ff6600";
            ctx.setLineDash([4, 4]);
            ctx.lineWidth = 1.5;

            if (label === 'person') {
                // Распознавание головы
                const hW = w * 0.35;
                const hH = h * 0.18;
                ctx.strokeRect(x + (w/2) - (hW/2), y + (h * 0.04), hW, hH);
            }

            if (['car', 'truck', 'bus'].includes(label)) {
                // Распознавание колес
                const wh = w * 0.18;
                ctx.strokeRect(x + (w * 0.1), y + (h * 0.75), wh, wh);
                ctx.strokeRect(x + (w * 0.72), y + (h * 0.75), wh, wh);
            }
            ctx.setLineDash([]);
        });

        requestAnimationFrame(detectFrame);
    }

    function drawCorners(x, y, w, h, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        const s = 25;
        ctx.beginPath();
        // Top Left
        ctx.moveTo(x, y + s); ctx.lineTo(x, y); ctx.lineTo(x + s, y);
        // Top Right
        ctx.moveTo(x + w - s, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + s);
        // Bottom Left
        ctx.moveTo(x, y + h - s); ctx.lineTo(x, y + h); ctx.lineTo(x + s, y + h);
        // Bottom Right
        ctx.moveTo(x + w - s, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - s);
        ctx.stroke();
    }
</script>
</body>
</html>
