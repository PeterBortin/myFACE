<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myFACE | NEURAL HUD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

  <style>
    :root {
      --cyan:       #00f5ff;
      --red:        #ff2244;
      --green:      #00ff88;
      --dim:        #0a0a0f;
      --border:     rgba(0, 245, 255, 0.15);
      --glow:       0 0 20px rgba(0, 245, 255, 0.3);
      --font-mono:  'Share Tech Mono', monospace;
      --font-title: 'Orbitron', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dim);
      overflow: hidden;
      font-family: var(--font-mono);
      color: var(--cyan);
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .corner {
      position: fixed;
      width: 30px; height: 30px;
      z-index: 1000; pointer-events: none;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--cyan);
    }
    .corner::before { width: 100%; height: 2px; top: 0; }
    .corner::after  { width: 2px; height: 100%; top: 0; }
    .corner.tl { top: 15px; left: 15px; }
    .corner.tr { top: 15px; right: 15px; transform: scaleX(-1); }
    .corner.bl { bottom: 15px; left: 15px; transform: scaleY(-1); }
    .corner.br { bottom: 15px; right: 15px; transform: scale(-1); }

    #preloader {
      position: fixed; inset: 0;
      background: var(--dim);
      z-index: 500;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #preloader.hidden { opacity: 0; visibility: hidden; }

    .boot-logo {
      font-family: var(--font-title);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--cyan);
      text-shadow: 0 0 40px var(--cyan);
      animation: flicker 3s infinite;
      margin-bottom: 8px;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      98% { opacity: 0.2; }
    }

    .boot-lines {
      width: min(400px, 85vw);
      margin-bottom: 40px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .boot-line {
      font-size: 9px;
      color: rgba(0,245,255,0.5);
      opacity: 0;
      animation: fadeInLine 0.3s forwards;
    }
    .boot-line.ok::after  { content: ' [OK]';   color: var(--green); }
    @keyframes fadeInLine { to { opacity: 1; } }

    #access-btn {
      font-family: var(--font-title);
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 14px 40px;
      font-size: 11px;
      letter-spacing: 4px;
      cursor: pointer;
      text-transform: uppercase;
      display: none;
    }

    #container {
      position: relative;
      width: 100vw; height: 100vh;
      visibility: hidden;
    }

    .input_video { display: none; }

    .output_canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    .hud-overlay {
      position: absolute; inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    .hud-tl {
      position: absolute;
      top: 25px; left: 25px;
      font-size: 9px;
      color: rgba(0,245,255,0.6);
      display: flex; flex-direction: column; gap: 5px;
    }

    .hud-tr {
      position: absolute;
      top: 20px; right: 20px;
      display: flex; gap: 8px;
      pointer-events: all;
      z-index: 20;
    }
    .ui-btn {
      font-family: var(--font-mono);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,245,255,0.3);
      color: rgba(0,245,255,0.7);
      padding: 7px 14px;
      font-size: 9px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    #reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 120px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #reticle.visible { opacity: 1; }

    .bottom-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
      padding: 0 25px 20px;
    }

    #live-speech-box {
      text-align: center;
      font-family: var(--font-title);
      font-size: 18px;
      color: #fff;
      min-height: 30px;
      margin-bottom: 5px;
    }

    #audio_visualizer {
      width: 100%;
      height: 60px;
      display: block;
      margin-bottom: 10px;
    }

    #terminal-box {
      width: 100%;
      height: 120px;
      border: 1px solid rgba(0,245,255,0.12);
      background: rgba(0,0,0,0.4);
      padding: 10px;
      overflow-y: auto;
    }
    .log-entry {
      font-size: 10px;
      margin-bottom: 4px;
      border-left: 2px solid var(--cyan);
      padding-left: 8px;
    }
    .log-entry.speech { border-color: var(--green); color: var(--green); }
  </style>
</head>

<body>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div id="preloader">
    <div class="boot-logo">myFACE</div>
    <div class="boot-lines" id="boot-lines"></div>
    <button id="access-btn" onclick="startSequence()">Open System</button>
    <div id="status-text" style="margin-top:20px; font-size:10px; opacity:0.5;">INITIALIZING...</div>
  </div>

  <div id="container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>

    <div class="hud-overlay">
      <div class="hud-tl">
        <div id="target-status">TARGET: SEEKING...</div>
        <div id="fps-row">FPS: --</div>
      </div>
    </div>

    <div class="hud-tr">
      <button class="ui-btn" onclick="toggleLang()">RU / UK</button>
      <button class="ui-btn" id="switch-cam">Cam</button>
    </div>

    <div id="reticle">
      <svg viewBox="0 0 100 100" stroke="var(--cyan)" fill="none">
        <circle cx="50" cy="50" r="40" stroke-dasharray="5 5" opacity="0.3" />
        <path d="M 30 50 L 70 50 M 50 30 L 50 70" stroke-width="0.5" />
      </svg>
    </div>

    <div class="bottom-panel">
      <div id="live-speech-box">IDLE</div>
      <canvas id="audio_visualizer"></canvas>
      <div id="terminal-box"><div id="log-content"></div></div>
    </div>
  </div>

  <script type="module">
    const videoEl = document.querySelector('.input_video');
    const canvasEl = document.querySelector('.output_canvas');
    const ctx = canvasEl.getContext('2d');
    const audioCanvas = document.getElementById('audio_visualizer');
    const aCtx = audioCanvas.getContext('2d');
    const liveSpeech = document.getElementById('live-speech-box');
    const logContent = document.getElementById('log-content');
    const terminalBox = document.getElementById('terminal-box');

    let audioCtxNode, analyser, freqData, camInstance;
    let recognition, currentLang = 'ru-RU';

    // Загрузочный экран
    window.addEventListener('DOMContentLoaded', () => {
      const lines = ["LOADING CORE...", "CONNECTING NEURAL NETWORK...", "SYSTEM READY"];
      const box = document.getElementById('boot-lines');
      lines.forEach((l, i) => {
        setTimeout(() => {
          const d = document.createElement('div');
          d.className = 'boot-line ok'; d.textContent = '> ' + l;
          box.appendChild(d);
        }, i * 500);
      });
      setTimeout(() => document.getElementById('access-btn').style.display = 'block', 1500);
    });

    // Инициализация при входе
    window.startSequence = async function() {
      try {
        audioCtxNode = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        
        analyser = audioCtxNode.createAnalyser();
        analyser.fftSize = 128;
        const source = audioCtxNode.createMediaStreamSource(stream);
        source.connect(analyser);
        freqData = new Uint8Array(analyser.frequencyBinCount);

        videoEl.srcObject = stream;
        await startCamera();
        
        document.getElementById('preloader').classList.add('hidden');
        document.getElementById('container').style.visibility = 'visible';
        
        startVisualizer();
        initSpeech();
        addLog("SYSTEM STARTUP COMPLETE", "system");
      } catch (e) {
        alert("Access Denied: " + e);
      }
    };

    // ФИКС: Оживление при возврате во вкладку
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && audioCtxNode) {
        audioCtxNode.resume();
      }
    });

    function startVisualizer() {
      const draw = () => {
        requestAnimationFrame(draw);
        if (!analyser) return;

        // Принудительно синхронизируем размер внутреннего буфера с CSS
        audioCanvas.width = audioCanvas.clientWidth;
        audioCanvas.height = audioCanvas.clientHeight;

        analyser.getByteFrequencyData(freqData);
        aCtx.clearRect(0, 0, audioCanvas.width, audioCanvas.height);

        const barWidth = audioCanvas.width / freqData.length;
        
        // Сетка
        aCtx.strokeStyle = 'rgba(0, 245, 255, 0.05)';
        for(let i=0; i<audioCanvas.height; i+=10) {
          aCtx.beginPath(); aCtx.moveTo(0, i); aCtx.lineTo(audioCanvas.width, i); aCtx.stroke();
        }

        for (let i = 0; i < freqData.length; i++) {
          const v = freqData[i] / 255;
          const h = v * audioCanvas.height;
          aCtx.fillStyle = `hsla(${180 + v*50}, 100%, 50%, ${0.3 + v*0.7})`;
          aCtx.fillRect(i * barWidth, audioCanvas.height - h, barWidth - 2, h);
        }
      };
      draw();
    }

    function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return;
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = currentLang;

      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) addLog(t, 'speech');
          else interim = t;
        }
        liveSpeech.textContent = interim || 'LISTENING...';
      };
      recognition.onend = () => recognition.start();
      recognition.start();
    }

    window.toggleLang = () => {
      currentLang = currentLang === 'ru-RU' ? 'uk-UA' : 'ru-RU';
      recognition.lang = currentLang;
      addLog("LANGUAGE SWITCHED TO: " + currentLang, "system");
    };

    function addLog(msg, type) {
      const d = document.createElement('div');
      d.className = 'log-entry ' + type;
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg.toUpperCase()}`;
      logContent.appendChild(d);
      terminalBox.scrollTop = terminalBox.scrollHeight;
    }

    async function startCamera() {
      camInstance = new Camera(videoEl, {
        onFrame: async () => await faceMesh.send({image: videoEl}),
        width: 1280, height: 720
      });
      camInstance.start();
    }

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true});
    faceMesh.onResults((res) => {
      ctx.save();
      ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
      ctx.globalAlpha = 0.2;
      ctx.drawImage(res.image, 0, 0, canvasEl.width, canvasEl.height);
      ctx.restore();

      if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
        document.getElementById('reticle').classList.add('visible');
        drawConnectors(ctx, res.multiFaceLandmarks[0], FACEMESH_TESSELATION, {color: '#00f5ff33', lineWidth: 0.5});
      } else {
        document.getElementById('reticle').classList.remove('visible');
      }
    });
  </script>
</body>
</html>
